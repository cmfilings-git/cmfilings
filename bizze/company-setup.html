<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Setup - bizze ERP & CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'], }, colors: { brand: { green: '#34A853', light: '#E8F5E9', dark: '#1f2937' } } } } }
    </script>
    <style>
        .custom-underline { position: relative; display: inline-block; }
        .custom-underline::after { content: ''; position: absolute; width: 100%; height: 6px; bottom: 2px; left: 0; background-color: #34A853; z-index: -1; border-radius: 4px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav-shadow { box-shadow: 0 -4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans overflow-hidden flex h-screen">

    <div id="mobileOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-40 hidden lg:hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.03)] flex flex-col transition-all duration-300 ease-in-out transform -translate-x-full lg:relative lg:translate-x-0 w-64 pb-16 lg:pb-0">
        <div class="h-20 px-6 flex items-center border-b border-gray-100 shrink-0">
            <img src="assets/logo.png" alt="bizze Logo" class="w-10 h-10 object-contain shrink-0">
            <div id="sidebarLogoText" class="ml-3 whitespace-nowrap overflow-hidden transition-all duration-300">
                <span class="text-2xl font-bold text-brand-dark tracking-tight leading-none block">bizz<span class="text-brand-green">e</span></span>
                <span class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">By CM Filings</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 no-scrollbar overflow-x-hidden">
            <div class="sidebar-category px-6 mb-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest whitespace-nowrap overflow-hidden transition-all duration-300">Main</div>
            
            <a href="index.html" class="nav-item flex items-center px-6 py-3 text-gray-500 hover:text-brand-green hover:bg-gray-50 transition whitespace-nowrap group">
                <div class="w-6 flex justify-center shrink-0"><i class="fas fa-chart-pie text-lg group-hover:scale-110 transition-transform"></i></div>
                <span class="sidebar-text font-medium text-sm ml-3 transition-opacity duration-300">Dashboard</span>
            </a>
            
            <a href="company-setup.html" class="nav-item flex items-center px-6 py-3 bg-brand-light text-brand-green border-r-4 border-brand-green whitespace-nowrap group">
                <div class="w-6 flex justify-center shrink-0"><i class="fas fa-building text-lg"></i></div>
                <span class="sidebar-text font-semibold text-sm ml-3 transition-opacity duration-300">Company Setup</span>
            </a>

            </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden relative">
        <header class="bg-white shadow-sm z-10 h-20 px-4 md:px-8 flex items-center justify-between border-b border-gray-100 shrink-0">
            <div class="flex items-center space-x-4">
                <button id="mobileToggleBtn" class="lg:hidden text-gray-500 hover:text-brand-green"><i class="fas fa-bars text-xl"></i></button>
                <button id="desktopToggleBtn" class="hidden lg:block text-gray-400 hover:text-brand-green"><i class="fas fa-align-left text-xl"></i></button>
                <div class="hidden sm:flex items-center bg-brand-light text-brand-green px-4 py-2 rounded-lg border border-brand-green border-opacity-30"><i class="fas fa-building mr-2 text-sm"></i><span class="text-sm font-bold">Tax Experts</span></div>
            </div>
            </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 md:p-8 pb-24 md:pb-8">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-brand-dark mb-1">Company <span class="custom-underline z-10 text-brand-dark">Setup</span></h1>
                <p class="text-sm text-gray-500">Manage your business profile, statutory details, and logo.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-8 border-b border-gray-100 flex items-center space-x-6">
                    <div class="w-24 h-24 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 cursor-pointer hover:border-brand-green hover:text-brand-green transition">
                        <i class="fas fa-camera text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-brand-dark">Company Logo</h3>
                        <p class="text-xs text-gray-500 mb-3">Upload a high-res logo (PNG, JPG max 2MB)</p>
                        <button class="px-4 py-2 bg-brand-light text-brand-green text-xs font-bold rounded hover:bg-green-100 transition">Upload File</button>
                    </div>
                </div>

                <form class="p-8 space-y-8">
                    <div>
                        <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Basic Information</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-2">Company Name</label>
                                <input type="text" value="Tax Experts" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-2">Industry Type</label>
                                <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green">
                                    <option>Financial Services</option>
                                    <option>Technology</option>
                                    <option>Retail</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Statutory & Tax Details</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-2">GSTIN Number</label>
                                <input type="text" placeholder="e.g. 29ABCDE1234F1Z5" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green uppercase">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-2">PAN Number</label>
                                <input type="text" placeholder="e.g. ABCDE1234F" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-green uppercase">
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 flex justify-end">
                        <button type="button" class="px-8 py-3 bg-brand-green text-white font-bold rounded-lg shadow-md hover:bg-green-600 transition">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // Paste sidebar toggle logic here
    </script>
</body>
</html>
