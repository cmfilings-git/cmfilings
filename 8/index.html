<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMFilings - CM Tax Experts</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-placeholder"></aside>

    <main class="main-content">
        
        <header>
            <div class="header-left">
                <button class="mobile-toggle" id="mobileNavToggle"><i class="fa-solid fa-bars"></i></button>
                <div class="header-title">
                    <h1 id="pageTitle">Dashboard Overview</h1>
                </div>
            </div>
            
            <div class="header-right">
                <div class="master-search">
                    <input type="text" id="dashboardMasterSearch" placeholder="Master Search (Clients, PAN, GST)...">
                    <button type="button" title="Execute Search"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div class="expert-profile">
                    <div class="expert-icon"><i class="fa-solid fa-user-tie"></i></div>
                    <div class="expert-details">
                        <span class="title">Tax Experts</span>
                        <span class="subtitle">Administrator</span>
                    </div>
                </div>

                <button class="theme-toggle" id="themeToggleBtn" title="Toggle Intercepting Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <div id="view-dashboard" class="view-container active">
            </div>

        <div id="view-clients" class="view-container">
            <div class="table-container">
                <div class="table-header">
                    <h3>Client Directory Database</h3>
                    <button class="btn-primary" onclick="openCreateModeModal()">
                        <i class="fa-solid fa-user-plus"></i> Add New Client
                    </button>
                </div>
                
                <div id="tableStatus" class="status-msg">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Initializing Shared Google Registry Mirror Processing...
                </div>
                
                <div class="table-wrapper">
                    <table id="clientsTable" style="display:none;">
                        <thead>
                            <tr>
                                <th onclick="sortClientTable('ClientName')">Client Name <i class="fa-solid fa-sort"></i></th>
                                <th onclick="sortClientTable('ClientID')">Client ID <i class="fa-solid fa-sort"></i></th>
                                <th onclick="sortClientTable('MobileNo')">Mobile No <i class="fa-solid fa-sort"></i></th>
                                <th>Folder Link</th>
                                <th style="text-align: center;">Record View / Edit Controls</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="formModalWrapper">
        <div class="modal">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
