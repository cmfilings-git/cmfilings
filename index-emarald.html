<style>

/* =========================================
   CMFILINGS EMERALD CORPORATE THEME
========================================= */

:root{

  --emerald:#059669;
  --emerald-dark:#047857;
  --emerald-light:#10b981;
  --emerald-soft:#d1fae5;

  --text:#0f172a;
  --text-soft:#475569;

  --white:#ffffff;

  --bg:#f7fffb;
  --bg-soft:#f0fdf4;

  --border:#d1fae5;

  --shadow-sm:
  0 4px 12px rgba(5,150,105,.06);

  --shadow-md:
  0 12px 32px rgba(5,150,105,.08);

  --shadow-lg:
  0 24px 60px rgba(5,150,105,.14);

  --radius:24px;
}

/* =========================================
   GLOBAL
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{

  font-family:'Inter',sans-serif;

  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #f7fffb 100%
  );

  color:var(--text);

  overflow-x:hidden;

  -webkit-font-smoothing:antialiased;
}

/* =========================================
   SCROLLBAR
========================================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#ecfdf5;
}

::-webkit-scrollbar-thumb{

  background:linear-gradient(
    180deg,
    var(--emerald-light),
    var(--emerald)
  );

  border-radius:999px;
}

/* =========================================
   NAVBAR
========================================= */

nav{

  background:rgba(255,255,255,.82);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--border);

  box-shadow:
  0 4px 20px rgba(5,150,105,.04);
}

nav a{

  color:var(--text-soft);

  font-weight:500;

  transition:.25s ease;
}

nav a:hover{

  color:var(--emerald);
}

/* =========================================
   LOGO
========================================= */

.logo-box{

  background:
  linear-gradient(
    135deg,
    var(--emerald-light),
    var(--emerald-dark)
  );

  box-shadow:
  0 10px 30px rgba(5,150,105,.18);
}

/* =========================================
   HERO
========================================= */

.hero-section{

  position:relative;

  overflow:hidden;
}

.hero-section::before{

  content:"";

  position:absolute;

  top:-200px;
  right:-200px;

  width:600px;
  height:600px;

  background:
  radial-gradient(
    circle,
    rgba(16,185,129,.16),
    transparent 70%
  );

  filter:blur(40px);

  z-index:0;
}

.hero-section::after{

  content:"";

  position:absolute;

  bottom:-300px;
  left:-200px;

  width:700px;
  height:700px;

  background:
  radial-gradient(
    circle,
    rgba(5,150,105,.10),
    transparent 70%
  );

  filter:blur(60px);

  z-index:0;
}

/* =========================================
   HEADINGS
========================================= */

h1,h2,h3,h4,h5{

  color:var(--text);

  letter-spacing:-1px;
}

.hero-title{

  font-weight:900;

  line-height:1.05;
}

.section-title{

  font-weight:800;
}

/* =========================================
   TEXT
========================================= */

p{

  color:var(--text-soft);

  line-height:1.8;
}

/* =========================================
   BUTTONS
========================================= */

.btn-primary{

  background:
  linear-gradient(
    135deg,
    var(--emerald-light),
    var(--emerald)
  );

  color:#fff;

  border:none;

  border-radius:16px;

  padding:14px 28px;

  font-weight:700;

  transition:.3s ease;

  box-shadow:
  0 10px 30px rgba(5,150,105,.16);
}

.btn-primary:hover{

  transform:translateY(-3px);

  background:
  linear-gradient(
    135deg,
    var(--emerald),
    var(--emerald-dark)
  );

  box-shadow:
  0 20px 45px rgba(5,150,105,.24);
}

.btn-outline{

  background:#fff;

  color:var(--emerald);

  border:1px solid var(--border);

  border-radius:16px;

  padding:14px 28px;

  font-weight:700;

  transition:.3s ease;
}

.btn-outline:hover{

  background:var(--bg-soft);

  transform:translateY(-2px);
}

/* =========================================
   CARDS
========================================= */

.card{

  background:rgba(255,255,255,.84);

  backdrop-filter:blur(14px);

  border:1px solid rgba(16,185,129,.12);

  border-radius:28px;

  box-shadow:
  0 10px 40px rgba(5,150,105,.06);

  transition:.35s ease;
}

.card:hover{

  transform:translateY(-8px);

  border-color:rgba(16,185,129,.28);

  box-shadow:
  0 24px 60px rgba(5,150,105,.12);
}

/* =========================================
   ICONS
========================================= */

.icon-box{

  background:
  linear-gradient(
    135deg,
    #ecfdf5,
    #d1fae5
  );

  color:var(--emerald);

  border-radius:18px;

  transition:.3s ease;
}

.card:hover .icon-box{

  background:
  linear-gradient(
    135deg,
    var(--emerald-light),
    var(--emerald)
  );

  color:#fff;
}

/* =========================================
   ANNOUNCEMENT BOX
========================================= */

.alert-box{

  background:#ffffff;

  border:1px solid var(--border);

  border-radius:28px;

  box-shadow:
  0 24px 70px rgba(5,150,105,.10);
}

/* =========================================
   PREMIUM DARK SECTION
========================================= */

.dark-section{

  background:
  linear-gradient(
    180deg,
    #022c22 0%,
    #041b17 100%
  );

  position:relative;

  overflow:hidden;
}

.dark-section::before{

  content:"";

  position:absolute;

  top:-200px;
  right:-200px;

  width:500px;
  height:500px;

  background:
  radial-gradient(
    circle,
    rgba(16,185,129,.14),
    transparent 70%
  );

  filter:blur(40px);
}

.dark-section h1,
.dark-section h2,
.dark-section h3,
.dark-section h4{

  color:#ffffff;
}

.dark-section p{

  color:rgba(255,255,255,.72);
}

/* =========================================
   STATS CARDS
========================================= */

.stats-card{

  background:
  rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(12px);

  border-radius:28px;

  transition:.3s ease;
}

.stats-card:hover{

  transform:translateY(-6px);

  background:
  rgba(255,255,255,.08);
}

/* =========================================
   TESTIMONIALS
========================================= */

.testimonial{

  background:#ffffff;

  border:1px solid var(--border);

  border-radius:28px;

  box-shadow:
  0 8px 32px rgba(5,150,105,.05);

  transition:.3s ease;
}

.testimonial:hover{

  transform:translateY(-6px);

  box-shadow:
  0 18px 45px rgba(5,150,105,.10);
}

/* =========================================
   FOOTER
========================================= */

footer{

  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #f0fdf4 100%
  );

  border-top:1px solid var(--border);
}

footer a{

  color:var(--text-soft);

  transition:.25s ease;
}

footer a:hover{

  color:var(--emerald);
}

/* =========================================
   INPUTS
========================================= */

input,
textarea,
select{

  background:#ffffff;

  border:1px solid var(--border);

  border-radius:16px;

  padding:14px 18px;

  outline:none;

  transition:.25s ease;
}

input:focus,
textarea:focus,
select:focus{

  border-color:var(--emerald-light);

  box-shadow:
  0 0 0 5px rgba(16,185,129,.10);
}

/* =========================================
   MOBILE NAV
========================================= */

.mobile-nav{

  background:rgba(255,255,255,.92);

  backdrop-filter:blur(18px);

  border-top:1px solid var(--border);

  box-shadow:
  0 -10px 40px rgba(5,150,105,.06);
}

/* =========================================
   SECTION SPACING
========================================= */

section{

  position:relative;

  z-index:1;
}

/* =========================================
   RESPONSIVE
========================================= */

@media(max-width:768px){

  body{

    padding-bottom:80px;
  }

  .hero-title{

    font-size:42px !important;

    line-height:1.1;
  }

  .section-title{

    font-size:32px !important;
  }

  .card{

    border-radius:22px;
  }

  .btn-primary,
  .btn-outline{

    width:100%;

    justify-content:center;
  }

}

/* =========================================
   ANIMATIONS
========================================= */

.fade-up{

  animation:fadeUp .8s ease both;
}

@keyframes fadeUp{

  from{

    opacity:0;
    transform:translateY(40px);
  }

  to{

    opacity:1;
    transform:translateY(0);
  }
}

</style>
