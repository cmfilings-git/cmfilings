<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Payment Request</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    font-family:'DM Sans',sans-serif;
    box-sizing:border-box;
}

body{
    margin:0;
}

.gradient-bg{
    background:linear-gradient(135deg,#0f0c29 0%,#1a1a4e 50%,#24243e 100%);
    min-height:100vh;
}

.card-glass{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
}

.input-field{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    transition:0.3s;
    color:white;
}

.input-field::placeholder{
    color:#6b7280;
}

.input-field:focus{
    border-color:#6c63ff;
    box-shadow:0 0 0 3px rgba(108,99,255,0.15);
    outline:none;
}

.btn-primary{
    background:linear-gradient(135deg,#6c63ff,#4834d4);
    transition:0.3s;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 25px rgba(108,99,255,0.4);
}

.btn-whatsapp{
    background:linear-gradient(135deg,#25d366,#128c7e);
    transition:0.3s;
}

.btn-whatsapp:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 25px rgba(37,211,102,0.4);
}

.pulse-dot{
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.5;}
}

.fade-in{
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#qrcode canvas{
    border-radius:12px;
}

</style>

</head>

<body>

<div class="gradient-bg w-full overflow-auto">

<div class="max-w-xl mx-auto px-4 py-8">

<!-- HEADER -->

<header class="text-center mb-8 fade-in">

<div class="inline-flex items-center gap-2 mb-3">

<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#6c63ff] to-[#4834d4] flex items-center justify-center">

<i data-lucide="shield-check" class="w-5 h-5 text-white"></i>

</div>

<h1 class="text-2xl font-bold text-white">
CMFilings Admin
</h1>

</div>

<p class="text-gray-400 text-sm">
Payment Request Generator
</p>

<div class="flex items-center justify-center gap-2 mt-2">

<span class="pulse-dot w-2 h-2 rounded-full bg-green-400 inline-block"></span>

<span class="text-green-400 text-xs font-medium">
Secure & Encrypted
</span>

</div>

</header>

<!-- FORM -->

<div id="formSection" class="card-glass rounded-2xl p-6 fade-in">

<form id="paymentForm" onsubmit="return false;">

<div class="space-y-4">

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Admin UPI ID
</label>

<input
type="text"
id="adminUpi"
placeholder="accountree@ybl"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

<div class="grid grid-cols-2 gap-4">

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Client Name
</label>

<input
type="text"
id="clientName"
placeholder="Mohammed"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Client ID
</label>

<input
type="text"
id="clientId"
placeholder="CM-1001"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

</div>

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Mobile No.
</label>

<div class="flex gap-2">

<span class="input-field rounded-xl px-3 py-3 text-gray-400 flex items-center text-sm">
+91
</span>

<input
type="tel"
id="mobileNo"
placeholder="9895470148"
maxlength="10"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

</div>

<div class="grid grid-cols-2 gap-4">

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Amount (₹)
</label>

<input
type="number"
id="amount"
placeholder="1360"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

<div>

<label class="block text-gray-300 text-sm font-medium mb-1.5">
Amount For
</label>

<input
type="text"
id="narration"
placeholder="GST Filing"
class="input-field w-full rounded-xl px-4 py-3"
>

</div>

</div>

</div>

<button
type="button"
onclick="generateRequest()"
class="btn-primary w-full mt-6 py-3.5 rounded-xl text-white font-semibold flex items-center justify-center gap-2"
>

<i data-lucide="qr-code" class="w-5 h-5"></i>

Generate Payment Request

</button>

</form>

</div>

<!-- RESULT -->

<div id="resultSection" class="hidden mt-6 fade-in">

<div class="card-glass rounded-2xl p-6 text-center">

<h2 class="text-white font-semibold text-lg mb-1">
Payment Request Ready
</h2>

<p class="text-gray-400 text-sm mb-4">
Scan QR or share via WhatsApp
</p>

<div class="bg-white rounded-2xl p-4 inline-block mb-4">

<div id="qrcode"></div>

</div>

<div class="card-glass rounded-xl p-4 text-left mb-4 space-y-2">

<div class="flex justify-between">
<span class="text-gray-400 text-sm">Client</span>
<span id="resClient" class="text-white text-sm font-medium"></span>
</div>

<div class="flex justify-between">
<span class="text-gray-400 text-sm">Client ID</span>
<span id="resClientId" class="text-white text-sm font-medium"></span>
</div>

<div class="flex justify-between">
<span class="text-gray-400 text-sm">Amount</span>
<span id="resAmount" class="text-white text-sm font-bold text-[#6c63ff]"></span>
</div>

<div class="flex justify-between">
<span class="text-gray-400 text-sm">For</span>
<span id="resNarration" class="text-white text-sm font-medium"></span>
</div>

</div>

<button
type="button"
onclick="sendWhatsApp()"
class="btn-whatsapp w-full py-3.5 rounded-xl text-white font-semibold flex items-center justify-center gap-2"
>

<i data-lucide="message-circle" class="w-5 h-5"></i>

Send to Client via WhatsApp

</button>

<button
type="button"
onclick="resetForm()"
class="mt-3 w-full py-3 rounded-xl text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 transition-all font-medium flex items-center justify-center gap-2"
>

<i data-lucide="plus" class="w-4 h-4"></i>

New Request

</button>

</div>

</div>

<footer class="text-center mt-8 text-gray-500 text-xs">

<p>
© 2026 CMFilings • Powered by Secure Payment Gateway
</p>

</footer>

</div>

</div>

<script>

let paymentData = {};

// AUTO FILL FROM URL

<!-- WITH THIS -->

window.addEventListener('DOMContentLoaded', () => {

    const params = new URLSearchParams(window.location.search);

    const client = params.get('client');
    const amount = params.get('amount');
    const narration = params.get('for');

    // AUTO FILL

    if(client){
        document.getElementById('clientId').value = client;
    }

    if(amount){
        document.getElementById('amount').value = amount;
    }

    if(narration){
        document.getElementById('narration').value = narration;
    }

    // CLIENT PAGE MODE

    if(client || amount || narration){

        document.getElementById('adminUpi').value = 'accountree@fbl';

        document.getElementById('clientName').value = 'Client';

        // AUTO GENERATE PAGE

        setTimeout(() => {
            generateRequest();
        }, 500);

    }

});

// GENERATE QR

function generateRequest(){

    const upi = document.getElementById('adminUpi').value.trim();
    const name = document.getElementById('clientName').value.trim();
    const clientId = document.getElementById('clientId').value.trim();
    const mobile = document.getElementById('mobileNo').value.trim();
    const amount = document.getElementById('amount').value.trim();
    const narration = document.getElementById('narration').value.trim();

    if(!upi || !name || !clientId || !mobile || !amount || !narration){

        showToast('Please fill all fields');
        return;
    }

    paymentData = {
        upi,
        name,
        clientId,
        mobile,
        amount,
        narration
    };

    const upiLink =
    `upi://pay?pa=${encodeURIComponent(upi)}&pn=Accountree&am=${amount}&tn=${encodeURIComponent(narration + ' - ' + clientId)}&cu=INR`;

    document.getElementById('formSection').classList.add('hidden');

    document.getElementById('resultSection').classList.remove('hidden');

    document.getElementById('resClient').textContent = name;

    document.getElementById('resClientId').textContent = clientId;

    document.getElementById('resAmount').textContent =
    '₹' + parseFloat(amount).toLocaleString('en-IN');

    document.getElementById('resNarration').textContent = narration;

    document.getElementById('qrcode').innerHTML = '';

    new QRCode(document.getElementById('qrcode'),{
        text:upiLink,
        width:180,
        height:180,
        colorDark:'#1a1a4e',
        colorLight:'#ffffff',
        correctLevel:QRCode.CorrectLevel.H
    });

    lucide.createIcons();
}

// WHATSAPP

function sendWhatsApp(){

    const {
        name,
        clientId,
        amount,
        narration,
        mobile
    } = paymentData;

    const paymentLink =
    `https://www.cmfilings.com/paymentportal/payment?client=${encodeURIComponent(clientId)}&amount=${amount}&for=${encodeURIComponent(narration)}`;

    const message =
`Dear *${name}*,

Greetings from *CMFilings*! 🙏

📋 *Payment Details:*

• Client ID: ${clientId}
• Amount: ₹${parseFloat(amount).toLocaleString('en-IN')}
• For: ${narration}

💳 *Click below to pay securely:*

${paymentLink}

Please complete the payment at your earliest convenience.

Thank you for choosing CMFilings! ✅

📞 For queries: +91 9946151111`;

    const clientWaUrl =
    `https://api.whatsapp.com/send?phone=91${mobile}&text=${encodeURIComponent(message)}`;

    window.open(clientWaUrl,'_blank');
}

// RESET

function resetForm(){

    document.getElementById('resultSection').classList.add('hidden');

    document.getElementById('formSection').classList.remove('hidden');

    document.getElementById('paymentForm').reset();

    paymentData = {};
}

// TOAST

function showToast(msg){

    const toast = document.createElement('div');

    toast.className =
    'fixed top-4 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-5 py-2.5 rounded-xl text-sm font-medium z-50';

    toast.textContent = msg;

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3000);
}

lucide.createIcons();

</script>

</body>
</html>
