            .sidebar {

                transform: translateX(-100%); z-index: 50; width: 85vw; max-width: 340px;

            width: 100%; padding: 8px 10px; border: 1px solid var(--border);
            border-radius: 8px; font-family: inherit; font-size: 13px;

        textarea.form-input { resize: vertical; min-height: 50px; }
        .kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .pnl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .pnl-table th, .pnl-table td { border: 1px solid var(--border); padding: 10px 12px; }
        .pnl-table th { background: #f8f9fa; font-weight: 600; text-align: right; }
        .pnl-table th:first-child, .pnl-table td:first-child,
        .pnl-table th:nth-child(3), .pnl-table td:nth-child(3) { text-align: left; }

        .row-total { font-weight: 700; background: #f8f9fa; }
        .text-success { color: var(--success); font-weight: 600; }
        .text-danger { color: var(--danger); font-weight: 600; }
    </style>

  <script>
let mainChartInstance = null;
let sourceChartInstance = null;

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
}

function parseExcel(id) {
    const val = document.getElementById(id).value.trim();
    if (!val) return [];
    return val.split('\n').reduce((arr, line) => {
        const m = line.trim().match(/(.*?)\s+([-]?[\d.,]+)$/);
        if (m) {
            const amount = parseFloat(m[2].replace(/,/g, ''));
            if (!isNaN(amount)) arr.push({ name: m[1].trim(), amount });
        }
        return arr;
    }, []);
}

function sumArr(arr) { return arr.reduce((s, i) => s + i.amount, 0); }
function fmtCur(n) { return parseFloat(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function genRows(arr) {
    return arr.map(i => `<tr><td style="padding-left:20px;border:0;font-style:italic;color:#555">${i.name}</td><td style="border:0;text-align:right">${fmtCur(i.amount)}</td></tr>`).join('');
}

function generateDashboard() {
    const openStock = parseFloat(document.getElementById('in-open-stock').value) || 0;
    const closeStock = parseFloat(document.getElementById('in-close-stock').value) || 0;
    const purchases = parseExcel('in-purchases');
    const directExp = parseExcel('in-direct-exp');
    const sales = parseExcel('in-sales');
    const directInc = parseExcel('in-direct-inc');
    const indirectExp = parseExcel('in-indirect-exp');
    const indirectInc = parseExcel('in-indirect-inc');

    const tP = sumArr(purchases), tDE = sumArr(directExp), tS = sumArr(sales);
    const tDI = sumArr(directInc), tIE = sumArr(indirectExp), tII = sumArr(indirectInc);

    const drT = openStock + tP + tDE;
    const crT = tS + tDI + closeStock;
    let gp = 0, gl = 0;
    if (crT > drT) gp = crT - drT; else gl = drT - crT;
    const tradTotal = Math.max(drT, crT);

    const drPnL = tIE + gl;
    const crPnL = tII + gp;
    let np = 0, nl = 0;
    if (crPnL > drPnL) np = crPnL - drPnL; else nl = drPnL - crPnL;
    const pnlTotal = Math.max(drPnL, crPnL);

    const totalRev = tS + tDI + tII;
    const totalExp = tP + tDE + tIE + (openStock - closeStock);

    document.getElementById('kpi-revenue').textContent = '₹' + fmtCur(totalRev);
    document.getElementById('kpi-expenses').textContent = '₹' + fmtCur(totalExp);

    const npEl = document.getElementById('kpi-netprofit');
    const npBadge = document.getElementById('kpi-np-margin');
    const npIcon = document.getElementById('np-icon');
    if (np > 0) {
        npEl.textContent = '₹' + fmtCur(np);
        npEl.className = 'text-xl font-bold text-success';
        npBadge.textContent = 'Profit';
        npBadge.className = 'px-2 py-0.5 rounded-full text-xs font-semibold';
        npBadge.style.cssText = 'background:var(--success-light);color:var(--success)';
        npIcon.style.background = 'var(--success)';
    } else {
        npEl.textContent = '-₹' + fmtCur(nl);
        npEl.className = 'text-xl font-bold text-danger';
        npBadge.textContent = 'Loss';
        npBadge.className = 'px-2 py-0.5 rounded-full text-xs font-semibold';
        npBadge.style.cssText = 'background:var(--danger-light);color:var(--danger)';
        npIcon.style.background = 'var(--danger)';
    }

    document.getElementById('kpi-grossprofit').textContent = gp > 0 ? '₹' + fmtCur(gp) : '-₹' + fmtCur(gl);

    // Table
    document.getElementById('table-container').innerHTML = `
    <table class="pnl-table">
        <thead><tr><th colspan="2">Particulars (Dr)</th><th colspan="2">Particulars (Cr)</th></tr></thead>
        <tbody>
            <tr>
                <td colspan="2" style="vertical-align:top;padding:0"><table style="width:100%;border-collapse:collapse">
                    <tr><td style="font-weight:600;border:0">Opening Stock</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(openStock)}</td></tr>
                    ${purchases.length ? `<tr><td style="font-weight:600;border:0">Purchase Accounts</td><td style="border:0"></td></tr>${genRows(purchases)}` : ''}
                    ${directExp.length ? `<tr><td style="font-weight:600;border:0">Direct Expenses</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(tDE)}</td></tr>${genRows(directExp)}` : ''}
                    ${gp > 0 ? `<tr><td style="font-weight:600;border:0">Gross Profit c/o</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(gp)}</td></tr>` : ''}
                </table></td>
                <td colspan="2" style="vertical-align:top;padding:0"><table style="width:100%;border-collapse:collapse">
                    ${sales.length ? `<tr><td style="font-weight:600;border:0">Sales Accounts</td><td style="border:0"></td></tr>${genRows(sales)}` : ''}
                    ${directInc.length ? `<tr><td style="font-weight:600;border:0">Direct Incomes</td><td style="border:0"></td></tr>${genRows(directInc)}` : ''}
                    <tr><td style="font-weight:600;border:0">Closing Stock</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(closeStock)}</td></tr>
                    ${gl > 0 ? `<tr><td style="font-weight:600;border:0">Gross Loss c/o</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(gl)}</td></tr>` : ''}
                </table></td>
            </tr>
            <tr class="row-total"><td>Total</td><td style="text-align:right">${fmtCur(tradTotal)}</td><td>Total</td><td style="text-align:right">${fmtCur(tradTotal)}</td></tr>
            <tr>
                <td colspan="2" style="vertical-align:top;padding:0"><table style="width:100%;border-collapse:collapse">
                    ${gl > 0 ? `<tr><td style="font-weight:600;border:0">Gross Loss b/f</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(gl)}</td></tr>` : ''}
                    ${indirectExp.length ? `<tr><td style="font-weight:600;border:0">Indirect Expenses</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(tIE)}</td></tr>${genRows(indirectExp)}` : ''}
                    ${np > 0 ? `<tr><td class="text-success" style="border:0">Nett Profit</td><td class="text-success" style="border:0;text-align:right">${fmtCur(np)}</td></tr>` : ''}
                </table></td>
                <td colspan="2" style="vertical-align:top;padding:0"><table style="width:100%;border-collapse:collapse">
                    ${gp > 0 ? `<tr><td style="font-weight:600;border:0">Gross Profit b/f</td><td style="font-weight:600;border:0;text-align:right">${fmtCur(gp)}</td></tr>` : ''}
                    ${indirectInc.length ? `<tr><td style="font-weight:600;border:0">Indirect Incomes</td><td style="border:0"></td></tr>${genRows(indirectInc)}` : ''}
                    ${nl > 0 ? `<tr><td class="text-danger" style="background:#f39c12;color:#fff;padding:4px;border:0">Nett Loss</td><td class="text-danger" style="background:#f39c12;color:#fff;padding:4px;border:0;text-align:right">${fmtCur(nl)}</td></tr>` : ''}
                </table></td>
            </tr>
            <tr class="row-total"><td>Total</td><td style="text-align:right">${fmtCur(pnlTotal)}</td><td>Total</td><td style="text-align:right">${fmtCur(pnlTotal)}</td></tr>
        </tbody>
    </table>`;

    drawCharts(totalRev, totalExp, indirectExp);
}

function drawCharts(totalRev, totalExp, expArr) {
    if (mainChartInstance) mainChartInstance.destroy();
    if (sourceChartInstance) sourceChartInstance.destroy();

    const ctx1 = document.getElementById('mainChart').getContext('2d');
    const r = [0.6,0.7,0.65,0.8,0.9,1].map(x => totalRev * x);
    const e = [0.6,0.65,0.6,0.7,0.75,1].map(x => totalExp * x);

    mainChartInstance = new Chart(ctx1, {
        type: 'line',
        data: {
            labels: ['Jan','Feb','Mar','Apr','May(T)','May(A)'],
            datasets: [
                { label: 'Revenue', data: r, borderColor: '#5b58f4', backgroundColor: 'rgba(91,88,244,0.1)', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#fff', pointBorderColor: '#5b58f4' },
                { label: 'Expenses', data: e, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#fff', pointBorderColor: '#ff6b6b' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } } }, scales: { y: { beginAtZero: true, grid: { color: '#eef0f5' } }, x: { grid: { display: false } } } }
    });

    const ctx2 = document.getElementById('sourceChart').getContext('2d');
    let sL = [], sD = [];
    if (expArr && expArr.length > 0) {
        const sorted = [...expArr].sort((a,b) => b.amount - a.amount);
        const top = sorted.slice(0, 4);
        sL = top.map(e => e.name); sD = top.map(e => e.amount);
        if (sorted.length > 4) { sL.push('Others'); sD.push(sorted.slice(4).reduce((s,e) => s + e.amount, 0)); }
    } else { sL = ['No Data']; sD = [1]; }

    sourceChartInstance = new Chart(ctx2, {
        type: 'doughnut',
        data: { labels: sL, datasets: [{ data: sD, backgroundColor: ['#5b58f4','#20c997','#fcc419','#ff6b6b','#8792a2'], borderWidth: 0, cutout: '70%' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
    });
}

function exportPDF() {
    const printWin = window.open('', '_blank');
    if (!printWin) return;

    const mainImg = document.getElementById('mainChart').toDataURL('image/png');
    const sourceImg = document.getElementById('sourceChart').toDataURL('image/png');
    const tableHTML = document.getElementById('table-container').innerHTML;
    const kpiRevenue = document.getElementById('kpi-revenue').textContent;
    const kpiExpenses = document.getElementById('kpi-expenses').textContent;
    const kpiNP = document.getElementById('kpi-netprofit').textContent;
    const kpiGP = document.getElementById('kpi-grossprofit').textContent;

    // Determine if it's a loss by checking for '-₹' prefix

    </div>
