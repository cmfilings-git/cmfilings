<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMFilings - Admin Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #F4F6F8;
            --bg-panel: #FFFFFF;
            --border-color: #E6E8EB;
            --text-dark: #111827;
            --text-muted: #6B7280;
            --text-light: #9CA3AF;
            --primary-accent: #194C66; 
            --primary-light: #E0F2FE;
            --active-tab: #2563EB;
            --red-main: #BE123C;
            --green-main: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 13px;
        }

        .login-container {
            background-color: var(--bg-panel);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background-color: var(--primary-accent);
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .brand-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-accent);
            margin-bottom: 4px;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background-color: var(--bg-body);
            color: var(--text-dark);
            transition: border-color 0.2s, background-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--active-tab);
            background-color: var(--bg-panel);
        }

        .password-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forgot-link {
            color: var(--active-tab);
            font-size: 11px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* Message Display Area */
        #authMessage {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .msg-error {
            background-color: #FEE2E2;
            color: var(--red-main);
            border: 1px solid #FCA5A5;
        }
        .msg-success {
            background-color: var(--primary-light);
            color: var(--primary-accent);
            border: 1px solid #BAE6FD;
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <div class="brand-icon"><i class="fa-solid fa-briefcase"></i></div>
            <h1>CMFilings Admin</h1>
            <p>Enter your credentials to access the CM Biz Core</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="support@cmeg.in" required>
            </div>

            <div class="form-group">
                <div class="password-header">
                    <label for="password">Password</label>
                    <a id="forgotPasswordBtn" class="forgot-link">Forgot Password?</a>
                </div>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
        </form>

        <div id="authMessage"></div>

        <div class="footer-text">
            &copy; 2026 CM Experts Group. All rights reserved.<br>
            Protected by Firebase Security.
        </div>
    </div>

    <script type="module">
        // 1. IMPORT FIREBASE MODULES
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // 2. YOUR REAL FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBqbdmDKe6x_nWzkm6OwOX19QyJgCb7arM",
            authDomain: "cmfilings-firebase.firebaseapp.com",
            projectId: "cmfilings-firebase",
            storageBucket: "cmfilings-firebase.firebasestorage.app",
            messagingSenderId: "55459718043",
            appId: "1:55459718043:web:054cbd500c00ebf3cd373e",
            measurementId: "G-28GZE86MES"
        };

        // 3. INITIALIZE FIREBASE
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. CHECK IF ALREADY LOGGED IN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If the user already has an active session, forward them to the dashboard
                window.location.replace("index.html");
            }
        });

        // 5. UI ELEMENTS
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
        const authMessage = document.getElementById('authMessage');

        // Helper function to show messages
        function showMessage(text, type) {
            authMessage.textContent = text;
            authMessage.style.display = 'block';
            authMessage.className = type === 'error' ? 'msg-error' : 'msg-success';
        }

        // 6. LOGIN HANDLER
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    showMessage('Login successful. Redirecting...', 'success');
                    window.location.href = 'index.html'; 
                })
                .catch((error) => {
                    loginBtn.textContent = 'Sign In';
                    loginBtn.disabled = false;
                    
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        showMessage('Invalid email or password.', 'error');
                    } else if (error.code === 'auth/too-many-requests') {
                        showMessage('Account temporarily disabled due to many failed attempts. Try resetting your password.', 'error');
                    } else {
                        showMessage(error.message, 'error');
                    }
                });
        });

        // 7. FORGOT PASSWORD HANDLER
        forgotPasswordBtn.addEventListener('click', () => {
            const email = emailInput.value;
            
            if (!email) {
                showMessage('Please enter your email address first to reset password.', 'error');
                emailInput.focus();
                return;
            }

            forgotPasswordBtn.textContent = 'Sending...';
            
            sendPasswordResetEmail(auth, email)
                .then(() => {
                    showMessage('Password reset email sent! Check your inbox.', 'success');
                    forgotPasswordBtn.textContent = 'Forgot Password?';
                })
                .catch((error) => {
                    forgotPasswordBtn.textContent = 'Forgot Password?';
                    if (error.code === 'auth/invalid-email') {
                        showMessage('Please enter a valid email address.', 'error');
                    } else {
                        showMessage(error.message, 'error');
                    }
                });
        });
    </script>
</body>
</html>
