<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Payment QR Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{
    --primary:#C70000;
    --primary-dark:#980000;
    --white:#ffffff;
    --light:#F4F4F4;
    --border:#ECECEC;
    --text:#3B3B3B;
    --sub:#8A8A8A;
    --shadow:0 10px 30px rgba(0,0,0,0.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--light);
    font-family:'Poppins',sans-serif;
    color:var(--text);
    padding:22px;
    padding-bottom:110px;
}

.container{
    max-width:520px;
    margin:auto;
}

.card{
    background:#fff;
    border-radius:34px;
    padding:28px;
    box-shadow:var(--shadow);
}

.brand{
    text-align:center;
    margin-bottom:30px;
}

.brand img.logo{
    width:76px;
    margin-bottom:14px;
}

.brand img.name{
    width:230px;
    margin-bottom:8px;
}

.brand p{
    font-size:13px;
    color:var(--sub);
}

.title{
    font-size:28px;
    font-weight:700;
    text-align:center;
    margin-bottom:26px;
}

.input-wrap{
    position:relative;
    margin-bottom:18px;
}

.field-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    font-size:20px;
    color:#B0B0B0;
}

.input-wrap textarea + .field-icon{
    top:24px;
    transform:none;
}

.input-wrap input,
.input-wrap textarea{
    width:100%;
    border:none;
    outline:none;
    border:1px solid var(--border);
    background:#FAFAFA;
    border-radius:20px;
    padding:18px 18px 18px 54px;
    font-size:14px;
    color:var(--text);
    font-family:'Poppins',sans-serif;
}

.input-wrap textarea{
    resize:none;
    height:100px;
}

.input-wrap input:focus,
.input-wrap textarea:focus{
    border-color:#D6D6D6;
    background:#fff;
}

.btn{
    width:100%;
    border:none;
    border-radius:20px;
    padding:17px;
    margin-top:14px;
    font-size:15px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
}

.btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
}

.btn-secondary{
    background:#EFEFEF;
    color:#555;
}

.qr-section{
    margin-top:30px;
    display:none;
}

.qr-box{
    background:#fff;
    border:1px solid var(--border);
    border-radius:30px;
    padding:28px;
    text-align:center;
}

.qr-wrapper{
    position:relative;
    width:240px;
    height:240px;
    margin:auto;
}

#qrcode{
    width:240px;
    height:240px;
}

.qr-center-logo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:52px;
    height:52px;
    background:#fff;
    border-radius:16px;
    padding:6px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.qr-center-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.payment-details{
    margin-top:22px;
}

.payment-details h3{
    font-size:24px;
    margin-bottom:10px;
}

.payment-details p{
    color:var(--sub);
    line-height:1.8;
    font-size:14px;
}

.amount{
    margin-top:16px;
    font-size:34px;
    font-weight:700;
    color:var(--primary);
}

.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#fff;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    padding:12px 0 10px;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    color:#A5A5A5;
    font-size:12px;
    font-weight:500;
    text-decoration:none;
}

.nav-item i{
    font-size:22px;
}

.nav-item.active{
    color:var(--primary);
}

@media(max-width:600px){

body{
    padding:18px;
}

.card{
    padding:22px;
    border-radius:28px;
}

.title{
    font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<!-- BRAND -->

<div class="brand">

<img
    src="assets/logo-header.png"
    class="logo"
>

<img
    src="assets/name-header.png"
    class="name"
>

<p>
Experts in Tax & Business Compliances
</p>

</div>

<!-- TITLE -->

<div class="title">
Payment QR Generator
</div>

<!-- UPI -->

<div class="input-wrap">

<input
    type="text"
    id="upi"
    placeholder="CMFilings UPI ID"
    value="cmfilings@upi"
>

<i class="icon-wallet-minimal field-icon"></i>

</div>

<!-- CLIENT -->

<div class="input-wrap">

<input
    type="text"
    id="clientName"
    placeholder="Client Name"
>

<i class="icon-user-round field-icon"></i>

</div>

<!-- MOBILE -->

<div class="input-wrap">

<input
    type="tel"
    id="mobile"
    placeholder="Client Mobile Number"
>

<i class="icon-smartphone field-icon"></i>

</div>

<!-- DESCRIPTION -->

<div class="input-wrap">

<textarea
    id="description"
    placeholder="Payment Description"
></textarea>

<i class="icon-file-text field-icon"></i>

</div>

<!-- AMOUNT -->

<div class="input-wrap">

<input
    type="number"
    id="amount"
    placeholder="Amount"
>

<i class="icon-badge-indian-rupee field-icon"></i>

</div>

<!-- BUTTONS -->

<button
class="btn btn-primary"
onclick="generateQR()"
>

<i class="icon-scan-line"></i>
Generate QR

</button>

<button
class="btn btn-secondary"
onclick="sendWhatsApp()"
>

<i class="icon-message-circle"></i>
Send to WhatsApp

</button>

<!-- QR -->

<div
class="qr-section"
id="qrSection"
>

<div class="qr-box">

<div class="qr-wrapper">

<div id="qrcode"></div>

<div class="qr-center-logo">

<img src="assets/logo-footer.png">

</div>

</div>

<div class="payment-details">

<h3 id="displayName"></h3>

<p id="displayDescription"></p>

<div class="amount" id="displayAmount"></div>

</div>

</div>

</div>

</div>

</div>

<!-- NAV -->

<nav class="bottom-nav">

<a href="#" class="nav-item active">
<i class="icon-house"></i>
<span>Home</span>
</a>

<a href="#" class="nav-item">
<i class="icon-briefcase-business"></i>
<span>Services</span>
</a>

<a href="#" class="nav-item">
<i class="icon-wrench"></i>
<span>Tools</span>
</a>

<a href="#" class="nav-item">
<i class="icon-chart-column"></i>
<span>Reports</span>
</a>

<a href="#" class="nav-item">
<i class="icon-circle-user-round"></i>
<span>Account</span>
</a>

</nav>

<script>

function generateQR(){

    const upi =
    document.getElementById('upi').value.trim();

    const clientName =
    document.getElementById('clientName').value.trim();

    const description =
    document.getElementById('description').value.trim();

    const amount =
    document.getElementById('amount').value.trim();

    if(!upi || !amount){

        alert('Please enter UPI ID and Amount');
        return;

    }

    // CORRECT WORKING UPI FORMAT

    const upiLink =
    `upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&cu=INR&tn=${encodeURIComponent(description)}`;

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"),{
        text: upiLink,
        width:240,
        height:240,
        correctLevel:QRCode.CorrectLevel.H
    });

    document.getElementById('displayName').innerText =
    clientName || 'CMFilings Client';

    document.getElementById('displayDescription').innerText =
    description || 'Payment Request';

    document.getElementById('displayAmount').innerText =
    `₹ ${amount}`;

    document.getElementById('qrSection').style.display='block';

}

function sendWhatsApp(){

    const clientName =
    document.getElementById('clientName').value.trim();

    const mobile =
    document.getElementById('mobile').value.trim();

    const description =
    document.getElementById('description').value.trim();

    const amount =
    document.getElementById('amount').value.trim();

    const upi =
    document.getElementById('upi').value.trim();

    if(!mobile){

        alert('Enter Client Mobile Number');
        return;

    }

    // CLIENT VIEW URL

    const paymentPage =
    `https://www.cmfilings.com/payment?upi=${encodeURIComponent(upi)}&name=${encodeURIComponent(clientName)}&amount=${encodeURIComponent(amount)}&description=${encodeURIComponent(description)}`;

    const message =
`*Payment Request From CMFilings*

Dear ${clientName},

Your payment for *${description}* is due.

Amount: *₹${amount}*

Pay now:
${paymentPage}`;

    const whatsappURL =
    `https://wa.me/91${mobile}?text=${encodeURIComponent(message)}`;

    window.open(whatsappURL,'_blank');

}

</script>

</body>
</html>
