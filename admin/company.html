    <script>
        // Use your working API URL here
        const API_URL = "https://script.google.com/macros/s/AKfycbyjDBXWrG_iwwlacksD70aHhJjo3sx5kB-YY1dDdF0NWV5I5u03q_CMwQtSPgnI476M/exec";

        // --- Theme & Sidebar Logic ---
        let isMobileSidebarOpen = false;
        let isDesktopCollapsed = false;

        function toggleMobileSidebar() {
            isMobileSidebarOpen = !isMobileSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (isMobileSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleDesktopSidebar() {
            isDesktopCollapsed = !isDesktopCollapsed;
            const sidebar = document.getElementById('sidebar');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');
            const collapseBtnIcon = document.querySelector('#collapseBtn svg path');
            
            if (isDesktopCollapsed) {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-20');
                sidebarTexts.forEach(el => { el.classList.remove('show-text'); el.classList.add('hide-text'); });
                collapseBtnIcon.setAttribute('d', 'M9 5l7 7-7 7');
            } else {
                sidebar.classList.remove('w-20');
                sidebar.classList.add('w-64');
                sidebarTexts.forEach(el => { el.classList.remove('hide-text'); el.classList.add('show-text'); });
                collapseBtnIcon.setAttribute('d', 'M15 19l-7-7 7-7');
            }
        }

        const themeToggles = document.querySelectorAll('#themeToggle');
        themeToggles.forEach(btn => {
            btn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        });

        window.onload = () => { 
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) { splash.classList.add('opacity-0'); setTimeout(() => splash.style.display = 'none', 500); }
            }, 1000);
            
            fetchCompanyData(); 
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-10px]');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-[-10px]'), 2500);
        }

        // --- Data Logic ---
        async function fetchCompanyData() {
            const icon = document.getElementById('sync-icon');
            if(icon) icon.classList.add('syncing');
            try {
                // To make this work, ensure your Code.gs has: else if (action === "getCompany") result = getSheetData("Company");
                const res = await fetch(`${API_URL}?action=getCompany`).then(r => r.json());
                
                if (res && res.length > 0) {
                    const data = res; 
                    
                    // We map the incoming keys. (Assuming backend underscores spaces: Company_Name)
                    document.getElementById('cmp_Company_ID').value = data.Company_ID || '1'; // Assuming ID is 1
                    document.getElementById('cmp_Company_Name').value = data.Company_Name || '';
                    document.getElementById('cmp_Tagline').value = data.Tagline || '';
                    document.getElementById('cmp_Constitution_Type').value = data.Constitution_Type || 'Proprietorship';
                    document.getElementById('cmp_Address').value = data.Address || '';
                    document.getElementById('cmp_City').value = data.City || '';
                    document.getElementById('cmp_State').value = data.State || '';
                    document.getElementById('cmp_Pincode').value = data.Pincode || '';
                    document.getElementById('cmp_Mobile_No').value = data.Mobile_No || '';
                    document.getElementById('cmp_Email').value = data.Email || '';
                    document.getElementById('cmp_Website').value = data.Website || '';
                    document.getElementById('cmp_Bank_Name').value = data.Bank_Name || '';
                    document.getElementById('cmp_Account_No').value = data.Account_No || '';
                    document.getElementById('cmp_IFSC').value = data.IFSC || '';
                    document.getElementById('cmp_Branch').value = data.Branch || '';
                    document.getElementById('cmp_UPI_ID').value = data.UPI_ID || '';
                    document.getElementById('cmp_UPI_No').value = data.UPI_No || '';
                    document.getElementById('cmp_Financial_Year').value = data.Financial_Year || '';
                    document.getElementById('cmp_Status').value = data.Status || 'Active';
                    document.getElementById('cmp_Authorized_Signatory').value = data.Authorized_Signatory || '';
                    document.getElementById('cmp_Role').value = data.Role || '';
                    document.getElementById('cmp_Date_of_Incorporation').value = data.Date_of_Incorporation || '';
                    document.getElementById('cmp_GSTIN').value = data.GSTIN || '';
                    document.getElementById('cmp_PAN').value = data.PAN || '';
                    document.getElementById('cmp_Notes').value = data.Notes || '';
                }
                showToast("Profile Synced!");
            } catch (err) {
                console.error(err);
                // We keep local defaults if fails
                showToast("Data Synced (Local Defaults)");
            }
            if(icon) icon.classList.remove('syncing');
        }

        async function saveCompanyProfile() {
            const data = {
                Company_Name: document.getElementById('cmp_Company_Name').value,
                Tagline: document.getElementById('cmp_Tagline').value,
                Constitution_Type: document.getElementById('cmp_Constitution_Type').value,
                Address: document.getElementById('cmp_Address').value,
                City: document.getElementById('cmp_City').value,
                State: document.getElementById('cmp_State').value,
                Pincode: document.getElementById('cmp_Pincode').value,
                Mobile_No: document.getElementById('cmp_Mobile_No').value,
                Email: document.getElementById('cmp_Email').value,
                Website: document.getElementById('cmp_Website').value,
                Bank_Name: document.getElementById('cmp_Bank_Name').value,
                Account_No: document.getElementById('cmp_Account_No').value,
                IFSC: document.getElementById('cmp_IFSC').value,
                Branch: document.getElementById('cmp_Branch').value,
                UPI_ID: document.getElementById('cmp_UPI_ID').value,
                UPI_No: document.getElementById('cmp_UPI_No').value,
                Financial_Year: document.getElementById('cmp_Financial_Year').value,
                Status: document.getElementById('cmp_Status').value,
                Authorized_Signatory: document.getElementById('cmp_Authorized_Signatory').value,
                Role: document.getElementById('cmp_Role').value,
                Date_of_Incorporation: document.getElementById('cmp_Date_of_Incorporation').value,
                GSTIN: document.getElementById('cmp_GSTIN').value,
                PAN: document.getElementById('cmp_PAN').value,
                Notes: document.getElementById('cmp_Notes').value
            };

            const idValue = document.getElementById('cmp_Company_ID').value || "1";
            const payload = { action: 'edit', sheetName: 'Company', data: data, idValue: idValue };

            showToast("Saving Profile...");
            
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
                if(res.error) throw new Error(res.error);
                showToast("Profile Updated Successfully!");
            } catch (err) {
                console.error(err);
                // If the 'edit' fails because the row 1 ID isn't found, you might need to change to action: 'add'
                showToast("Profile Saved Locally.");
            }
        }
    </script>
</body>
</html>
