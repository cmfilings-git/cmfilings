<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(180deg,#f8fafc,#eef2ff);
}

.main-card{
    background:white;
    border-radius:34px;
    border:1px solid #edf2f7;
    box-shadow:
    0 10px 30px rgba(15,23,42,.06),
    0 2px 6px rgba(15,23,42,.03);
}

.input{
    width:100%;
    height:72px;
    border-radius:24px;
    border:2px solid #edf2f7;
    background:#f8fafc;
    padding:0 24px;
    font-size:1.05rem;
    font-weight:500;
    color:#0f172a;
}

textarea.input{
    height:130px;
    padding-top:18px;
    resize:none;
}

.input:focus{
    outline:none;
    border-color:#818cf8;
    background:white;
    box-shadow:0 0 0 5px rgba(99,102,241,.10);
}

.label{
    display:block;
    margin-bottom:10px;
    font-size:.9rem;
    font-weight:700;
    letter-spacing:.04em;
    color:#64748b;
    text-transform:uppercase;
}

.btn-primary{
    width:100%;
    height:72px;
    border:none;
    border-radius:24px;
    background:linear-gradient(135deg,#6c63ff,#7278ff);
    color:white;
    font-size:1.15rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 12px 24px rgba(108,99,255,.25);
}

.preview-card{
    border:3px dashed #d6dce8;
    border-radius:36px;
    background:#f8fafc;
    min-height:500px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #edf2f7;
}

.pay-btn{
    width:100%;
    height:64px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
}

.logo-img{
    height:80px;
    object-fit:contain;
}

.name-img{
    height:70px;
    object-fit:contain;
}

@media(max-width:768px){

.mobile-grid{
    grid-template-columns:1fr !important;
}

.logo-img{
    height:60px;
}

.name-img{
    height:55px;
}

}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto px-4 py-8">

<!-- HEADER -->

<div class="flex items-center gap-4 mb-10">

<img
src="https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/logo-header.png"
class="logo-img">

<img
src="https://raw.githubusercontent.com/YOURUSERNAME/YOURREPO/main/name-header.png"
class="name-img">

</div>

<div class="grid grid-cols-2 gap-8 mobile-grid">

<!-- FORM -->

<div class="main-card p-8">

<div class="space-y-6">

<div>

<label class="label">
Admin UPI ID
</label>

<input
id="upi"
class="input"
value="accountree@fbl">

</div>

<div>

<label class="label">
Client Name
</label>

<input
id="clientName"
class="input"
value="Ajwa Builders">

</div>

<div>

<label class="label">
Client ID
</label>

<input
id="clientId"
class="input"
value="C40001">

</div>

<div>

<label class="label">
Customer WhatsApp No.
</label>

<input
id="mobile"
maxlength="10"
class="input"
value="9895470148">

</div>

<div>

<label class="label">
Payment For
</label>

<select id="paymentFor" class="input">

<option>GST Return Filing</option>
<option>TDS Return Filing</option>
<option>Income Tax Filing</option>
<option>Accounting Service</option>
<option>Audit Fee</option>
<option>Trade License</option>
<option>IEC Registration</option>
<option>Professional Charges</option>
<option>Other</option>

</select>

</div>

<div>

<label class="label">
Amount (₹)
</label>

<input
id="amount"
type="number"
class="input"
value="2000">

</div>

<div>

<label class="label">
Ref No / Invoice No.
</label>

<input
id="invoice"
class="input"
value="CMF42605081">

</div>

<div>

<label class="label">
Additional Notes
</label>

<textarea
id="notes"
class="input">April 2026</textarea>

</div>

<button onclick="generateRequest()" class="btn-primary flex items-center justify-center gap-3">

<i data-lucide="qr-code"></i>

Generate Request QR

</button>

</div>

</div>

<!-- PREVIEW -->

<div id="previewCard" class="preview-card p-8 flex flex-col items-center justify-center text-center">

<div id="emptyState">

<div class="w-20 h-20 rounded-3xl bg-slate-200 flex items-center justify-center mx-auto mb-6">

<i data-lucide="scan-line" class="w-10 h-10 text-slate-400"></i>

</div>

<h2 class="text-4xl font-bold text-slate-700 mb-3">
Preview
</h2>

<p class="text-slate-500 text-xl">
Fill the form and generate
<br>
payment preview.
</p>

</div>

<div id="generatedSection" class="hidden w-full">

<div class="bg-white rounded-3xl p-5 inline-block mb-6 shadow-sm">

<div id="qrcode"></div>

</div>

<div class="bg-white rounded-3xl border border-slate-200 p-6 text-left mb-6">

<div class="summary-row">
<span class="text-slate-500">Client</span>
<span id="rName"></span>
</div>

<div class="summary-row">
<span class="text-slate-500">Amount</span>
<span id="rAmount" class="font-bold text-indigo-600"></span>
</div>

<div class="summary-row">
<span class="text-slate-500">Service</span>
<span id="rService"></span>
</div>

</div>

<button onclick="sendWhatsapp()" class="pay-btn">

Send Client via WhatsApp

</button>

</div>

</div>

</div>

</div>

<script>

lucide.createIcons();

let paymentData={};

function generateRequest(){

const upi=document.getElementById('upi').value.trim();
const clientName=document.getElementById('clientName').value.trim();
const clientId=document.getElementById('clientId').value.trim();
const mobile=document.getElementById('mobile').value.trim();
const paymentFor=document.getElementById('paymentFor').value;
const amount=document.getElementById('amount').value.trim();
const invoice=document.getElementById('invoice').value.trim();
const notes=document.getElementById('notes').value.trim();

paymentData={
upi,
clientName,
clientId,
mobile,
paymentFor,
amount,
invoice,
notes
};

const clientLink=
`https://cmfilings.com/pay.html?client=${encodeURIComponent(clientName)}&clientid=${encodeURIComponent(clientId)}&amount=${encodeURIComponent(amount)}&service=${encodeURIComponent(paymentFor)}&invoice=${encodeURIComponent(invoice)}&notes=${encodeURIComponent(notes)}&upi=${encodeURIComponent(upi)}`;

paymentData.clientLink=clientLink;

const upiLink=
`upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&tn=${paymentFor}-${clientId}&cu=INR`;

document.getElementById('emptyState').classList.add('hidden');

document.getElementById('generatedSection').classList.remove('hidden');

document.getElementById('rName').innerText=clientName;

document.getElementById('rAmount').innerText=
`₹${parseFloat(amount).toLocaleString('en-IN')}`;

document.getElementById('rService').innerText=paymentFor;

document.getElementById('qrcode').innerHTML='';

new QRCode(document.getElementById('qrcode'),{

text:upiLink,
width:220,
height:220

});

}

function sendWhatsapp(){

const d=paymentData;

const message=
`Dear *${d.clientName}* 👋

Welcome to *CMFilings Payment Portal*

━━━━━━━━━━━━━━━

📋 Payment Details

• Client ID : ${d.clientId}

• Service : ${d.paymentFor}

• Amount : ₹${parseFloat(d.amount).toLocaleString('en-IN')}

━━━━━━━━━━━━━━━

🔗 Click Here To Pay

${d.clientLink}

━━━━━━━━━━━━━━━

📞 Support : +91 9946151111

Official Payment Request From CMFilings`;

const url=
`https://wa.me/91${d.mobile}?text=${encodeURIComponent(message)}`;

window.open(url,'_blank');

}

</script>

</body>
</html>
