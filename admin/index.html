<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login | CM Filings ERP</title>

    <link rel="icon" href="assets/logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        /* --- STRICT NAVY & RED BRAND STYLES --- */
        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        :root {
            /* Light Theme Backgrounds */
            --bg: #f4f6f9;         
            --card: #ffffff;       
            --card-grey: #f8fafc;  
            
            /* Core Brand Colors */
            --dark-blue: #061E5C;  
            --logo-red: #E95455;   
            --action-blue: #6589DA; 
            
            /* Text Variables */
            --text: #0A1128;       
            --sub: #475569;        
            
            /* Structural Variables */
            --shadow: 0 10px 40px rgba(6, 30, 92, 0.08);
            --card-border: rgba(6, 30, 92, 0.1);
            --radius-card: 16px;
            --radius-btn: 8px;
        }

        /* Deep Navy Dark Mode */
        .dark {
            --bg: #0A1128;         
            --card: #121E3F;       
            --card-grey: #1B2A54;  
            --text: #FFFFFF;       
            --sub: #9EB1D6;        
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
            --card-border: rgba(255,255,255,0.08);
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .text-logo-red { color: var(--logo-red) !important; }

        .glass-card { 
            background: var(--card); 
            border-radius: var(--radius-card); 
            box-shadow: var(--shadow); 
            border: 1px solid var(--card-border); 
            width: 100%; 
            max-width: 440px; 
            padding: 40px 30px; 
            text-align: center;
        }

        /* Buttons */
        .btn-google {
            background-color: var(--card) !important; 
            color: var(--text) !important;
            padding: 14px 24px; 
            border-radius: var(--radius-btn); 
            font-weight: 700;
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            cursor: pointer; 
            border: 1px solid var(--card-border); 
            font-size: 15px; 
            width: 100%;
            box-shadow: 0 4px 12px rgba(6, 30, 92, 0.05);
        }
        .btn-google:hover { 
            border-color: var(--action-blue); 
            background: var(--card-grey) !important; 
            transform: translateY(-2px); 
        }
        .btn-google img, .btn-google svg { width: 22px; height: 22px; }

        .circle-btn {
            position: absolute; 
            top: 20px; 
            right: 20px;
            width: 46px; 
            height: 46px; 
            border: none; 
            border-radius: 50%;
            background: var(--card); 
            color: var(--text); 
            display: flex; 
            align-items: center;
            justify-content: center; 
            font-size: 18px; 
            border: 1px solid var(--card-border); 
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        .circle-btn:hover { color: var(--action-blue); border-color: var(--action-blue); background: var(--card-grey); }

        .dark .invert-logo { filter: brightness(0) invert(1); }

        /* Error Message Box (Warning Red) */
        .error-box {
            background: rgba(233, 84, 85, 0.1); 
            border: 1px solid rgba(233, 84, 85, 0.3);
            color: var(--logo-red); 
            padding: 12px; 
            border-radius: var(--radius-btn);
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 20px; 
            display: none;
        }

        /* Headings - Using Dark Blue to prevent negative assumption, unless it's a branding logo */
        h1 { color: var(--dark-blue); }
        .dark h1 { color: #ffffff; }
    </style>
</head>
<body>

    <div id="splash-screen" class="fixed inset-0 z-[10000] bg-[var(--bg)] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="flex items-center justify-center animate-pulse px-6">
            <img src="assets/name.png" alt="CM Filings" class="h-16 md:h-20 w-auto object-contain invert-logo" onerror="this.style.display='none'">
        </div>
        <div class="mt-8 w-8 h-8 border-4 border-[rgba(6,30,92,0.1)] dark:border-[rgba(255,255,255,0.1)] border-t-[var(--logo-red)] rounded-full animate-spin"></div>
    </div>

    <button class="circle-btn" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle Light/Dark Mode">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="container flex justify-center px-4 w-full">
        <div class="glass-card">
            
            <img src="assets/logo.png" alt="CM Filings Logo" class="h-16 mx-auto mb-6 invert-logo" onerror="this.style.display='none'">
            
            <h1 class="text-2xl font-extrabold mb-2">Secure Admin Access</h1>
            <p class="text-sm text-[var(--sub)] font-medium mb-8">Sign in to access the CM Filings ERP & CRM Dashboard. Authorized personnel only.</p>
            
            <button id="googleLoginBtn" class="btn-google" onclick="loginWithGoogle()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Continue with Google
            </button>

            <div id="errorMsg" class="error-box">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="errorText">Access Denied. Unauthorized Email.</span>
            </div>

            <div class="mt-8 pt-6 border-t border-[var(--card-border)]">
                <a href="../index.html" class="text-sm font-bold text-[var(--action-blue)] hover:text-[var(--dark-blue)] dark:hover:text-[#9EB1D6] transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Return to Main Website
                </a>
            </div>
            
        </div>
    </div>

    <script>
        // --- 1. THEME LOGIC ---
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btnIcon = document.querySelector('#themeToggleBtn i');
            if (document.body.classList.contains('dark')) {
                btnIcon.classList.remove('fa-moon');
                btnIcon.classList.add('fa-sun');
            } else {
                btnIcon.classList.remove('fa-sun');
                btnIcon.classList.add('fa-moon');
            }
        }

        // --- 2. FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBqbdmDKe6x_nWzkm6OwOX19QyJgCb7arM",
            authDomain: "cmfilings-firebase.firebaseapp.com",
            projectId: "cmfilings-firebase",
            storageBucket: "cmfilings-firebase.firebasestorage.app",
            messagingSenderId: "55459718043",
            appId: "1:55459718043:web:054cbd500c00ebf3cd373e"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // The ONLY allowed email address
        const AUTHORIZED_EMAIL = "cmfilings.in@gmail.com";

        // --- 3. ON LOAD LOGIC ---
        window.addEventListener('load', () => {
            // Remove splash screen
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => { splash.style.display = 'none'; }, 500);
                }
            }, 600);

            // Auto-redirect if already logged in with the correct email
            auth.onAuthStateChanged((user) => {
                if (user && user.email === AUTHORIZED_EMAIL) {
                    window.location.href = 'dashboard.html';
                }
            });
        });

        // --- 4. GOOGLE LOGIN LOGIC ---
        function loginWithGoogle() {
            const btn = document.getElementById('googleLoginBtn');
            const errorBox = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            
            // Reset UI
            errorBox.style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-[var(--action-blue)] text-lg"></i> Authenticating...';
            btn.style.pointerEvents = 'none';

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    
                    // STRICT SECURITY CHECK
                    if (user.email === AUTHORIZED_EMAIL) {
                        // Success! Proceed to dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        // Unauthorized Email -> Sign them out immediately
                        auth.signOut().then(() => {
                            showError(`Access Denied. ${user.email} is not authorized.`);
                        });
                    }
                })
                .catch((error) => {
                    console.error("Login Error:", error);
                    showError(error.message);
                });
        }

        function showError(message) {
            const btn = document.getElementById('googleLoginBtn');
            const errorBox = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            errorText.innerText = message;
            errorBox.style.display = 'block';
            
            // Reset Button
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Continue with Google
            `;
            btn.style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
