<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM | BizMa Admin</title>

    <!-- PWA Links -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <meta name="theme-color" content="#10b981">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- External Tailwind Config -->
    <script src="js/tailwind-config.js"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex h-screen overflow-hidden selection:bg-brand-500 selection:text-white">

    <datalist id="clientDatalist"></datalist>

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-gray-900 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="assets/logo.png" alt="CM Logo" class="w-20 h-20 object-contain mb-4">
        <img src="assets/name.png" alt="CM BizMa" class="h-8 object-contain">
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900/50 z-40 hidden lg:hidden backdrop-blur-sm" onclick="toggleMobileSidebar()"></div>

    <!-- Sidebar (Visible on Desktop, hidden on Mobile by default) -->
    <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:relative lg:translate-x-0 flex flex-col shadow-sm">
        <div class="h-16 flex items-center px-4 border-b border-gray-100 overflow-hidden shrink-0">
            <div class="flex items-center flex-shrink-0">
                <img src="assets/logo.png" alt="Logo" class="w-8 h-8 object-contain mr-2">
                <img src="assets/name.png" alt="CM BizMa" class="h-5 object-contain sidebar-text show-text">
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1.5 overflow-x-hidden" id="desktop-nav">
            <button class="side-item w-full flex items-center px-3 py-2.5 bg-brand-50 text-brand-700 rounded-xl font-semibold transition-colors group" id="side-dashboard" onclick="switchTab('dashboard')">
                <i class="fa-solid fa-chart-pie w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Overview</span>
            </button>
            <button class="side-item w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group" id="side-clients" onclick="switchTab('clients')">
                <i class="fa-solid fa-users w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Clients Directory</span>
            </button>
            <button class="side-item w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group" id="side-credentials" onclick="switchTab('credentials')">
                <i class="fa-solid fa-key w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Credentials Vault</span>
            </button>
            <button class="side-item w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group" id="side-tasks" onclick="switchTab('tasks')">
                <i class="fa-solid fa-list-check w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Task Manager</span>
            </button>
            <button class="side-item w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group" id="side-transactions" onclick="switchTab('transactions')">
                <i class="fa-solid fa-money-bill-transfer w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Transactions</span>
            </button>
            <button class="side-item w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group" id="side-calc" onclick="switchTab('calc')">
                <i class="fa-solid fa-calculator w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">Calculator</span>
            </button>
            <div class="my-4 border-t border-gray-100"></div>
            <a href="gstr.html" class="w-full flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 hover:text-brand-600 rounded-xl font-medium transition-colors group">
                <i class="fa-solid fa-file-invoice-dollar w-5 text-center flex-shrink-0"></i><span class="sidebar-text show-text ml-3">GST Return Tool</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50/50">
        
        <!-- HIDDEN BY DEFAULT: Header -->
        <header id="main-header" class="hidden h-16 bg-white border-b border-gray-200 items-center justify-between px-4 sm:px-6 lg:px-8 shadow-sm z-10">
            <div class="flex items-center gap-3 lg:hidden">
                <button onclick="toggleMobileSidebar()" class="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-lg">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <img src="assets/name.png" alt="CM BizMa" class="h-5 object-contain">
            </div>

            <!-- Search Bar -->
            <div class="hidden lg:flex flex-1 justify-start pl-2">
                <div class="max-w-md w-full relative group">
                    <label for="global-search" class="absolute inset-y-0 left-0 pl-3 flex items-center cursor-pointer">
                        <i class="fa-solid fa-search text-gray-400 group-focus-within:text-brand-500 transition-colors"></i>
                    </label>
                    <input type="text" id="global-search" class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 text-sm transition-all outline-none" placeholder="Search records..." onkeyup="handleSearch()">
                </div>
            </div>

            <div class="flex items-center gap-2 sm:gap-3 ml-auto">
                <button class="w-10 h-10 rounded-full bg-gray-50 text-gray-500 hover:text-brand-600 hover:bg-brand-50 flex items-center justify-center border border-gray-200" onclick="toggleViewMode()" title="Toggle View">
                    <i id="view-icon" class="fa-solid fa-grip"></i>
                </button>
                <button class="w-10 h-10 rounded-full bg-gray-50 text-gray-500 hover:text-brand-600 hover:bg-brand-50 flex items-center justify-center border border-gray-200" onclick="fetchApiData()" title="Sync Data">
                    <i class="fa-solid fa-rotate" id="sync-icon"></i>
                </button>
            </div>
        </header>

        <!-- Dynamic Views Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-24 lg:pb-8">
            <div id="view-dashboard" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
            <div id="view-clients" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
            <div id="view-credentials" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
            <div id="view-tasks" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
            <div id="view-transactions" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
            <div id="view-calc" class="tab-section hidden opacity-0 transition-opacity space-y-6">...</div>
        </main>

        <!-- HIDDEN BY DEFAULT: Mobile Bottom Nav -->
        <nav id="mobile-bottom-nav" class="hidden lg:hidden absolute bottom-0 left-0 w-full bg-white border-t border-gray-200 justify-between items-center pb-safe pt-2 px-1 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40">
            <button class="nav-item flex flex-col items-center justify-center w-[16%] h-14 text-brand-600 transition-colors" id="nav-dashboard" onclick="switchTab('dashboard')">
                <i class="fa-solid fa-chart-pie text-[18px] mb-1"></i><span class="text-[10px] font-bold">Home</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center w-[16%] h-14 text-gray-400 hover:text-gray-600 transition-colors" id="nav-clients" onclick="switchTab('clients')">
                <i class="fa-solid fa-users text-[18px] mb-1"></i><span class="text-[10px] font-bold">Clients</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center w-[16%] h-14 text-gray-400 hover:text-gray-600 transition-colors" id="nav-tasks" onclick="switchTab('tasks')">
                <i class="fa-solid fa-list-check text-[18px] mb-1"></i><span class="text-[10px] font-bold">Tasks</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center w-[16%] h-14 text-gray-400 hover:text-gray-600 transition-colors" id="nav-transactions" onclick="switchTab('transactions')">
                <i class="fa-solid fa-money-bill-transfer text-[18px] mb-1"></i><span class="text-[10px] font-bold">Trans</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center w-[16%] h-14 text-gray-400 hover:text-gray-600 transition-colors" id="nav-calc" onclick="switchTab('calc')">
                <i class="fa-solid fa-calculator text-[18px] mb-1"></i><span class="text-[10px] font-bold">Calc</span>
            </button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold z-[3000] transition-all duration-300 opacity-0 pointer-events-none shadow-xl flex items-center gap-2">Action Successful</div>

    <!-- Modals go here -->

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
