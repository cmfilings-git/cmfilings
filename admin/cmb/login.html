<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CMB Business App</title>
    
    <!-- Google Fonts: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                    },
                    colors: {
                        google: {
                            blue: '#1a73e8',
                            blueHover: '#174ea6',
                            blueLight: '#e8f0fe',
                            grayBg: '#f8f9fa',
                            border: '#dadce0',
                            textDark: '#202124',
                            textMuted: '#5f6368'
                        }
                    },
                    boxShadow: {
                        'gds': '0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15)',
                        'gds-sm': '0 1px 2px 0 rgba(60,64,67,0.1)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-google-grayBg dark:bg-gray-900 text-google-textDark font-sans antialiased min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 transition-colors duration-300">

    <!-- Theme Toggle (Optional, positioned top right) -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6">
        <button id="themeToggleBtn" class="p-2 text-google-textMuted dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition-colors focus:outline-none" title="Toggle Light/Dark Mode">
            <i id="themeIcon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- Login Container -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Logo -->
        <div class="flex justify-center items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-google-blue rounded-lg flex items-center justify-center shadow-sm">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <span class="font-medium text-3xl tracking-tight text-google-textDark dark:text-gray-100">CMB App</span>
        </div>
        
        <h2 class="text-center text-xl font-normal text-google-textDark dark:text-gray-100">
            Sign in to your account
        </h2>
        <p class="mt-2 text-center text-sm text-google-textMuted dark:text-gray-400">
            Custom Management Business Application
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white dark:bg-gray-800 py-8 px-4 shadow-gds sm:rounded-lg sm:px-10 border border-google-border dark:border-gray-700 transition-colors">
            
            <form id="loginForm" class="space-y-6" action="dashboard.html" method="GET">
                
                <!-- Username / Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-google-textDark dark:text-gray-200">
                        Email address or Username
                    </label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-4 w-4 text-gray-400 dark:text-gray-500"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            class="block w-full pl-10 pr-3 py-2 border border-google-border dark:border-gray-600 rounded-md focus:outline-none focus:ring-1 focus:ring-google-blue focus:border-google-blue sm:text-sm bg-transparent dark:text-white placeholder-gray-400 transition-colors" 
                            placeholder="admin@cmfilings.com">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-google-textDark dark:text-gray-200">
                        Password
                    </label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-4 w-4 text-gray-400 dark:text-gray-500"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                            class="block w-full pl-10 pr-10 py-2 border border-google-border dark:border-gray-600 rounded-md focus:outline-none focus:ring-1 focus:ring-google-blue focus:border-google-blue sm:text-sm bg-transparent dark:text-white placeholder-gray-400 transition-colors" 
                            placeholder="••••••••">
                        
                        <!-- Toggle Password Visibility -->
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                                <i data-lucide="eye" id="eyeIcon" class="h-4 w-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 text-google-blue focus:ring-google-blue border-gray-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-google-textMuted dark:text-gray-400 cursor-pointer">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-google-blue hover:text-google-blueHover">
                            Forgot your password?
                        </a>
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" 
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-google-blue hover:bg-google-blueHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-google-blue transition-colors gap-2 items-center">
                        Sign in
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">
                            Secure Enterprise Portal
                        </span>
                    </div>
                </div>
            </div>

        </div>
        
        <!-- Footer Link -->
        <p class="mt-6 text-center text-sm text-google-textMuted dark:text-gray-400">
            Don't have an account? 
            <a href="mailto:cmbapp@cmfilings.com" class="font-medium text-google-blue hover:text-google-blueHover">
                Contact your administrator
            </a>
        </p>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Password Visibility Toggle Logic ---
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the icon between eye and eye-off
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons(); // Re-render the icon
        });

        // --- Handle Login Submission (Demo purposes) ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent standard form submission
            
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Show loading state
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Authenticating...`;
            lucide.createIcons();
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            // Simulate network request then redirect
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        });

        // --- Light / Dark Mode Toggle Logic ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;

        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            htmlElement.classList.add('dark');
            updateThemeIcon(true);
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });

        function updateThemeIcon(isDark) {
            themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons(); 
        }
    </script>
</body>
</html>
