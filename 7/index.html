<!doctype html>
<html lang="en" class="h-full" style="scroll-behavior:smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMFilings | CRM-Admin</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fff1f2',
              100: '#ffe4e6',
              200: '#fecdd3',
              500: '#f43f5e',
              600: '#C70011', /* Primary CMFilings Red */
              700: '#9f000d',
              800: '#88000b',
            },
            navy: '#0f172a',
            surface: '#f8fafc', 
            cmRed: '#C70011'
          },
          fontFamily: {
            heading: ['Inter', 'sans-serif'], 
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-surface dark:bg-slate-900 text-slate-800 dark:text-white font-body transition-colors overflow-hidden selection:bg-brand-200 selection:text-brand-900">

  <nav class="sticky top-0 z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="w-8 h-8 bg-brand-600 rounded flex items-center justify-center text-white font-bold text-lg shadow-sm">
          C
        </div>
        <div class="flex flex-col">
          <span class="font-bold text-lg text-slate-900 dark:text-white tracking-tight leading-none">CMFILINGS</span>
          <span class="text-[9px] text-brand-600 font-bold tracking-widest uppercase mt-0.5">Directory</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative hidden sm:block">
          <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
          <input type="text" id="searchInput" oninput="searchClients()" placeholder="Search clients..." class="pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:border-brand-600 outline-none transition w-64 shadow-inner">
        </div>
        
        <button id="syncBtn" onclick="syncFromSheet()" class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition border border-slate-200 dark:border-slate-700 flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync 
        </button>

        <button onclick="openModal()" class="px-4 py-2 bg-brand-600 text-white text-sm font-semibold rounded-lg hover:bg-brand-700 transition shadow-sm flex items-center gap-2">
          <i data-lucide="user-plus" class="w-4 h-4"></i> New Client
        </button>
        <button id="themeToggle" class="p-2 ml-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-[1400px] mx-auto p-4 sm:p-6 h-[calc(100vh-64px)] flex flex-col">
    <div class="bg-white dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex-1 overflow-hidden flex flex-col">
      <div class="overflow-x-auto overflow-y-auto custom-scrollbar flex-1">
        <table class="w-full text-left border-collapse whitespace-nowrap text-sm">
          <thead class="sticky top-0 bg-slate-50 dark:bg-slate-900 z-10 border-b border-slate-200 dark:border-slate-700">
            <tr class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider font-semibold">
              <th class="p-4 w-24">Actions</th>
              <th class="p-4">Client ID</th>
              <th class="p-4">Client Name</th>
              <th class="p-4">GST No</th>
              <th class="p-4">Mobile No</th>
            </tr>
          </thead>
          <tbody id="clientTableBody" class="divide-y divide-slate-100 dark:divide-slate-700/50">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="clientModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl border border-slate-200 dark:border-slate-700">
      <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
        <h2 id="modalTitle" class="text-xl font-heading font-extrabold tracking-tight text-slate-900 dark:text-white">Add / Edit Client</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-brand-600 transition bg-slate-100 dark:bg-slate-800 p-2 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
        <form id="clientForm" class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="md:col-span-3">
            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Client ID (Auto-Generated)</label>
            <input type="text" id="ClientID" readonly class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-mono cursor-not-allowed text-slate-500">
          </div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Client Name *</label><input type="text" id="ClientName" required class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Legal Name</label><input type="text" id="LegalName" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Mobile No *</label><input type="tel" id="MobileNo" required class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Email</label><input type="email" id="Email" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Branch</label><input type="text" id="Branch" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Constitution of Business</label><input type="text" id="Constitution" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">GST No</label><input type="text" id="GSTNo" class="form-input uppercase" maxlength="15"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">PAN No</label><input type="text" id="PanNo" class="form-input uppercase" maxlength="10"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Aadhaar No</label><input type="text" id="AdharNo" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Father's Name</label><input type="text" id="FathersName" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">DOB / DOC</label><input type="date" id="DOB" class="form-input"></div>
          <div class="md:col-span-2"><label class="block text-xs font-bold text-slate-500 mb-1">Address</label><input type="text" id="Address" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Reference</label><input type="text" id="Reference" class="form-input"></div>
          <div class="md:col-span-2"><label class="block text-xs font-bold text-slate-500 mb-1">Notes</label><input type="text" id="Notes" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Folder Link</label><input type="url" id="FolderLink" class="form-input"></div>
        </form>
      </div>
      <div class="p-6 border-t border-slate-100 dark:border-slate-800 flex justify-between bg-slate-50 dark:bg-slate-800/50 rounded-b-2xl">
        <button id="modalDeleteBtn" onclick="triggerDeleteFromModal()" class="px-4 py-2 text-sm font-bold text-brand-600 hover:bg-brand-50 dark:hover:bg-brand-900/20 rounded-lg transition hidden flex items-center gap-2">
          <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
        </button>
        <div class="flex gap-3 ml-auto">
            <button onclick="closeModal()" class="px-6 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition">Cancel</button>
            <button onclick="saveClient()" id="saveBtn" class="px-6 py-2 text-sm font-semibold bg-brand-600 text-white rounded-lg hover:bg-brand-700 shadow-sm transition flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Save Client
            </button>
        </div>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-sm p-6 text-center shadow-2xl border border-slate-200 dark:border-slate-800">
      <div class="w-16 h-16 bg-brand-50 dark:bg-brand-900/30 text-brand-600 flex items-center justify-center rounded-full mx-auto mb-4">
        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
      </div>
      <h2 class="text-xl font-heading font-extrabold text-slate-900 dark:text-white mb-2">Delete Client?</h2>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Are you sure you want to delete <span id="deleteClientName" class="font-bold text-slate-900 dark:text-white"></span>?</p>
      <div class="flex gap-3 justify-center">
        <button onclick="closeDeleteModal()" class="px-6 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition">Cancel</button>
        <button id="confirmDeleteBtn" class="px-6 py-2 text-sm font-semibold bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition shadow-lg shadow-brand-500/20">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
