<!doctype html>
<html lang="en" class="h-full" style="scroll-behavior:smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMFilings | Directory</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: {
        extend: {
          colors: {
            ea: {
              green: '#569071',
              dark: '#374151',
              light: '#f4f6fa'
            }
          },
          fontFamily: {
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-ea-light dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-body transition-colors overflow-hidden">

  <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm sticky top-0 z-50">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-ea-green rounded flex items-center justify-center text-white font-bold text-xl">
          <i data-lucide="check-square" class="w-6 h-6"></i>
        </div>
        <div class="flex flex-col leading-none">
          <span class="font-bold text-lg text-ea-green tracking-tight">CMFILINGS</span>
          <span class="text-[10px] text-slate-500 font-semibold tracking-widest uppercase mt-1">Directory</span>
        </div>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <div class="relative hidden md:block">
          <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
          <input type="text" id="searchInput" oninput="searchClients()" placeholder="Search..." class="pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded text-sm focus:border-ea-green outline-none transition w-48 lg:w-64">
        </div>
        
        <button id="syncBtn" onclick="syncFromSheet()" class="px-3 py-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-semibold rounded hover:bg-slate-200 transition flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i> <span class="hidden sm:inline">Sync</span>
        </button>

        <button onclick="openEditModal()" class="px-3 py-2 bg-ea-dark text-white text-sm font-semibold rounded hover:bg-slate-700 transition flex items-center gap-2 shadow-sm">
          <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden sm:inline">New Client</span>
        </button>
        
        <button id="themeToggle" class="p-2 ml-1 text-slate-400 hover:text-ea-green transition">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 pt-6">
    <div class="bg-ea-green text-white p-4 sm:p-6 rounded-t-lg shadow-sm flex items-center justify-between">
      <h2 class="text-xl font-semibold tracking-wide">CLIENT DIRECTORY</h2>
    </div>
  </div>

  <main class="max-w-[1400px] mx-auto px-4 sm:px-6 pb-6 h-[calc(100vh-140px)] flex flex-col">
    <div class="bg-white dark:bg-slate-800 border border-t-0 border-slate-200 dark:border-slate-700 shadow-sm rounded-b-lg flex-1 overflow-hidden flex flex-col">
      <div class="overflow-x-auto custom-scrollbar flex-1">
        <table class="w-full text-left border-collapse whitespace-nowrap text-sm">
          <thead class="sticky top-0 bg-slate-50 dark:bg-slate-900 z-10 border-b border-slate-200 dark:border-slate-700">
            <tr class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider font-semibold">
              <th class="p-4 cursor-pointer hover:text-ea-green transition select-none" onclick="sortTable('ClientID')">
                <div class="flex items-center gap-1">Client ID <i data-lucide="arrow-up-down" class="w-3 h-3"></i></div>
              </th>
              <th class="p-4 cursor-pointer hover:text-ea-green transition select-none" onclick="sortTable('ClientName')">
                <div class="flex items-center gap-1">Client Name <i data-lucide="arrow-up-down" class="w-3 h-3"></i></div>
              </th>
              <th class="p-4 cursor-pointer hover:text-ea-green transition select-none" onclick="sortTable('LegalName')">
                <div class="flex items-center gap-1">Legal Name <i data-lucide="arrow-up-down" class="w-3 h-3"></i></div>
              </th>
              <th class="p-4 cursor-pointer hover:text-ea-green transition select-none" onclick="sortTable('MobileNo')">
                <div class="flex items-center gap-1">Mobile No <i data-lucide="arrow-up-down" class="w-3 h-3"></i></div>
              </th>
            </tr>
          </thead>
          <tbody id="clientTableBody" class="divide-y divide-slate-100 dark:divide-slate-700/50">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="viewModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
      
      <div class="bg-slate-800 text-white p-6 relative">
        <button onclick="closeViewModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div>
            <h2 id="viewClientName" class="text-2xl font-bold">Client Name</h2>
            <p id="viewClientID" class="text-ea-green font-mono text-sm mt-1">C00000</p>
          </div>
          <div class="flex items-center gap-3 bg-slate-700/50 p-2 rounded-lg">
            <button id="btnViewEdit" class="p-2 bg-slate-600 hover:bg-slate-500 rounded text-white transition" title="Edit Client">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <a id="btnViewCall" href="#" class="p-2 bg-blue-500/20 text-blue-400 hover:bg-blue-500/40 rounded transition" title="Call">
              <i data-lucide="phone" class="w-4 h-4"></i>
            </a>
            <a id="btnViewWa" href="#" target="_blank" class="p-2 bg-green-500/20 text-green-400 hover:bg-green-500/40 rounded transition" title="WhatsApp">
              <i data-lucide="message-circle" class="w-4 h-4"></i>
            </a>
          </div>
        </div>
      </div>

      <div class="overflow-y-auto custom-scrollbar p-6 space-y-8">
        <div>
          <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 dark:border-slate-800 pb-2">Business Details</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-6 text-sm" id="viewDetailsGrid">
            </div>
        </div>

        <div>
          <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
            <i data-lucide="lock" class="w-4 h-4"></i> Credentials (View Only)
          </h3>
          <div class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
              <thead class="bg-slate-100 dark:bg-slate-800">
                <tr class="text-xs text-slate-500 uppercase">
                  <th class="px-4 py-3 font-semibold">Portal Name</th>
                  <th class="px-4 py-3 font-semibold">Username</th>
                  <th class="px-4 py-3 font-semibold">Password</th>
                </tr>
              </thead>
              <tbody id="credentialsTableBody" class="divide-y divide-slate-200 dark:divide-slate-700">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
      <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-ea-green text-white rounded-t-xl">
        <h2 id="editModalTitle" class="text-xl font-bold tracking-wide">Add New Client</h2>
        <button onclick="closeEditModal()" class="text-white/80 hover:text-white transition"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
        <form id="clientForm" class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="md:col-span-3">
            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Client ID (Auto)</label>
            <input type="text" id="ClientID" readonly class="w-full px-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded text-sm font-mono cursor-not-allowed text-slate-500">
          </div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Client Name *</label><input type="text" id="ClientName" required class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Legal Name</label><input type="text" id="LegalName" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Mobile No *</label><input type="tel" id="MobileNo" required class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Email</label><input type="email" id="Email" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Branch</label><input type="text" id="Branch" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Constitution</label><input type="text" id="Constitution" class="form-input"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">GST No</label><input type="text" id="GSTNo" class="form-input uppercase" maxlength="15"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">PAN No</label><input type="text" id="PanNo" class="form-input uppercase" maxlength="10"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Folder Link</label><input type="url" id="FolderLink" class="form-input"></div>
          <div class="md:col-span-3">
             <p class="text-xs text-slate-400 italic mb-2 border-b pb-1">Credentials (Add records manually here if required)</p>
             <div class="grid grid-cols-3 gap-2">
               <input type="text" id="CredPortal" placeholder="Portal (e.g. GST)" class="form-input">
               <input type="text" id="CredUser" placeholder="Username" class="form-input">
               <input type="text" id="CredPass" placeholder="Password" class="form-input">
             </div>
          </div>
        </form>
      </div>
      <div class="p-6 border-t border-slate-100 dark:border-slate-800 flex justify-between bg-slate-50 dark:bg-slate-900 rounded-b-xl">
        <button id="modalDeleteBtn" onclick="triggerDelete()" class="px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition hidden flex items-center gap-2">
          <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
        </button>
        <div class="flex gap-3 ml-auto">
            <button onclick="closeEditModal()" class="px-6 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded transition">Cancel</button>
            <button onclick="saveClient()" id="saveBtn" class="px-6 py-2 text-sm font-semibold bg-ea-dark text-white rounded hover:bg-slate-700 transition flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Save
            </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
