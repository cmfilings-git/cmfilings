<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM|Books - Credentials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #cb2427; --app-bg: #f7f9fc; --card-bg: #ffffff; --text-main: #0f172a; --text-sub: #64748b; --border-color: #f1f5f9; }
        body.dark-mode { --app-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sub: #cbd5e1; --border-color: #334155; }
        * { font-family: 'Inter', sans-serif; }
        body { background-color: var(--app-bg); color: var(--text-main); padding-bottom: 90px; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--card-bg); color: var(--text-main); }
        .fab-menu-container { position: fixed; bottom: 80px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .fab-item { width: 46px; height: 46px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); opacity: 0; transform: translateY(20px); transition: 0.3s ease; }
        .fab-menu-container.active .fab-item { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .fab-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 150; opacity: 0; pointer-events: none; transition: 0.3s; }
        .fab-overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <nav class="p-4 border-b flex justify-between items-center bg-[var(--card-bg)] border-[var(--border-color)]">
        <h2 class="font-bold text-lg">Logins & Portals</h2>
        <button onclick="openModal()" class="bg-[var(--primary)] text-white px-4 py-2 rounded-xl text-sm"><i class="fa-solid fa-plus mr-2"></i>Add Portal Creds</button>
    </nav>

    <div class="p-4">
        <div class="bg-[var(--card-bg)] border rounded-2xl overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b text-xs text-[var(--text-sub)] uppercase">
                        <th class="p-4">ID</th><th>Client Name</th><th>Portal</th><th>Username</th><th>Password</th>
                    </tr>
                </thead>
                <tbody id="credsTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="credsModal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-[var(--card-bg)] p-6 rounded-2xl w-full max-w-md border">
            <h3 class="font-bold text-base mb-4">Add Logins</h3>
            <div class="space-y-3">
                <div class="input-group"><label>ID</label><input type="text" id="cr_id" disabled></div>
                <div class="input-group">
                    <label>Client Name (Searchable)</label>
                    <input type="text" id="cr_client_name" list="clientListOptions" oninput="autoFillId(this.value)" placeholder="Search client...">
                    <datalist id="clientListOptions"></datalist>
                </div>
                <div class="input-group"><label>Client ID</label><input type="text" id="cr_client_id" readonly placeholder="Auto-filled"></div>
                <div class="input-group"><label>Portal Description</label><input type="text" id="cr_portal" placeholder="e.g. GST, Income Tax"></div>
                <div class="input-group"><label>Username</label><input type="text" id="cr_user"></div>
                <div class="input-group"><label>Password</label><input type="text" id="cr_pass"></div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal()" class="px-4 py-2">Cancel</button>
                <button onclick="saveCreds()" class="bg-[var(--primary)] text-white px-4 py-2 rounded-xl">Save Entry</button>
            </div>
        </div>
    </div>

    <div class="fab-overlay" id="fabOverlay" onclick="toggleFabMenu()"></div>
    <div class="fab-menu-container" id="fabMenuContainer">
        <a href="company.html" class="fab-item"><i class="fa-solid fa-building"></i></a>
        <a href="branches.html" class="fab-item"><i class="fa-solid fa-code-branch"></i></a>
        <a href="bank.html" class="fab-item"><i class="fa-solid fa-book"></i></a>
        <a href="cash.html" class="fab-item"><i class="fa-solid fa-wallet"></i></a>
    </div>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 h-[68px] flex justify-around items-center border-t bg-[var(--card-bg)] border-[var(--border-color)]">
        <a href="index.html" class="tab-btn"><i class="fa-solid fa-chart-pie"></i>Dashboard</a>
        <a href="clients.html" class="tab-btn"><i class="fa-solid fa-users"></i>Clients</a>
        <a href="credentials.html" class="tab-btn active"><i class="fa-solid fa-key"></i>Credentials</a>
        <a href="task.html" class="tab-btn"><i class="fa-solid fa-list-check"></i>Tasks</a>
        <button class="tab-btn" onclick="toggleFabMenu()"><i class="fa-solid fa-bars"></i>Menu</button>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        const firebaseConfig = {
            apiKey: "AIzaSyBqbdmDKe6x_nWzkm6OwOX19QyJgCb7arM",
            authDomain: "cmfilings-firebase.firebaseapp.com",
            projectId: "cmfilings-firebase",
            storageBucket: "cmfilings-firebase.firebasestorage.app",
            messagingSenderId: "55459718043",
            appId: "1:55459718043:web:054cbd500c00ebf3cd373e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let clients = [], credsCount = 0;

        function toggleFabMenu() {
            document.getElementById('fabOverlay').classList.toggle('active');
            document.getElementById('fabMenuContainer').classList.toggle('active');
        }

        async function init() {
            const [cSnap, crSnap] = await Promise.all([db.collection("Clients").get(), db.collection("Credentials").get()]);
            clients = cSnap.docs.map(d => d.data());
            credsCount = crSnap.size;
            
            document.getElementById('clientListOptions').innerHTML = clients.map(c => `<option value="${c.Client_Name}"></option>`).join('');
            
            document.getElementById('credsTableBody').innerHTML = crSnap.docs.map(doc => {
                const c = doc.data();
                return `<tr class="border-b p-4">
                    <td class="p-4 font-bold">${c.ID}</td><td>${c.Client_Name}</td><td>${c.Portal}</td><td>${c.Username}</td><td>••••••••</td>
                </tr>`;
            }).join('');
        }

        function autoFillId(val) {
            const match = clients.find(c => c.Client_Name === val);
            document.getElementById('cr_client_id').value = match ? match.Client_ID : '';
        }

        function openModal() {
            document.getElementById('cr_id').value = 'CR' + String(1001 + credsCount);
            document.getElementById('credsModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('credsModal').style.display = 'none'; }

        async function saveCreds() {
            const entry = {
                ID: document.getElementById('cr_id').value,
                Client_Name: document.getElementById('cr_client_name').value,
                Client_ID: document.getElementById('cr_client_id').value,
                Portal: document.getElementById('cr_portal').value,
                Username: document.getElementById('cr_user').value,
                Password: document.getElementById('cr_pass').value
            };
            await db.collection("Credentials").doc(entry.ID).set(entry);
            closeModal();
            init();
        }
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
