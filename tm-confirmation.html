<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trademark Confirmation | CMFilings</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
    padding:20px;
}

.container{
    width:100%;
    max-width:850px;
    margin:auto;
    background:#161616;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #2d2d2d;
}

.banner{
    background:linear-gradient(135deg,#3d3d3d,#575757);
    padding:50px 30px;
    position:relative;
    overflow:hidden;
}

.banner:before{
    content:'';
    width:220px;
    height:220px;
    background:#87ece3;
    border-radius:50%;
    position:absolute;
    right:-70px;
    top:-70px;
}

.banner:after{
    content:'';
    width:140px;
    height:140px;
    background:#6200c8;
    border-radius:50%;
    position:absolute;
    right:50px;
    bottom:-60px;
}

.banner h1{
    position:relative;
    z-index:2;
    font-size:42px;
    color:#e0b3ff;
}

.banner p{
    position:relative;
    z-index:2;
    color:#ddd;
    margin-top:10px;
}

.content{
    padding:25px;
}

.heading{
    text-align:center;
    color:#d7a8ff;
    margin-bottom:25px;
}

.table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:25px;
}

.table td{
    border:1px solid #333;
    padding:12px;
    vertical-align:top;
    line-height:1.7;
}

.table td:first-child{
    width:220px;
    background:#1f1f1f;
    font-weight:bold;
}

.declaration{
    color:#d4d4d4;
    line-height:1.8;
    margin-bottom:30px;
    font-size:14px;
}

.otp-section{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.otp-input{
    width:120px;
    height:50px;
    background:#262626;
    border:none;
    border-radius:10px;
    color:#fff;
    text-align:center;
    font-size:24px;
    letter-spacing:5px;
}

.btn{
    background:#2fb344;
    border:none;
    color:#fff;
    padding:14px 28px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.note{
    text-align:center;
    color:#aaa;
    line-height:1.7;
    font-size:13px;
}

.success{
    text-align:center;
    padding:60px 20px;
}

.success h2{
    color:#38d26f;
    margin-bottom:15px;
}

.expired{
    text-align:center;
    padding:60px 20px;
    color:#ff6b6b;
}

.footer{
    text-align:center;
    padding:20px;
    color:#777;
    border-top:1px solid #2a2a2a;
}

@media(max-width:600px){

.banner h1{
    font-size:30px;
}

.table td{
    font-size:13px;
}

.table td:first-child{
    width:130px;
}

}

</style>

</head>
<body>

<div class="container">

<div class="banner">
    <h1>Confirmation</h1>
    <p>Please review and confirm the following filing information.</p>
</div>

<div class="content" id="contentArea">
    Loading...
</div>

<div class="footer">
    © 2026 CMFilings. All Rights Reserved.
</div>

</div>

<script>

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXXXXXX",
    appId: "XXXXXXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const clientId = params.get('id');

const contentArea = document.getElementById('contentArea');

let currentData = null;

async function loadClient(){

    if(!clientId){

        contentArea.innerHTML = `
            <div class="expired">
                Invalid Link
            </div>
        `;

        return;
    }

    try{

        const doc = await db.collection('clients').doc(clientId).get();

        if(!doc.exists){

            contentArea.innerHTML = `
                <div class="expired">
                    Client Data Not Found
                </div>
            `;

            return;
        }

        const data = doc.data();

        currentData = data;

        const profile = data.profile || {};
        const tm = data.tm || {};
        const confirmations = data.confirmations || {};

        const now = new Date();
        const expiry = new Date(confirmations.tmExpiresAt);

        if(now > expiry){

            contentArea.innerHTML = `
                <div class="expired">
                    <h2>Confirmation Link Expired</h2>
                    <br>
                    Please contact CMFilings support.
                </div>
            `;

            return;
        }

        if(confirmations.tmConfirmed === true){

            contentArea.innerHTML = `
                <div class="success">
                    <h2>Trademark Already Confirmed</h2>
                    <p>Thank you.</p>
                </div>
            `;

            return;
        }

        contentArea.innerHTML = `

        <h2 class="heading">Trademark Registration</h2>

        <table class="table">

            <tr>
                <td>Client ID</td>
                <td>${clientId}</td>
            </tr>

            <tr>
                <td>Client Name</td>
                <td>${profile.clientName || ''}</td>
            </tr>

            <tr>
                <td>Email</td>
                <td>${profile.email || ''}</td>
            </tr>

            <tr>
                <td>Mobile</td>
                <td>${profile.mobileNo || ''}</td>
            </tr>

            <tr>
                <td>Address</td>
                <td>${profile.address || ''}</td>
            </tr>

            <tr>
                <td>Trademark</td>
                <td>${tm.trademark || ''}</td>
            </tr>

            <tr>
                <td>Trademark Class</td>
                <td>${tm.class || ''}</td>
            </tr>

            <tr>
                <td>Status</td>
                <td>${tm.status || ''}</td>
            </tr>

            <tr>
                <td>Description</td>
                <td>${tm.description || ''}</td>
            </tr>

        </table>


        <div class="declaration">

            I, ${profile.clientName || ''}, solemnly affirm and declare that the information submitted herein is authentic and accurate to the best of my knowledge and belief.

        </div>


        <div class="otp-section">

            <button class="btn" onclick="confirmTrademark()">
                Accept
            </button>

            OTP:

            <input
                type="text"
                maxlength="4"
                class="otp-input"
                id="otp"
                placeholder="0000"
            >

        </div>


        <div class="note">
            OTP sent to registered Email / Mobile.<br>
            Link valid for 24 hours only.
        </div>

        `;

    }
    catch(error){

        console.log(error);

        contentArea.innerHTML = `
            <div class="expired">
                Error Loading Data
            </div>
        `;

    }
}


async function confirmTrademark(){

    const otp = document.getElementById('otp').value;

    const confirmData = currentData.confirmations;

    if(!otp){
        alert('Enter OTP');
        return;
    }

    if(otp !== confirmData.tmOtp){
        alert('Invalid OTP');
        return;
    }

    const now = new Date();
    const expiry = new Date(confirmData.tmExpiresAt);

    if(now > expiry){
        alert('OTP Expired');
        return;
    }

    try{

        await db.collection('clients')
        .doc(clientId)
        .update({

            'confirmations.tmConfirmed': true,
            'confirmations.tmStatus': 'Confirmed',
            'confirmations.tmConfirmedAt': new Date().toISOString(),
            'tm.status': 'Confirmed'

        });


        contentArea.innerHTML = `
            <div class="success">
                <h2>Trademark Confirmed Successfully</h2>
                <p>Thank you for confirming your filing.</p>
            </div>
        `;

    }
    catch(error){

        console.log(error);
        alert('Error while confirming');

    }
}

loadClient();

</script>

</body>
</html>
