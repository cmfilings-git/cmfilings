<form id="addClientForm" class="form-grid">
    <input type="hidden" id="formActionType" value="CREATE">
    
    <div class="form-group">
        <label for="f-clientid">Client ID (Read-only for Updates)</label>
        <input type="text" id="f-clientid" placeholder="Generated system value" readonly>
    </div>
    <div class="form-group">
        <label for="f-clientname">Client Name *</label>
        <input type="text" id="f-clientname" required placeholder="E.g. Alpha Private Ltd">
    </div>
    <div class="form-group">
        <label for="f-legalname">Legal Name</label>
        <input type="text" id="f-legalname" placeholder="E.g. Alpha Trading Corp">
    </div>
    <div class="form-group">
        <label for="f-mobileno">Mobile No *</label>
        <input type="text" id="f-mobileno" required placeholder="+91 XXXXX XXXXX">
    </div>
    <div class="form-group">
        <label for="f-email">Email ID</label>
        <input type="email" id="f-email" placeholder="corporate@alpha.com">
    </div>
    <div class="form-group">
        <label for="f-branch">Branch Location</label>
        <input type="text" id="f-branch" placeholder="E.g. Mumbai Main">
    </div>
    <div class="form-group">
        <label for="f-constitution">Constitution Type</label>
        <select id="f-constitution">
            <option value="Proprietorship">Proprietorship</option>
            <option value="Partnership">Partnership</option>
            <option value="LLP">LLP</option>
            <option value="Private Limited">Private Limited</option>
            <option value="Individual">Individual</option>
        </select>
    </div>
    <div class="form-group">
        <label for="f-gstno">GST No.</label>
        <input type="text" id="f-gstno" placeholder="22AAAAA0000A1Z5">
    </div>
    <div class="form-group">
        <label for="f-panno">PAN No.</label>
        <input type="text" id="f-panno" placeholder="ABCDE1234F">
    </div>
    <div class="form-group">
        <label for="f-adharno">Aadhar No.</label>
        <input type="text" id="f-adharno" placeholder="0000 0000 0000">
    </div>
    <div class="form-group">
        <label for="f-fathersname">Father's / Spouse Name</label>
        <input type="text" id="f-fathersname" placeholder="E.g. Senior Representative">
    </div>
    <div class="form-group">
        <label for="f-dob">DOB / Date of Incorporation</label>
        <input type="date" id="f-dob">
    </div>
    <div class="form-group full-width">
        <label for="f-address">Registered Address</label>
        <textarea id="f-address" rows="2" placeholder="Complete processing corporate address..."></textarea>
    </div>
    <div class="form-group">
        <label for="f-reference">Reference Account</label>
        <input type="text" id="f-reference" placeholder="E.g. External Auditor">
    </div>
    <div class="form-group">
        <label for="f-folderlink">Cloud File Directory Link</label>
        <input type="url" id="f-folderlink" placeholder="https://drive.google.com/share...">
    </div>
    <div class="form-group full-width">
        <label for="f-notes">Internal Processing Notes</label>
        <textarea id="f-notes" rows="2" placeholder="Compliance history tracking details..."></textarea>
    </div>
</form>
