<form id="addClientForm" class="form-grid" autocomplete="off">

```
<input type="hidden" id="formActionType" value="CREATE">

<div class="form-group">
    <label for="f-clientid">Client ID</label>
    <input type="text" id="f-clientid" readonly>
</div>

<div class="form-group">
    <label for="f-clientname">Client Name *</label>
    <input type="text" id="f-clientname" required>
</div>

<div class="form-group">
    <label for="f-mobileno">Mobile No *</label>
    <input type="tel" id="f-mobileno" inputmode="numeric" required>
</div>

<div class="form-group">
    <label for="f-email">Email</label>
    <input type="email" id="f-email">
</div>

<div class="form-group">
    <label for="f-branch">Branch</label>
    <input type="text" id="f-branch">
</div>

<div class="form-group">
    <label for="f-constitution">Constitution</label>
    <select id="f-constitution">
        <option value="Individual">Individual</option>
        <option value="Proprietorship">Proprietorship</option>
        <option value="Partnership">Partnership</option>
        <option value="LLP">LLP</option>
        <option value="Private Limited">Private Limited</option>
    </select>
</div>

<div class="form-group">
    <label for="f-gstno">GST No</label>
    <input type="text" id="f-gstno">
</div>

<div class="form-group">
    <label for="f-panno">PAN No</label>
    <input type="text" id="f-panno">
</div>

<div class="form-group">
    <label for="f-adharno">Aadhar No</label>
    <input type="tel" id="f-adharno" inputmode="numeric">
</div>

<div class="form-group">
    <label for="f-fathersname">Father's Name</label>
    <input type="text" id="f-fathersname">
</div>

<div class="form-group">
    <label for="f-dob">DOB / DOC</label>
    <input type="date" id="f-dob">
</div>

<div class="form-group">
    <label for="f-reference">Reference</label>
    <input type="text" id="f-reference">
</div>

<div class="form-group full-width">
    <label for="f-address">Address</label>
    <textarea id="f-address" rows="3"></textarea>
</div>

<div class="form-group full-width">
    <label for="f-folderlink">Folder Link</label>
    <input type="url" id="f-folderlink">
</div>

<div class="form-group full-width">
    <label for="f-notes">Notes</label>
    <textarea id="f-notes" rows="3"></textarea>
</div>
```

</form>
