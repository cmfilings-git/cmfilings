<form id="addCredentialsForm" class="form-grid">
    <input type="hidden" id="cred-formActionType" value="CREATE">
    
    <div class="form-group">
        <label>Client Name *</label>
        <select id="cred-clientname" required onchange="autoFillCredClientID()">
            <option value="">Select Client...</option>
            </select>
    </div>
    <div class="form-group">
        <label>Client ID</label>
        <input type="text" id="cred-clientid" readonly placeholder="Auto-linked from selection" style="background-color: rgba(0,0,0,0.02);">
    </div>
    <div class="form-group">
        <label>Portal Name *</label>
        <input type="text" id="cred-portalname" required placeholder="E.g. Income Tax, GST, MCA...">
    </div>
    <div class="form-group">
        <label>User Name</label>
        <input type="text" id="cred-username" placeholder="Login ID or Username">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="text" id="cred-password" placeholder="Account Password">
    </div>
    <div class="form-group">
        <label>Running Service</label>
        <input type="text" id="cred-runningservice" placeholder="E.g. GSTR-1, ITR Filing">
    </div>
    <div class="form-group">
        <label>Return Frequency</label>
        <select id="cred-returnfrequency">
            <option value="Monthly">Monthly</option>
            <option value="Quarterly">Quarterly</option>
            <option value="Half-Yearly">Half-Yearly</option>
            <option value="Annually">Annually</option>
            <option value="One-Time">One-Time</option>
            <option value="N/A">N/A</option>
        </select>
    </div>
    <div class="form-group full-width">
        <label>Notes</label>
        <textarea id="cred-notes" rows="2" placeholder="Security questions, recovery email, etc..."></textarea>
    </div>
</form>
