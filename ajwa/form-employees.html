<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Employee - Ajwa Builders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#095d53',
                        primaryDark: '#06443d',
                        secondary: '#10b981',
                        bgLight: '#f8fafc',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bgLight dark:bg-darkBg text-gray-800 dark:text-gray-200 transition-colors duration-200 min-h-screen flex flex-col" onload="generateEmployeeID()">

    <header class="h-16 bg-white dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 shadow-sm z-10">
        <div class="flex items-center">
            <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-white mr-4 transition-colors">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div class="flex items-center">
                <div class="h-8 w-8 min-w-[2rem] bg-primary rounded flex items-center justify-center mr-3">
                    <i class="fas fa-building text-white text-sm"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-base font-bold text-primary dark:text-secondary tracking-tight">AJWA BUILDERS</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center space-x-3 sm:space-x-5">
            <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-secondary p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle Dark Mode">
                <i id="theme-icon" class="fas fa-moon text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 flex justify-center pb-20">
        <div class="bg-white dark:bg-darkCard rounded-xl border border-gray-200 dark:border-darkBorder shadow-md w-full max-w-4xl overflow-hidden transition-colors">
            
            <div class="p-6 border-b border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-slate-800/50">
                <h1 class="text-xl font-bold text-gray-800 dark:text-white flex items-center">
                    <i class="fas fa-user-plus text-primary dark:text-secondary mr-3"></i> Add New Employee
                </h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter the staff details below to add them to the company directory.</p>
            </div>

            <form id="employee-form" class="p-6 sm:p-8 space-y-8" onsubmit="submitEmployee(event)">
                
                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Core Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Employee ID</label>
                            <input type="text" id="employee-id" readonly placeholder="Auto-generated" class="w-full px-4 py-2.5 bg-gray-100 dark:bg-slate-700/50 border border-gray-200 dark:border-darkBorder rounded-lg text-gray-600 dark:text-gray-400 sm:text-sm font-semibold cursor-not-allowed transition-colors">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name <span class="text-red-500">*</span></label>
                            <input type="text" id="employee-name" required placeholder="Enter employee's full name" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Designation <span class="text-red-500">*</span></label>
                            <select id="designation" required class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                                <option value="">-- Select Designation --</option>
                                <option value="Site Engineer">Site Engineer</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Manager">Manager</option>
                                <option value="Worker">Worker</option>
                                <option value="Admin">Admin Staff</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Contact Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Mobile Number <span class="text-red-500">*</span></label>
                            <input type="tel" id="mobile-no" required placeholder="+91 00000 00000" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                        </div>

                        <div>
                            <label class="flex justify-between items-end block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                                <span>WhatsApp Number</span>
                                <div class="flex items-center space-x-1 cursor-pointer" onclick="copyMobileToWhatsapp()">
                                    <input type="checkbox" id="same-as-mobile" class="text-primary focus:ring-primary rounded dark:bg-slate-800 dark:border-darkBorder">
                                    <span class="text-[10px] text-gray-500 dark:text-gray-400">Same as Mobile</span>
                                </div>
                            </label>
                            <input type="tel" id="whatsapp-no" placeholder="+91 00000 00000" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Permanent Address <span class="text-red-500">*</span></label>
                            <textarea id="address" required rows="3" placeholder="Enter full address..." class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors resize-y"></textarea>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Employment Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date of Joining <span class="text-red-500">*</span></label>
                            <input type="date" id="date-joining" required class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors [&::-webkit-calendar-picker-indicator]:dark:invert">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date of Retirement / Exit</label>
                            <input type="date" id="date-retired" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors [&::-webkit-calendar-picker-indicator]:dark:invert">
                            <p class="text-xs text-gray-400 mt-1">Leave blank if currently employed</p>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Additional Notes</label>
                            <textarea id="additional-notes" rows="3" placeholder="Any specific skills, emergency contact, or important notes..." class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors resize-y"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200 dark:border-darkBorder flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                    <button type="button" onclick="window.history.back()" class="w-full sm:w-auto px-6 py-2.5 border border-gray-300 dark:border-darkBorder rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors shadow-sm">
                        Cancel
                    </button>
                    <button type="submit" class="w-full sm:w-auto px-6 py-2.5 bg-secondary hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center justify-center">
                        <i class="fas fa-user-check mr-2"></i> Save Employee
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        // Mock Backend Counter for Auto Employee ID Generation
        let currentEmployeeCount = 120; // Assuming 120 employees already exist in the database

        // Generate Employee ID on page load
        function generateEmployeeID() {
            const idInput = document.getElementById('employee-id');
            const nextCount = currentEmployeeCount + 1;
            
            // Format number with leading zeros (e.g., E001, E121)
            const formattedCount = nextCount.toString().padStart(3, '0');
            idInput.value = `E${formattedCount}`;
        }

        // Copy Mobile to WhatsApp checkbox logic
        function copyMobileToWhatsapp() {
            const mobileInput = document.getElementById('mobile-no');
            const whatsappInput = document.getElementById('whatsapp-no');
            const checkbox = document.getElementById('same-as-mobile');

            if (checkbox.checked) {
                whatsappInput.value = mobileInput.value;
                // Add event listener to keep them synced if mobile changes while checked
                mobileInput.addEventListener('input', syncPhones);
            } else {
                mobileInput.removeEventListener('input', syncPhones);
                whatsappInput.value = '';
            }
        }

        function syncPhones(e) {
            document.getElementById('whatsapp-no').value = e.target.value;
        }

        // Form Submission logic
        function submitEmployee(event) {
            event.preventDefault();
            
            const employeeId = document.getElementById('employee-id').value;
            const employeeName = document.getElementById('employee-name').value;
            
            // Alert simulates successful API submission
            alert(`Success!\nEmployee "${employeeName}" (${employeeId}) has been successfully added.`);
            
            // Increment the counter for the next entry
            currentEmployeeCount++;
            
            // Reset form and generate the next ID
            document.getElementById('employee-form').reset();
            generateEmployeeID();
        }

        // Light/Dark Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.theme = 'light';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.theme = 'dark';
            }
        }

        // Initialize theme on page load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.remove('fa-moon');
            document.getElementById('theme-icon').classList.add('fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
