<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Site Updates - Ajwa Builders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#095d53',
                        primaryDark: '#06443d',
                        secondary: '#10b981',
                        bgLight: '#f8fafc',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bgLight dark:bg-darkBg text-gray-800 dark:text-gray-200 transition-colors duration-200 min-h-screen flex flex-col" onload="initializeForm()">

    <header class="h-16 bg-white dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 shadow-sm z-10">
        <div class="flex items-center">
            <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-white mr-4 transition-colors">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div class="flex items-center">
                <div class="h-8 w-8 min-w-[2rem] bg-primary rounded flex items-center justify-center mr-3">
                    <i class="fas fa-building text-white text-sm"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-base font-bold text-primary dark:text-secondary tracking-tight">AJWA BUILDERS</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center space-x-3 sm:space-x-5">
            <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-secondary p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle Dark Mode">
                <i id="theme-icon" class="fas fa-moon text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 flex justify-center pb-20">
        <div class="bg-white dark:bg-darkCard rounded-xl border border-gray-200 dark:border-darkBorder shadow-md w-full max-w-4xl overflow-hidden transition-colors">
            
            <div class="p-6 border-b border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-slate-800/50">
                <h1 class="text-xl font-bold text-gray-800 dark:text-white flex items-center">
                    <i class="fas fa-hard-hat text-primary dark:text-secondary mr-3"></i> Daily Site Update
                </h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Log the daily progress, current stages, and remarks for ongoing projects.</p>
            </div>

            <form id="site-update-form" class="p-6 sm:p-8 space-y-8" onsubmit="submitUpdate(event)">
                
                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Log Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Update ID</label>
                            <input type="text" id="update-id" readonly placeholder="Auto-generated" class="w-full px-4 py-2.5 bg-gray-100 dark:bg-slate-700/50 border border-gray-200 dark:border-darkBorder rounded-lg text-gray-600 dark:text-gray-400 sm:text-sm font-semibold cursor-not-allowed transition-colors">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date <span class="text-red-500">*</span></label>
                            <input type="date" id="update-date" required class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors [&::-webkit-calendar-picker-indicator]:dark:invert">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Site & Assignment</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Site Name <span class="text-red-500">*</span></label>
                            <select id="site-name" required class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                                <option value="">-- Select Active Site --</option>
                                <option value="Abrar kadavathur">Abrar kadavathur (Commercial)</option>
                                <option value="Shakeel palloor">Shakeel palloor (Commercial)</option>
                                <option value="Suhail pullyottukavu">Suhail pullyottukavu (Residential)</option>
                                <option value="Maruf MES">Maruf MES (Residential)</option>
                                <option value="Sameer chokli">Sameer chokli (Interior)</option>
                                <option value="Farvees">Farvees (Interior)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name of Incharge <span class="text-red-500">*</span></label>
                            <select id="incharge-name" required class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                                <option value="">-- Select Incharge --</option>
                                <option value="Amal">Amal (Site Engineer)</option>
                                <option value="Arjun 1">Arjun 1 (Site Engineer)</option>
                                <option value="Remin">Remin (Supervisor)</option>
                                <option value="Ashokan">Ashokan (Supervisor)</option>
                                <option value="Asharaf">Asharaf (Manager)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Progress Tracking</h3>
                    <div class="grid grid-cols-1 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Present Stage <span class="text-red-500">*</span></label>
                            <input type="text" id="present-stage" required placeholder="E.g. Foundation, Porch Slab, Electrical work" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Daily Updates <span class="text-red-500">*</span></label>
                            <textarea id="daily-updates" required rows="4" placeholder="Detail the work completed today, materials used, etc..." class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors resize-y"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Remarks</label>
                            <textarea id="remarks" rows="2" placeholder="Any issues faced, material shortages, or general remarks..." class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors resize-y"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200 dark:border-darkBorder flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                    <button type="button" onclick="window.history.back()" class="w-full sm:w-auto px-6 py-2.5 border border-gray-300 dark:border-darkBorder rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors shadow-sm">
                        Cancel
                    </button>
                    <button type="submit" class="w-full sm:w-auto px-6 py-2.5 bg-primary hover:bg-primaryDark text-white rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center justify-center">
                        <i class="fas fa-upload mr-2"></i> Submit Update
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        // Mock Backend Counter for Site Updates
        let currentUpdateCount = 345;

        // Initialize page settings
        function initializeForm() {
            // Set today's date automatically
            const dateInput = document.getElementById('update-date');
            const today = new Date().toISOString().split('T');
            dateInput.value = today;

            // Generate the Auto ID
            generateUpdateID();
        }

        // Generate Update ID
        function generateUpdateID() {
            const idInput = document.getElementById('update-id');
            const nextCount = currentUpdateCount + 1;
            
            // Format number (e.g., SU001, SU346)
            const formattedCount = nextCount.toString().padStart(3, '0');
            idInput.value = `SU${formattedCount}`;
        }

        // Form Submission Logic
        function submitUpdate(event) {
            event.preventDefault();
            
            const siteName = document.getElementById('site-name').value;
            const incharge = document.getElementById('incharge-name').value;
            const updateId = document.getElementById('update-id').value;
            
            alert(`Success!\nSite update (${updateId}) for "${siteName}" submitted by ${incharge}.`);
            
            // Increment counter and reset form
            currentUpdateCount++;
            document.getElementById('site-update-form').reset();
            
            // Re-initialize standard fields
            initializeForm(); 
        }

        // Light/Dark Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.theme = 'light';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.theme = 'dark';
            }
        }

        // Theme Initialization on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.remove('fa-moon');
            document.getElementById('theme-icon').classList.add('fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
