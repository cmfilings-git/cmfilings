<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Accounts - Ajwa Builders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#095d53',
                        primaryDark: '#06443d',
                        secondary: '#10b981',
                        bgLight: '#f8fafc',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bgLight dark:bg-darkBg text-gray-800 dark:text-gray-200 transition-colors duration-200 min-h-screen flex flex-col">

    <header class="h-16 bg-white dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 shadow-sm z-10">
        <div class="flex items-center">
            <a href="index.html" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-white mr-4 transition-colors">
                <i class="fas fa-arrow-left text-lg"></i>
            </a>
            <div class="flex items-center">
                <div class="h-8 w-8 min-w-[2rem] bg-primary rounded flex items-center justify-center mr-3">
                    <i class="fas fa-chart-pie text-white text-sm"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-base font-bold text-primary dark:text-secondary tracking-tight">AJWA BUILDERS</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center space-x-3 sm:space-x-5">
            <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-secondary p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle Dark Mode">
                <i id="theme-icon" class="fas fa-moon text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 flex justify-center pb-20">
        <div class="bg-white dark:bg-darkCard rounded-xl border border-gray-200 dark:border-darkBorder shadow-md w-full max-w-5xl overflow-hidden transition-colors">
            
            <div class="p-6 border-b border-gray-200 dark:border-darkBorder bg-gray-50 dark:bg-slate-800/50">
                <h1 class="text-xl font-bold text-gray-800 dark:text-white flex items-center">
                    <i class="fas fa-file-invoice-dollar text-primary dark:text-secondary mr-3"></i> Site Income & Expenses Details
                </h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Track financials, running expenses, and calculate active balances for projects.</p>
            </div>

            <form id="accounts-form" class="p-6 sm:p-8 space-y-8" onsubmit="submitAccounts(event)">
                
                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Project Selection</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Project Name <span class="text-red-500">*</span></label>
                            <select id="project-name" required onchange="populateProjectDetails()" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors">
                                <option value="">-- Select Active Project --</option>
                                <option value="Abrar">Abrar Kadavathur</option>
                                <option value="Suhail">Suhail Pullyottukavu</option>
                                <option value="Maruf">Maruf MES</option>
                                <option value="Sameer">Sameer Chokli</option>
                                <option value="Farvees">Farvees</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Project ID</label>
                            <input type="text" id="project-id" readonly placeholder="Auto-fills on selection" class="w-full px-4 py-2.5 bg-gray-100 dark:bg-slate-700/50 border border-gray-200 dark:border-darkBorder rounded-lg text-gray-600 dark:text-gray-400 sm:text-sm font-semibold cursor-not-allowed transition-colors">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-100 dark:border-darkBorder pb-2">Financial Entries</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        
                        <div class="lg:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Project Agreed Amount (₹) <span class="text-red-500">*</span></label>
                            <input type="number" id="agreed-amount" required min="0" step="0.01" value="0" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-300 dark:border-darkBorder rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-gray-800 dark:text-gray-200 sm:text-sm transition-colors font-bold" oninput="calculateBalances()">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Income Received (₹) <span class="text-red-500">*</span></label>
                            <input type="number" id="income-amount" required min="0" step="0.01" value="0" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-green-300 dark:border-green-800 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-green-700 dark:text-green-400 sm:text-sm transition-colors" oninput="calculateBalances()">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Expenses (₹) <span class="text-red-500">*</span></label>
                            <input type="number" id="expense-amount" required min="0" step="0.01" value="0" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-red-300 dark:border-red-800 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 text-red-700 dark:text-red-400 sm:text-sm transition-colors" oninput="calculateBalances()">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Running Expenses (₹)</label>
                            <input type="number" id="running-expense-amount" min="0" step="0.01" value="0" class="w-full px-4 py-2.5 bg-white dark:bg-slate-800 border border-orange-300 dark:border-orange-800 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 text-orange-700 dark:text-orange-400 sm:text-sm transition-colors" oninput="calculateBalances()">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 dark:bg-slate-800/80 p-6 rounded-xl border border-gray-200 dark:border-darkBorder">
                    <h3 class="text-sm font-bold text-gray-800 dark:text-gray-200 uppercase tracking-wider mb-4 border-b border-gray-200 dark:border-darkBorder pb-2">Calculated Balances</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        <div class="bg-white dark:bg-darkCard p-4 rounded-lg shadow-sm border border-gray-100 dark:border-darkBorder flex flex-col">
                            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Balance (Income - Exp)</span>
                            <span class="text-2xl font-bold text-gray-800 dark:text-white">₹ <span id="calc-balance">0.00</span></span>
                        </div>

                        <div class="bg-white dark:bg-darkCard p-4 rounded-lg shadow-sm border border-gray-100 dark:border-darkBorder flex flex-col relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
                            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Net Balance</span>
                            <span class="text-2xl font-bold text-primary dark:text-secondary">₹ <span id="calc-net-balance">0.00</span></span>
                        </div>

                        <div class="bg-white dark:bg-darkCard p-4 rounded-lg shadow-sm border border-gray-100 dark:border-darkBorder flex flex-col relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Project Agreed Balance</span>
                            <span class="text-2xl font-bold text-blue-600 dark:text-blue-400">₹ <span id="calc-agreed-balance">0.00</span></span>
                            <span class="text-[10px] text-gray-400 mt-1">(Agreed Amt - Income)</span>
                        </div>

                    </div>
                </div>

                <div class="pt-6 border-t border-gray-200 dark:border-darkBorder flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                    <button type="button" onclick="window.history.back()" class="w-full sm:w-auto px-6 py-2.5 border border-gray-300 dark:border-darkBorder rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors shadow-sm">
                        Cancel
                    </button>
                    <button type="submit" class="w-full sm:w-auto px-6 py-2.5 bg-primary hover:bg-primaryDark text-white rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center justify-center">
                        <i class="fas fa-save mr-2"></i> Save Accounts Record
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        // Mock Database for Project Auto-filling
        const projectDB = {
            "Abrar": { id: "CP001", agreedAmt: 15000000 },
            "Suhail": { id: "CR001", agreedAmt: 8500000 },
            "Maruf": { id: "CR002", agreedAmt: 9200000 },
            "Sameer": { id: "PI001", agreedAmt: 1200000 },
            "Farvees": { id: "PI002", agreedAmt: 850000 }
        };

        // Populate Project Details
        function populateProjectDetails() {
            const project = document.getElementById('project-name').value;
            const idInput = document.getElementById('project-id');
            const agreedAmtInput = document.getElementById('agreed-amount');

            if (project && projectDB[project]) {
                idInput.value = projectDB[project].id;
                agreedAmtInput.value = projectDB[project].agreedAmt;
            } else {
                idInput.value = '';
                agreedAmtInput.value = '0';
            }
            
            // Trigger calculation immediately after autofill
            calculateBalances();
        }

        // Live Calculation Engine
        function calculateBalances() {
            const agreedAmt = parseFloat(document.getElementById('agreed-amount').value) || 0;
            const income = parseFloat(document.getElementById('income-amount').value) || 0;
            const expense = parseFloat(document.getElementById('expense-amount').value) || 0;
            const runningExpense = parseFloat(document.getElementById('running-expense-amount').value) || 0;

            // Calculations
            const balance = income - expense;
            const netBalance = balance - runningExpense; // or Income - (Expense + Running Expense)
            const agreedBalance = agreedAmt - income;

            // Update UI Elements
            document.getElementById('calc-balance').innerText = balance.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('calc-net-balance').innerText = netBalance.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('calc-agreed-balance').innerText = agreedBalance.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            // Add visual cues for negative balances
            const netBalElement = document.getElementById('calc-net-balance');
            if (netBalance < 0) {
                netBalElement.classList.remove('text-primary', 'dark:text-secondary');
                netBalElement.classList.add('text-red-500');
            } else {
                netBalElement.classList.add('text-primary', 'dark:text-secondary');
                netBalElement.classList.remove('text-red-500');
            }
        }

        // Form Submission Logic
        function submitAccounts(event) {
            event.preventDefault();
            
            const projectName = document.getElementById('project-name').options[document.getElementById('project-name').selectedIndex].text;
            const projectId = document.getElementById('project-id').value;
            
            alert(`Financial records updated successfully for ${projectName} (${projectId}).`);
            
            // Reset form but trigger calculation to zero out dashboard
            document.getElementById('accounts-form').reset();
            calculateBalances();
        }

        // Light/Dark Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.theme = 'light';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.theme = 'dark';
            }
        }

        // Initialize Theme on Page Load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.remove('fa-moon');
            document.getElementById('theme-icon').classList.add('fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
