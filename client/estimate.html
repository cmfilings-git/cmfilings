<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Estimate Portal</title>

<meta name="theme-color" content="#0F1117">

<link rel="icon" href="/assets/logo.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0D1017;
--card:#171B25;
--card2:#1E2431;
--gold:#D4A63A;
--gold2:#F3C96B;
--text:#FFFFFF;
--muted:#9BA3B4;
--line:#2B3243;
--green:#35D07F;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
linear-gradient(
180deg,
#0B0E14 0%,
#10141D 100%);
color:white;
min-height:100vh;
overflow-x:hidden;
}

::-webkit-scrollbar{
width:0;
}

.glow{
position:fixed;
width:500px;
height:500px;
border-radius:999px;
background:
radial-gradient(circle,
rgba(212,166,58,.15),
transparent 70%);
z-index:-1;
pointer-events:none;
}

.glow.one{
top:-200px;
left:-120px;
}

.glow.two{
bottom:-250px;
right:-150px;
}

.topbar{
height:78px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
border-bottom:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(18px);
position:sticky;
top:0;
z-index:999;
background:rgba(11,14,20,.75);
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
height:42px;
}

.brand-name{
font-size:22px;
font-weight:800;
letter-spacing:.3px;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.card{
background:
linear-gradient(
180deg,
rgba(29,35,48,.96),
rgba(17,20,28,.98));
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
padding:22px;
box-shadow:
0 20px 50px rgba(0,0,0,.35);
}

.heading{
font-size:13px;
font-weight:800;
letter-spacing:3px;
text-transform:uppercase;
color:#8791A4;
margin-bottom:18px;
}

.input{
width:100%;
height:58px;
background:#121722;
border:1px solid #293041;
border-radius:18px;
padding:0 18px;
color:white;
font-size:15px;
font-weight:600;
outline:none;
transition:.25s;
}

.input:focus{
border-color:var(--gold);
box-shadow:
0 0 0 4px rgba(212,166,58,.10);
}

textarea.input{
height:auto;
padding:18px;
resize:none;
}

.label{
font-size:13px;
font-weight:700;
color:#B8C0D0;
margin-bottom:8px;
display:block;
}

.btn{
height:58px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

.btn-gold{
background:
linear-gradient(
135deg,
var(--gold),
var(--gold2));
color:#111;
box-shadow:
0 15px 30px rgba(212,166,58,.25);
}

.btn-gold:hover{
transform:translateY(-2px);
}

.btn-dark{
background:#171C27;
border:1px solid #2B3345;
color:white;
}

.item-row{
display:flex;
gap:12px;
margin-bottom:12px;
}

.section-divider{
height:1px;
background:#242B3A;
margin:28px 0;
}

.login-box{
max-width:420px;
margin:auto;
margin-top:9vh;
}

.login-logo{
height:72px;
margin:auto;
display:block;
margin-bottom:16px;
}

.estimate-preview{
background:white;
color:#111827;
border-radius:30px;
overflow:hidden;
}

.invoice-top{
background:
linear-gradient(
135deg,
#0D1017 0%,
#1B2230 100%);
padding:30px;
color:white;
}

.invoice-body{
padding:30px;
}

.invoice-title{
font-size:42px;
font-weight:900;
}

.total-box{
background:#F7F8FA;
border-radius:22px;
padding:24px;
}

.doc-box{
background:#FFF8E9;
border:1px solid rgba(212,166,58,.2);
border-radius:22px;
padding:18px;
margin-top:22px;
}

.doc-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
font-weight:600;
font-size:14px;
}

.badge{
display:inline-flex;
align-items:center;
justify-content:center;
height:24px;
padding:0 10px;
border-radius:999px;
font-size:11px;
font-weight:800;
background:#1B2230;
color:#F3C96B;
}

.bottom-bar{
position:fixed;
left:0;
right:0;
bottom:0;
padding:14px;
background:rgba(11,14,20,.85);
backdrop-filter:blur(15px);
border-top:1px solid rgba(255,255,255,.05);
}

.bottom-wrap{
max-width:900px;
margin:auto;
display:flex;
gap:12px;
}

@media(max-width:768px){

.item-row{
flex-direction:column;
}

.invoice-title{
font-size:30px;
}

}

</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<!-- LOGIN -->

<div class="login-box container">

<div class="card">

<img src="/assets/logo.png" class="login-logo">

CMFilings

Secure Estimate Dashboard
</p>

<label class="label">
Access PIN
</label>

<input type="password"

class="input"

<button onclick="login()"
class="btn btn-gold"
style="width:100%;margin-top:22px;">

Unlock Portal

</button>

</div>

</div>

</div>

<!-- ADMIN -->

<div id="adminPage" style="display:none;">

<div class="topbar">

<div class="brand">

<img src="/assets/logo.png">

<div class="brand-name">
CMFilings
</div>

</div>

<div style="display:flex;gap:10px;align-items:center;">

<div class="badge">
ESTIMATE
</div>

</div>

</div>

<div class="container">

<div class="card">

<div class="heading">
Client Details
</div>

<div class="grid md:grid-cols-2 gap-5">

<div>

<label class="label">
Client Name
</label>

<input type="text"
id="clientName"
class="input"
placeholder="Enter client name">

</div>

<div>

<label class="label">

<input type="number"
id="clientMobile"
class="input"
placeholder="Enter mobile number">

<div>

Estimate Number
</label>

<input type="text"
id="estimateNo"

<div>

<label class="label">

id="upiId"

<div class="section-divider"></div>

</div>

</div>

<!-- CLIENT -->

<div id="clientPage" style="display:none;">

<div class="container"
style="padding-bottom:120px;">

<div id="invoice"
class="estimate-preview">

<div class="invoice-top">

<div style="display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;">

<div>

<img src="/assets/logo.png"
style="height:58px;margin-bottom:12px;">

<div style="font-size:13px;letter-spacing:4px;color:#D4A63A;font-weight:800;">

</div>

<div style="font-size:12px;font-weight:800;letter-spacing:3px;color:#98A2B3;">

<script>

const LOGIN_PIN="3655";

function login(){

const pin=document.getElementById("pin").value;

if(pin===LOGIN_PIN){

document.getElementById("loginPage").style.display="none";
document.getElementById("adminPage").style.display="block";

generateEstimateNumber();

addService();

}else{

alert("Invalid PIN");

}

}

function generateEstimateNumber(){

const now=new Date();

const yy=String(now.getFullYear()).slice(-2);
const dd=String(now.getDate()).padStart(2,"0");
const mm=String(now.getMonth()+1).padStart(2,"0");

const random="04";

const est=`EST${yy}${dd}${mm}${random}`;

document.getElementById("estimateNo").value=est;

}

function addService(){

const row=document.createElement("div");

row.className="item-row";

row.innerHTML=`

<input type="text"
placeholder="Service Name"
class="input serviceName">

<input type="number"
placeholder="Amount"
class="input serviceAmount">

<button onclick="this.parentElement.remove()"
class="btn btn-dark"
style="min-width:58px;">
✕
</button>

`;

document.getElementById("services").appendChild(row);

}

function generateEstimate(){

const clientName=document.getElementById("clientName").value;
const clientMobile=document.getElementById("clientMobile").value;
const estimateNo=document.getElementById("estimateNo").value;
const remarks=document.getElementById("remarks").value;
const docs=document.getElementById("docsRequired").value;
const upi=document.getElementById("upiId").value;

document.getElementById("showClientName").innerText=clientName;
document.getElementById("showMobile").innerText=clientMobile;
document.getElementById("showEstimateNo").innerText=estimateNo;

document.getElementById("showDate").innerText=
new Date().toLocaleDateString("en-IN");

let total=0;

const tbody=document.getElementById("invoiceItems");

tbody.innerHTML="";

document.querySelectorAll(".item-row").forEach(row=>{

const service=row.querySelector(".serviceName").value;
const amount=parseFloat(row.querySelector(".serviceAmount").value)||0;

if(service && amount){

total+=amount;

tbody.innerHTML+=`

<tr style="border-bottom:1px solid #ECEEF2;">

<td style="padding:16px;font-weight:700;">
${service}
</td>

<td style="padding:16px;text-align:right;font-weight:900;">
₹ ${amount.toLocaleString("en-IN")}
</td>

</tr>

`;

}

});

document.getElementById("grandTotal").innerText=
total.toLocaleString("en-IN");

document.getElementById("amountWords").innerText=
numberToWords(total)+" Only";

const docsContainer=document.getElementById("docsList");

docsContainer.innerHTML="";

docs.split("\n").forEach(doc=>{

if(doc.trim()){

docsContainer.innerHTML+=`

<div class="doc-item">
✅ ${doc}
</div>

`;

}

});

if(remarks.trim()!==""){

document.getElementById("remarksBox").style.display="block";

document.getElementById("showRemarks").innerText=remarks;

}

window.generatedUPI=upi;
window.generatedAmount=total;

document.getElementById("adminPage").style.display="none";
document.getElementById("clientPage").style.display="block";

}

function payNow(){

const upiLink=
`upi://pay?pa=${window.generatedUPI}&pn=CMFilings&am=${window.generatedAmount}&cu=INR`;

window.location.href=upiLink;

}

function downloadPDF(){

const element=document.getElementById("invoice");

const opt={
margin:0,
filename:"CMFilings-Estimate.pdf",
image:{type:"jpeg",quality:1},
html2canvas:{scale:3,useCORS:true},
jsPDF:{unit:"px",format:[900,1400],orientation:"portrait"}
};

html2pdf().set(opt).from(element).save();

}

function numberToWords(num){

const a=['','One ','Two ','Three ','Four ','Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];

function inWords(n){

if(n<20) return a[n];

if(n<100)
return b[Math.floor(n/10)]+' '+a[n%10];

if(n<1000)
return a[Math.floor(n/100)]+'Hundred '+inWords(n%100);

if(n<100000)
return inWords(Math.floor(n/1000))+'Thousand '+inWords(n%1000);

if(n<10000000)
return inWords(Math.floor(n/100000))+'Lakh '+inWords(n%100000);

return inWords(Math.floor(n/10000000))+'Crore '+inWords(n%10000000);

}

return inWords(num)+'Rupees';

}

</script>
