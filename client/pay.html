<!doctype html>
<html lang="en" class="h-full" style="scroll-behavior:smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment | CM Filings</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: {
        extend: {
          colors: {
            navy: '#0B1D3A',
            cmRed: '#ef4444',
            surface: '#F4F6FA'
          },
          fontFamily: {
            heading: ['Montserrat', 'system-ui', 'sans-serif'],
            body: ['Poppins', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-surface text-navy font-body flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative border border-gray-100">
    <div class="h-3 w-full bg-navy"></div>
    
    <div class="p-8 text-center">
      <div class="flex justify-center mb-6">
        <img src="assets/logo-admin.png" alt="CM Logo" class="h-16 w-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div style="display:none;" class="w-16 h-16 bg-navy rounded-xl items-center justify-center text-white font-bold text-2xl font-heading shadow-md">CM</div>
      </div>

      <h1 class="text-xl font-heading font-bold text-navy mb-1">Payment Request</h1>
      <p class="text-sm text-gray-500 mb-8 font-medium" id="cPayee">CM Experts Group</p>

      <div class="bg-surface rounded-2xl p-6 mb-8 text-left border border-gray-100 relative">
        <div class="absolute -top-3 left-6 px-3 py-1 bg-cmRed text-white text-[10px] font-bold uppercase tracking-wider rounded-full shadow-sm">Billed To</div>
        
        <p class="font-bold text-lg text-navy" id="cName">Loading...</p>
        <p class="text-sm text-gray-600 mb-4" id="cDesc">-</p>
        
        <div class="flex justify-between items-end border-t border-gray-200 pt-4 mt-2">
          <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Amount Due</p>
          <p class="text-3xl font-bold text-navy" id="cAmount">₹0</p>
        </div>
      </div>

      <div class="flex flex-col items-center justify-center mb-4">
        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">Scan QR to Pay via any UPI App</p>
        <div id="qrcode" class="p-3 bg-white border-2 border-gray-100 rounded-2xl shadow-sm mb-3"></div>
        
        <p class="text-xs text-gray-400 font-medium mt-2 max-w-[250px] mx-auto leading-relaxed">
          On mobile? Take a screenshot and upload it using the "Scan from Gallery" option in your UPI app.
        </p>

        <div class="flex items-center justify-center gap-3 opacity-50 mt-4">
          <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" alt="UPI" class="h-4 grayscale">
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" alt="GPay" class="h-4 grayscale">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" alt="PhonePe" class="h-4 grayscale">
        </div>
      </div>

      <p class="text-[10px] text-gray-400 mt-6 uppercase tracking-wider font-semibold">100% Secure Transaction. Ref: <span id="cNarration">-</span></p>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Get URL Parameters passed from the Admin WhatsApp message
    const params = new URLSearchParams(window.location.search);
    const pa = params.get('pa') || 'cmfilings@upi';
    const pn = params.get('pn') || 'CM_Filings';
    const am = params.get('am') || '0';
    const tn = params.get('tn') || 'CM_Payment';
    const name = params.get('name') || 'Client';
    const desc = params.get('desc') || 'Professional Services';

    // Populate Page Elements
    document.getElementById('cName').innerText = name;
    document.getElementById('cDesc').innerText = desc;
    document.getElementById('cPayee').innerText = pn;
    document.getElementById('cAmount').innerText = `₹${parseFloat(am).toLocaleString('en-IN')}`;
    document.getElementById('cNarration').innerText = tn;

    // Construct UPI String
    const upiLink = `upi://pay?pa=${pa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=${tn}`;

    // Generate QR Code directly (No hiding logic anymore)
    new QRCode(document.getElementById("qrcode"), {
      text: upiLink,
      width: 180,
      height: 180,
      colorDark : "#0B1D3A", // Navy Blue QR
      colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
