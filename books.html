<!DOCTYPE html>
<html lang="en" class="h-full w-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CM Filings ERP | Dashboard</title>
    
    <meta name="theme-color" content="#006aff">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: { 
                    fontFamily: { jakarta: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        cblue: '#006aff',  /* Zoho Blue */
                        cred: '#d93025',   /* Zoho Red */
                        cgreen: '#0f9d58', /* Zoho Green */
                        cyellow: '#ffb300' /* Zoho Yellow */
                    }
                }
            }
        }
    </script>

    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { max-width: 100vw; overflow-x: hidden; }
        body { background-color: #f4f6f9; color: #1e293b; margin: 0; min-height: 100vh; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Desktop Nav Tabs */
        .nav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; white-space: nowrap; padding: 12px 24px; gap: 8px; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { 
            background: white; color: #64748b; border: 1px solid #e2e8f0; padding: 10px 20px; 
            font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; border-radius: 12px;
            display: inline-flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .tab-btn:hover:not(:disabled) { color: var(--tw-colors-cblue); border-color: var(--tw-colors-cblue); background: #f0f4ff; }
        .tab-btn.active { color: white; border-color: transparent; background: var(--tw-colors-cblue); box-shadow: 0 4px 12px rgba(0, 106, 255, 0.25); }

        /* Modern Mobile Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0; border-radius: 24px 24px 0 0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 12px 24px 12px; z-index: 40; box-shadow: 0 -10px 25px rgba(0,0,0,0.06);
        }
        .b-nav-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 10px; gap: 4px; font-weight: 700; transition: all 0.2s; width: 60px; }
        .b-nav-item i { font-size: 20px; transition: transform 0.2s; }
        .b-nav-item:active i { transform: scale(0.9); }
        
        /* Active State Dot Indicator */
        .b-nav-item.active { color: var(--tw-colors-cblue); }
        .b-nav-item.tab-link.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 5px;
            height: 5px;
            background-color: var(--tw-colors-cblue);
            border-radius: 50%;
        }
        
        .b-nav-center {
            width: 56px; height: 56px; 
            background: var(--tw-colors-cblue); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 106, 255, 0.4);
            transform: translateY(-20px);
            border: 4px solid white;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .b-nav-center:active { transform: translateY(-20px) scale(0.9); }

        /* Mobile Hamburger Bottom Sheet Menu */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: white; z-index: 55;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 24px 24px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15); padding: 24px; padding-bottom: 40px;
        }
        .bottom-sheet.active { bottom: 0; }
        .overlay-dim { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); z-index: 50; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(2px);}
        .overlay-dim.active { opacity: 1; pointer-events: auto; }

        /* Modal Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: flex; justify-content: center; align-items: center; z-index: 60; opacity: 0; pointer-events: none; transition: 0.3s; padding: 16px; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); transform: scale(0.95) translateY(10px); transition: 0.3s; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid #f1f5f9; }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-body { padding: 24px; overflow-y: auto; display: grid; gap: 16px; grid-template-columns: 1fr; }
        @media(min-width: 600px) { .modal-body.form-grid { grid-template-columns: 1fr 1fr; } }
        .full-width { grid-column: 1 / -1; }

        .loader { border: 3px solid #e2e8f0; border-top: 3px solid var(--tw-colors-cblue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); color: white; padding: 12px 24px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (min-width: 640px) { #toast { bottom: 24px; } }
        
        .card-1x1 { aspect-ratio: 1 / 1; }
    </style>
</head>
<body class="bg-slate-50 h-full flex flex-col">

        </div>
        
        <div class="flex items-center gap-4">

            <button class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-cblue hover:bg-blue-50 transition-colors border border-slate-100 shadow-sm" onclick="fetchAllData()" title="Sync Data">

    <!-- Form/View Modal -->

    <div id="toast"><i class="fa-solid fa-circle-check text-white"></i> <span id="toastMsg">Action completed successfully.</span></div>

    <script>
        // ==========================================
        // APPS SCRIPT URL & STATE
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywMrZnbebIWukQqtUoz_NmqU1M8Xn_-9Xg0GCWVp1QxhCptRPe1-a395vxsvwPUvj4/exec"; 

        let currentTab = 'Dashboard';
        let appData = { Clients: [], Credentials: [], Tasks: [] };
        let filteredData = [];
        let currentHeaders = [];
        let modalMode = 'add';
        let editingId = null;

        const sheetMap = { 'Clients': 'Clients', 'Credentials': 'Credentials', 'Tasks': 'Task' };

        window.addEventListener('load', async () => {
            await fetchAllData();
        });

        function toggleHamburger() {
            const menu = document.getElementById('hamburgerMenu');
            const overlay = document.getElementById('mobileOverlay');
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        async function fetchAllData() {
            setLoading(true);
            try {
                const [clients, credentials, tasks] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getClients`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getCredentials`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getTasks`).then(r => r.json())
                ]);

                if (clients.error) throw new Error(clients.error);

                appData.Clients = clients || [];
                appData.Credentials = credentials || [];
                appData.Tasks = tasks || [];
                
                if (currentTab === 'Dashboard') {
                    updateDashboard();
                } else {
                    filteredData = [...appData[currentTab]];
                    currentHeaders = appData[currentTab].length > 0 ? Object.keys(appData[currentTab][0]) : [];
                    renderTable();
                }

            } catch (error) {
                showToast("Error connecting to database.", true);
                console.error(error);
            }
            setLoading(false);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.b-nav-item.tab-link').forEach(btn => btn.classList.remove('active'));
            
            const desktopBtn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
            const mobileBtn = document.querySelector(`.b-nav-item.tab-link[data-tab="${tabName}"]`);
            
            if(desktopBtn) desktopBtn.classList.add('active');
            if(mobileBtn) mobileBtn.classList.add('active');

            currentTab = tabName;
            
            if (tabName === 'Dashboard') {
                document.getElementById('viewDashboard').classList.remove('hidden');
                document.getElementById('viewData').classList.add('hidden');
                updateDashboard();
            } else {
                document.getElementById('viewDashboard').classList.add('hidden');
                document.getElementById('viewData').classList.remove('hidden');
                document.getElementById('searchInput').value = "";
                
                filteredData = [...appData[tabName]];
                currentHeaders = appData[tabName].length > 0 ? Object.keys(appData[tabName][0]) : [];
                renderTable();
            }
        }

        function editTaskFromDashboard(taskId) {
            switchTab('Tasks');
            setTimeout(() => {
                openModal('edit', taskId);
            }, 50);
        }

        function updateDashboard() {
            document.getElementById('metricClients').innerText = appData.Clients.length;
            document.getElementById('metricCredentials').innerText = appData.Credentials.length;
            
            let pendingCount = 0;
            let completedCount = 0;
            
            appData.Tasks.forEach(task => {
                const status = String(task.Task_Status || '').toLowerCase();
                if (status === 'completed' || status === 'done') {
                    completedCount++;
                } else {
                    pendingCount++;
                }
            });

            document.getElementById('metricPending').innerText = pendingCount;
            document.getElementById('metricCompleted').innerText = completedCount;

            // Render Horizontal Status Bar
            let totalTasks = pendingCount + completedCount;
            let pctComp = totalTasks === 0 ? 0 : (completedCount / totalTasks) * 100;
            let pctPend = totalTasks === 0 ? 0 : (pendingCount / totalTasks) * 100;

            document.getElementById('barCompleted').style.width = pctComp + '%';
            document.getElementById('barPending').style.width = pctPend + '%';
            document.getElementById('txtComp').innerText = completedCount;
            document.getElementById('txtPend').innerText = pendingCount;

            // Render Latest 10 Tasks List
            const dashBody = document.getElementById('dashTasksBody');
            dashBody.innerHTML = '';
            
            let latestTasks = [...appData.Tasks].reverse().slice(0, 10);
            
            if (latestTasks.length === 0) {
                dashBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-sm text-slate-400">No tasks found.</td></tr>`;
            } else {
                latestTasks.forEach(task => {
                    const status = String(task.Task_Status || '');
                    const isCompleted = status.toLowerCase() === 'completed' || status.toLowerCase() === 'done';
                    const statusBadge = isCompleted 
                        ? `<span class="bg-[#e6f5ed] text-cgreen px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest border border-[#e6f5ed]">Done</span>`
                        : `<span class="bg-[#fff8e6] text-cyellow px-2 py-1 rounded text-[10px] font-bold uppercase tracking-widest border border-[#fff8e6]">Pending</span>`;
                        
                    dashBody.innerHTML += `
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="p-4 border-b border-slate-100 text-sm font-bold text-slate-800 whitespace-nowrap">${task.Task_ID || '-'}</td>
                            <td class="p-4 border-b border-slate-100 text-sm font-medium text-slate-600 truncate max-w-[120px]">${task.Client_Name || '-'}</td>
                            <td class="p-4 border-b border-slate-100 text-right whitespace-nowrap">
                                <div class="flex items-center justify-end gap-3">
                                    ${statusBadge}
                                    <button onclick="editTaskFromDashboard('${task.Task_ID}')" class="w-7 h-7 rounded-md bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors inline-flex items-center justify-center shadow-sm border border-slate-200" title="Edit Task"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            thead.innerHTML = ''; tbody.innerHTML = '';

            if (filteredData.length === 0) {
                thead.innerHTML = `<tr><td class="text-center p-10 text-slate-400 font-medium bg-white">No records found.</td></tr>`;
                return;
            }

            const trHead = document.createElement('tr');
            trHead.className = "bg-slate-50";
            
            const thActions = document.createElement('th');
            thActions.className = "p-4 font-extrabold uppercase text-[11px] text-slate-500 tracking-wider whitespace-nowrap border-b border-slate-200";
            thActions.innerText = 'Actions';
            trHead.appendChild(thActions);

            currentHeaders.forEach(header => {
                const th = document.createElement('th');
                th.className = "p-4 font-extrabold uppercase text-[11px] text-slate-500 tracking-wider whitespace-nowrap border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors";
                th.innerHTML = `${header.replace(/_/g, ' ')} <i class="fa-solid fa-sort ml-1 text-slate-300"></i>`;
                th.onclick = () => sortData(header);
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            filteredData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors group";
                
                const idField = currentHeaders[0]; 
                const idValue = row[idField];
                
                const tdActions = document.createElement('td');
                tdActions.className = "p-4 border-b border-slate-100 whitespace-nowrap";
                tdActions.innerHTML = `
                    <button onclick="openModal('view', '${idValue}')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors mr-1 shadow-sm inline-flex items-center justify-center border border-slate-200" title="View"><i class="fa-solid fa-eye text-xs"></i></button>
                    <button onclick="openModal('edit', '${idValue}')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors shadow-sm inline-flex items-center justify-center border border-slate-200" title="Edit"><i class="fa-solid fa-pen text-xs"></i></button>
                `;
                tr.appendChild(tdActions);

                currentHeaders.forEach(header => {
                    const td = document.createElement('td');
                    td.className = "p-4 border-b border-slate-100 text-sm text-slate-700 whitespace-nowrap font-medium";
                    let val = row[header] || '';
                    const lowerHeader = header.toLowerCase();
                    
                    if (lowerHeader.includes('password') && val !== '') {
                        td.innerHTML = `<span class="font-mono bg-slate-100 px-2 py-1 rounded text-xs tracking-widest text-slate-400">••••••••</span>`;
                    } 
                    else if (currentTab === 'Clients' && lowerHeader === 'mobile' && val !== '') {
                        const cleanNum = String(val).replace(/\D/g, ''); 
                        const waNum = cleanNum.length === 10 ? `91${cleanNum}` : cleanNum;
                        
                        td.innerHTML = `
                            <div class="flex items-center gap-2">
                                <span>${val}</span>
                                <a href="https://wa.me/${waNum}" target="_blank" class="w-7 h-7 rounded-md bg-[#25D366]/10 text-[#25D366] hover:bg-[#25D366] hover:text-white transition-colors flex items-center justify-center shadow-sm border border-[#25D366]/20" title="WhatsApp"><i class="fa-brands fa-whatsapp text-sm"></i></a>
                                <a href="tel:${val}" class="w-7 h-7 rounded-md bg-slate-100 text-slate-500 hover:bg-slate-500 hover:text-white transition-colors flex items-center justify-center shadow-sm border border-slate-200" title="Call"><i class="fa-solid fa-phone text-xs"></i></a>
                            </div>
                        `;
                    }
                    else if (String(val).startsWith('http')) {
                        td.innerHTML = `<a href="${val}" target="_blank" class="text-cblue hover:underline font-bold">Link <i class="fa-solid fa-external-link-alt text-[10px] ml-1"></i></a>`;
                    } else {
                        if(header === currentHeaders[0]) {
                            td.innerHTML = `<span class="text-slate-800 font-bold">${val}</span>`;
                        } else {
                            td.innerText = val;
                        }
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredData = appData[currentTab].filter(row => {
                return Object.values(row).some(val => String(val).toLowerCase().includes(query));
            });
            renderTable();
        }

        let sortCol = null;
        let sortAsc = true;
        function sortData(header) {
            sortAsc = sortCol === header ? !sortAsc : true;
            sortCol = header;
            filteredData.sort((a, b) => {
                let valA = String(a[header] || '').toLowerCase();
                let valB = String(b[header] || '').toLowerCase();
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable();
        }

        function openModal(mode, id = null) {
            modalMode = mode;
            editingId = id;
            
            const titles = { 'add': `Add ${currentTab.slice(0,-1)}`, 'edit': 'Edit Record', 'view': 'Record Details' };
            document.getElementById('modalTitle').innerText = titles[mode];
            
            const body = document.getElementById('modalFormBody');
            body.innerHTML = '';
            
            if (mode === 'view') {
                body.className = 'modal-body grid grid-cols-1 sm:grid-cols-2 gap-4';
                document.getElementById('saveBtn').style.display = 'none';
            } else {
                body.className = 'modal-body form-grid';
                document.getElementById('saveBtn').style.display = 'flex';
            }

            let rowData = (mode !== 'add') ? appData[currentTab].find(r => r[currentHeaders[0]] == id) || {} : {};
            
            const labelClass = "block text-[10px] font-extrabold uppercase text-slate-500 mb-1.5";
            const inputClass = "w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:bg-slate-50 focus:border-cblue focus:ring-2 focus:ring-cblue/20 outline-none transition-all text-sm font-medium text-slate-700";
            const disabledInputClass = "w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-100 text-slate-500 cursor-not-allowed text-sm font-medium";

            currentHeaders.forEach((header, index) => {
                const val = rowData[header] || '';

                if (mode === 'view') {
                    const div = document.createElement('div');
                    div.className = 'bg-slate-50 p-4 rounded-xl border border-slate-100';
                    let displayVal = val === '' ? '<span class="text-slate-400">-</span>' : val;
                    if(String(val).startsWith('http')) displayVal = `<a href="${val}" target="_blank" class="text-cblue font-bold hover:underline break-all">Click to Open</a>`;
                    
                    div.innerHTML = `<label class="${labelClass}">${header.replace(/_/g, ' ')}</label><span class="text-sm font-bold text-slate-800 break-words">${displayVal}</span>`;
                    body.appendChild(div);

                } else {
                    if(header === 'Created_AT' || header === 'Updated_At') return; 

                    const div = document.createElement('div');
                    const isIdField = index === 0; 
                    
                    if (header === 'Client_ID' && (currentTab === 'Tasks' || currentTab === 'Credentials')) {
                        let options = appData.Clients.map(c => `<option value="${c.Client_ID}" ${c.Client_ID == val ? 'selected' : ''}>${c.Client_ID} - ${c.Client_Name}</option>`).join('');
                        div.innerHTML = `
                            <label class="${labelClass}">${header.replace(/_/g, ' ')}</label>
                            <select id="input_${header}" onchange="autoFillClientName(this.value)" class="${inputClass}">
                                <option value="">Select Client...</option>
                                ${options}
                            </select>
                        `;
                    } 
                    else if (header === 'Client_Name' && (currentTab === 'Tasks' || currentTab === 'Credentials')) {
                        div.innerHTML = `<label class="${labelClass}">${header.replace(/_/g, ' ')}</label><input type="text" id="input_${header}" value="${val}" readonly class="${disabledInputClass}">`;
                    }
                    else if (header.toLowerCase().includes('notes') || header.toLowerCase().includes('url')) {
                        div.className = 'full-width'; 
                        div.innerHTML = `<label class="${labelClass}">${header.replace(/_/g, ' ')}</label><input type="text" id="input_${header}" value="${val}" class="${inputClass}">`;
                    }
                    else {
                        const classesToUse = (mode === 'edit' && isIdField) ? disabledInputClass : inputClass;
                        const disabledAttr = (mode === 'edit' && isIdField) ? 'disabled' : '';
                        div.innerHTML = `<label class="${labelClass}">${header.replace(/_/g, ' ')}</label><input type="text" id="input_${header}" value="${val}" class="${classesToUse}" ${disabledAttr} autocomplete="off">`;
                    }
                    
                    body.appendChild(div);
                }
            });

            document.getElementById('formModal').classList.add('active');
        }

        function autoFillClientName(clientId) {
            const client = appData.Clients.find(c => c.Client_ID === clientId);
            const nameInput = document.getElementById('input_Client_Name');
            if (nameInput) nameInput.value = client ? client.Client_Name : '';
        }

        function closeModal() {
            document.getElementById('formModal').classList.remove('active');
        }

        async function saveRecord() {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...'; 
            btn.disabled = true;

            const formData = {};
            currentHeaders.forEach(header => {
                if(header === 'Created_AT' || header === 'Updated_At') return;
                const input = document.getElementById(`input_${header}`);
                if (input) formData[header] = input.value;
            });

            const idField = currentHeaders[0];
            const payload = {
                action: modalMode,
                sheetName: sheetMap[currentTab],
                data: formData,
                idValue: modalMode === 'edit' ? editingId : formData[idField]
            };

            await sendPostRequest(payload);
            
            btn.innerHTML = 'Save Record'; 
            btn.disabled = false;
            closeModal();
            
            await fetchAllData(); 
        }

        async function sendPostRequest(payload) {
            setLoading(true);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    redirect: 'follow',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                showToast(result.message);
            } catch (error) {
                showToast("Operation failed: " + error.message, true);
            }
            setLoading(false);
        }

        function setLoading(isLoading) {
            const loader = document.getElementById('globalLoader');
            if (isLoading) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toastMsg');
            
            msgSpan.innerText = message;
            
            if (isError) {
                toast.style.background = "#d93025"; 
                toast.querySelector('i').className = "fa-solid fa-circle-exclamation text-white";
            } else {
                toast.style.background = "#0f9d58"; 
                toast.querySelector('i').className = "fa-solid fa-circle-check text-white";
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
