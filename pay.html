<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Payment Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins',sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#f8fafc,#eef2ff);
}

.card{
background:white;
border-radius:34px;
border:1px solid #edf2f7;
box-shadow:
0 10px 30px rgba(15,23,42,.06),
0 2px 6px rgba(15,23,42,.03);
}

.pay-btn{
width:100%;
height:64px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#6c63ff,#7278ff);
color:white;
font-size:1rem;
font-weight:700;
cursor:pointer;
margin-top:14px;
}

.secondary-btn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:#f1f5f9;
color:#0f172a;
font-size:.95rem;
font-weight:700;
cursor:pointer;
margin-top:12px;
}

.info-row{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid #edf2f7;
gap:20px;
}

.logo-img{
height:42px;
object-fit:contain;
}

.name-img{
height:34px;
object-fit:contain;
}

@media print{

body{
background:white !important;
}

.logo-img{
height:30px !important;
}

.name-img{
height:24px !important;
}

.card{
box-shadow:none !important;
border:none !important;
padding:20px !important;
margin:0 !important;
border-radius:0 !important;
}

.pay-btn,
.secondary-btn{
display:none !important;
}

#invoiceCard{
page-break-inside:avoid;
break-inside:avoid;
}

.info-row{
padding:8px 0 !important;
font-size:13px !important;
}

#paymentBreakdown .info-row{
padding:6px 0 !important;
}

h2{
font-size:24px !important;
margin-bottom:4px !important;
}

#qrcode canvas{
width:140px !important;
height:140px !important;
}

.max-w-xl{
max-width:100% !important;
}

body *{
-webkit-print-color-adjust:exact !important;
print-color-adjust:exact !important;
}

}

</style>

</head>

<body>

<div class="max-w-xl mx-auto px-4 py-4">

<!-- HEADER -->

<div class="flex items-center gap-3 mb-5 justify-center">

<img src="/logo-cmpay.png" class="logo-img">

<img src="/name-cmpay.png" class="name-img">

</div>

<!-- CARD -->

<div id="invoiceCard" class="card p-7 text-center">

<h2 class="text-2xl font-bold text-slate-800 mb-2">

Welcome
<span id="clientName" class="text-indigo-700"></span>

</h2>

<p class="text-slate-500 mb-6">
Your payment request is ready
</p>

<div class="bg-slate-50 rounded-3xl p-5 inline-block mb-6">

<div id="qrcode"></div>

</div>

<div class="text-left mb-6">

<div class="info-row">
<span class="text-slate-500">Client ID</span>
<span id="clientId"></span>
</div>

<div class="info-row">
<span class="text-slate-500">Invoice</span>
<span id="invoice"></span>
</div>

<div class="info-row">
<span class="text-slate-500">Issue Date</span>
<span id="issueDate"></span>
</div>

<div id="paymentBreakdown"></div>

<div class="info-row">
<span class="text-slate-500 font-semibold">Total Amount</span>
<span id="amount" class="font-bold text-indigo-600"></span>
</div>

</div>

<div class="bg-slate-50 rounded-3xl p-5 text-left mb-6">

<h3 class="font-bold text-slate-800 mb-3">
Description
</h3>

<p id="notes" class="text-slate-600 leading-relaxed"></p>

</div>

<button onclick="payNow()" class="pay-btn">

Pay Now

</button>

<button onclick="downloadInvoice()" class="secondary-btn">

Download Invoice PDF

</button>

<p class="text-slate-400 text-sm mt-6">

Secure Payment Powered by CM Tax Experts

</p>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const client=params.get('client') || 'Client';

const clientId=params.get('clientid') || '-';

const amount=params.get('amount') || '0';

const invoice=params.get('invoice') || '-';

const issueDate=params.get('issuedate') || '-';

const notes=params.get('notes') || '-';

const upi=params.get('upi') || 'accountree@fbl';

const items=
JSON.parse(params.get('items') || '[]');

document.getElementById('clientName').innerText=client;

document.getElementById('clientId').innerText=clientId;

document.getElementById('invoice').innerText=invoice;

document.getElementById('issueDate').innerText=issueDate;

document.getElementById('notes').innerText=notes;

document.getElementById('amount').innerText=
`₹${parseFloat(amount).toLocaleString('en-IN')}`;

const breakdown=
document.getElementById('paymentBreakdown');

items.forEach(item=>{

const div=document.createElement('div');

div.className='info-row';

div.innerHTML=`
<span class="text-slate-500">${item.service}</span>
<span>₹${parseFloat(item.amount).toLocaleString('en-IN')}</span>
`;

breakdown.appendChild(div);

});

const upiLink=
`upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&tn=${invoice}&cu=INR`;

new QRCode(document.getElementById('qrcode'),{

text:upiLink,
width:220,
height:220

});

function payNow(){

window.location.href=upiLink;

}

function downloadInvoice(){

const originalTitle=document.title;

document.title=invoice;

setTimeout(()=>{

window.print();

document.title=originalTitle;

},300);

}

</script>

</body>
</html>
