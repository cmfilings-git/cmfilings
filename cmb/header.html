<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM | ERP & CRM Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        
        <div class="header-left">
            <a href="#" class="brand-logo">
                <strong>CM</strong><span class="brand-divider">|</span><span class="brand-subtitle">ERP & CRM</span>
            </a>
        </div>

        <div class="header-right">
            <button class="btn-square" aria-label="Search">
                <i class="fa-solid fa-search"></i>
            </button>
            
            <button class="btn-square" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            
            <button class="btn-square" aria-label="Sync Data">
                <i class="fa-solid fa-sync-alt"></i>
            </button>
            
            <button class="btn-square btn-primary-menu" aria-label="Open Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

    </header>

    <main style="padding: 20px;">
        <h2>Dashboard Content Begins Here</h2>
        <p>Scroll down to see the header remain fixed at the top of the screen.</p>
    </main>

</body>
</html>
