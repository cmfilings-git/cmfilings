<img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" class="hidden" onload="
    window.toggleDesktopSidebar = function() {
        const sb = document.getElementById('desktop-sidebar');
        const main = document.getElementById('main-content');
        const icon = document.getElementById('sidebar-toggle-icon');
        
        /* Toggle Sidebar Width */
        sb.classList.toggle('expanded');
        sb.classList.toggle('w-64');
        sb.classList.toggle('w-20');
        
        /* Smoothly Slide Main Content */
        if(main) {
            main.classList.toggle('md:pl-64');
            main.classList.toggle('md:pl-20');
        }
        
        /* Flip the Arrow Icon */
        if (sb.classList.contains('expanded')) {
            icon.setAttribute('data-lucide', 'chevron-left');
        } else {
            icon.setAttribute('data-lucide', 'chevron-right');
        }
        if(window.lucide) lucide.createIcons();
    };

    window.logoutUser = function() {
        localStorage.removeItem('cmb_auth');
        localStorage.removeItem('cmb_active_user');
        window.location.href = 'login.html';
    };
" />
