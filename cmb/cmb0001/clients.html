<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMB Dashboard | Client Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0.75rem); }
        .sort-icon { width: 12px; height: 12px; display: inline-block; margin-left: 4px; vertical-align: middle; color: #94a3b8; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

    <div class="hidden w-64 md:pl-64"></div>
    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main id="main-content" class="pt-24 pb-28 md:pb-12 transition-all duration-300 ease-in-out md:pl-20">
        <div class="w-full mx-auto px-6 lg:px-10 max-w-[1600px]">
            
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h1 class="text-[26px] font-bold text-slate-900 tracking-tight">Client Master</h1>
                    <p class="text-slate-500 text-[15px] mt-1">Manage client records, branches, and auto-generate Google Drive directories.</p>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                    <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                            <i data-lucide="users" class="w-5 h-5 text-brand-600"></i> Register / Edit Client
                        </h3>
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-slate-400 italic hidden sm:block">Client ID and Drive Folder are auto-generated.</span>
                            <button onclick="resetForm()" class="px-3 py-1.5 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md transition-colors">Clear Form</button>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <form id="clientForm" onsubmit="handleFormSubmit(event)">
                            
                            <input type="hidden" name="ClientId" id="ClientId">

                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-5">
                                
                                <div class="lg:col-span-2">
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Client Name <span class="text-red-500">*</span></label>
                                    <input type="text" name="ClientName" id="ClientName" required class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Constitution</label>
                                    <select name="Constitution" id="Constitution" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                        <option value="">Select...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Status</label>
                                    <select name="Status" id="Status" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                        <option value="">Select...</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Company ID</label>
                                    <select name="CompanyId" id="CompanyId" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                        <option value="">Select Active Company...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Branch</label>
                                    <select name="Branch" id="Branch" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                        <option value="">Select...</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Mobile <span class="text-red-500">*</span></label>
                                    <input type="tel" name="Mobile" id="Mobile" required class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Email</label>
                                    <input type="email" name="Email" id="Email" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>

                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">GSTIN</label>
                                    <input type="text" name="Gstin" id="Gstin" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm uppercase outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">PAN</label>
                                    <input type="text" name="Pan" id="Pan" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm uppercase outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>
                                <div class="lg:col-span-2">
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Aadhaar</label>
                                    <input type="text" name="Adhar" id="Adhar" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all">
                                </div>

                                <div class="lg:col-span-4">
                                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Notes</label>
                                    <textarea name="Notes" id="Notes" rows="1" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none resize-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition-all"></textarea>
                                </div>
                            </div>
                            
                            <div class="mt-8 pt-5 border-t border-slate-100 flex justify-end">
                                <button type="submit" id="submitBtn" class="px-8 py-2.5 rounded-lg text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 transition-colors flex justify-center items-center gap-2 shadow-sm">
                                    <i data-lucide="save" class="w-4 h-4"></i> <span id="submitText">Save Client</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col min-h-[400px]">
                    
                    <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
                        <div class="flex items-center gap-2 w-full sm:w-auto">
                            <i data-lucide="table" class="w-5 h-5 text-slate-500 hidden sm:block"></i>
                            <h3 class="font-bold text-slate-800 text-lg">Client Directory</h3>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <div class="relative w-full sm:w-72">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search Name, Company, Mobile..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all">
                            </div>
                            
                            <div class="flex gap-2">
                                <button onclick="exportCSV()" class="flex-1 sm:flex-none px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-2 transition-colors shadow-sm">
                                    <i data-lucide="sheet" class="w-4 h-4"></i> CSV
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-auto flex-1 p-0 scrollbar-hide">
                        <table class="w-full text-left border-collapse whitespace-nowrap" id="clientTable">
                            <thead class="sticky top-0 bg-slate-100/90 backdrop-blur z-10 shadow-sm" id="tableHeader"></thead>
                            <tbody id="tableBody" class="text-sm divide-y divide-slate-100">
                                <tr><td colspan="8" class="text-center py-12 text-slate-400">Loading data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="mobnav-container"></div>

    <script>
        // ==========================================
        // 1. SYSTEM CONFIG
        // ==========================================
        // PASTE YOUR NEW APPS SCRIPT DEPLOYMENT URL BELOW
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRHaRD5-XPhuRr9v2WOuTK8GMJkz7zkik9-IqEIANWeFxrFGEHstNV4oWugctFa72n3g/exec"; 
        
        let clientData = [];
        let sortCol = -1;
        let sortAsc = true;

        // Display Headers Mapping
        const displayHeaders = [
            { key: 'ClientId', label: 'Client ID', sortable: true },
            { key: 'ClientName', label: 'Client Name', sortable: true },
            { key: 'CompanyId', label: 'Company', sortable: true },
            { key: 'Branch', label: 'Branch', sortable: true },
            { key: 'Mobile', label: 'Mobile', sortable: false },
            { key: 'Status', label: 'Status', sortable: true },
            { key: 'Folder', label: 'Drive', sortable: false },
            { key: 'Action', label: 'Edit', sortable: false }
        ];

        async function loadComponent(elementId, file) {
            try {
                const response = await fetch(file);
                if (response.ok) {
                    document.getElementById(elementId).innerHTML = await response.text();
                    if(window.lucide) lucide.createIcons();
                }
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('sidebar-container', 'sidebar.html');
            loadComponent('header-container', 'header.html');
            loadComponent('mobnav-container', 'mobnav.html');
            
            buildTableHeaders();
            fetchData();
        });

        // ==========================================
        // 2. DATA FETCH & RENDER
        // ==========================================
        async function fetchData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                if(result.success) {
                    clientData = result.data;
                    
                    // Bind the dynamically fetched Dropdowns!
                    populateDropdown('Constitution', result.dropdowns.constitution);
                    populateDropdown('Status', result.dropdowns.status);
                    populateDropdown('Branch', result.dropdowns.branch);
                    populateDropdown('CompanyId', result.dropdowns.companyIds);

                    renderTable(clientData);
                } else {
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="text-center py-10 text-red-500">Failed to load data</td></tr>`;
                }
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="text-center py-10 text-red-500">Error connecting to server</td></tr>`;
            }
        }

        function populateDropdown(elementId, list) {
            const select = document.getElementById(elementId);
            const currVal = select.value;
            // Preserve the default placeholder option
            const placeholder = select.options[0] ? select.options[0].outerHTML : '<option value="">Select...</option>';
            select.innerHTML = placeholder;
            
            if(list && list.length > 0) {
                list.forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item; opt.innerText = item;
                    select.appendChild(opt);
                });
            }
            if(currVal) select.value = currVal; 
        }

        // ==========================================
        // 3. TABLE RENDERING
        // ==========================================
        function buildTableHeaders() {
            const thead = document.getElementById('tableHeader');
            let tr = document.createElement('tr');
            tr.className = "text-[11px] font-bold text-slate-500 uppercase tracking-wider";
            
            displayHeaders.forEach((col, index) => {
                let th = document.createElement('th');
                th.className = "px-6 py-4 transition-colors";
                if(col.sortable) {
                    th.classList.add("sortable");
                    th.onclick = () => sortTable(index, col.key);
                    th.innerHTML = `${col.label} <i data-lucide="arrow-up-down" id="sort-icon-${index}" class="sort-icon"></i>`;
                } else {
                    th.innerHTML = `${col.label}`;
                }
                if (col.key === 'Action' || col.key === 'Folder') th.classList.add('text-right');
                tr.appendChild(th);
            });
            thead.appendChild(tr);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-slate-400">No records found</td></tr>`;
                return;
            }

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors";
                
                displayHeaders.forEach(col => {
                    let td = document.createElement('td');
                    td.className = "px-6 py-3.5";
                    
                    if (col.key === 'Action') {
                        td.className += " text-right";
                        td.innerHTML = `
                            <button onclick="editClient('${row.ClientId}')" class="p-1.5 text-brand-600 bg-brand-50 hover:bg-brand-100 rounded-md transition-colors" title="Edit Client">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                        `;
                    } 
                    else if (col.key === 'Folder') {
                        td.className += " text-right";
                        const folderUrl = row.ClientFolderLinkUrl;
                        
                        if (folderUrl && String(folderUrl).startsWith('http')) {
                            td.innerHTML = `
                                <a href="${folderUrl}" target="_blank" class="p-1.5 inline-block text-brand-600 bg-brand-50 hover:bg-brand-100 rounded-md transition-colors" title="Open Drive Folder">
                                    <i data-lucide="folder-open" class="w-4 h-4"></i>
                                </a>
                            `;
                        } else if (folderUrl && String(folderUrl).length > 5) {
                            td.innerHTML = `<span class="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded border border-red-100 cursor-help" title="${folderUrl}">Error</span>`;
                        } else {
                            td.innerHTML = `<span class="text-xs text-slate-400">N/A</span>`;
                        }
                    } 
                    else if (col.key === 'ClientName') {
                        td.innerHTML = `<span class="font-bold text-brand-600">${row[col.key] || '-'}</span>`;
                    } else if (col.key === 'Status') {
                        td.innerHTML = row.Status === 'Active' 
                            ? `<span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-md text-xs font-bold border border-emerald-200">Active</span>`
                            : `<span class="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-md text-xs font-bold border border-slate-200">Inactive</span>`;
                    } else {
                        td.innerText = row[col.key] || '-';
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function sortTable(index, key) {
            document.querySelectorAll('.sort-icon').forEach(el => el.setAttribute('data-lucide', 'arrow-up-down'));
            if (sortCol === index) { sortAsc = !sortAsc; } else { sortCol = index; sortAsc = true; }
            const icon = document.getElementById(`sort-icon-${index}`);
            if(icon) icon.setAttribute('data-lucide', sortAsc ? 'arrow-up' : 'arrow-down');
            
            const sortedData = [...clientData].sort((a, b) => {
                let valA = String(a[key] || '').toLowerCase();
                let valB = String(b[key] || '').toLowerCase();
                if(valA < valB) return sortAsc ? -1 : 1;
                if(valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable(sortedData);
        }

        function filterTable() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const filteredData = clientData.filter(row => {
                return Object.values(row).some(val => String(val).toLowerCase().includes(query));
            });
            renderTable(filteredData);
        }

        // ==========================================
        // 4. FORM LOGIC (Create & Update)
        // ==========================================
        function editClient(clientId) {
            const record = clientData.find(c => String(c.ClientId) === String(clientId));
            if(!record) return;

            Object.keys(record).forEach(key => {
                const el = document.getElementById(key);
                if (el) el.value = record[key];
            });

            document.getElementById('submitText').innerText = "Update Client";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('clientForm').reset();
            document.getElementById('ClientId').value = ""; 
            document.getElementById('submitText').innerText = "Save Client";
        }
        
        async function handleFormSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Saving...`;
            lucide.createIcons();

            const formData = new FormData(form);
            const dataObj = Object.fromEntries(formData.entries());

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(dataObj)
                });
            } catch (error) {
                console.warn("GAS execution finished.", error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
                
                resetForm();
                setTimeout(() => {
                    fetchData(); 
                    alert('Client saved! Drive folder has been verified/created.');
                }, 1000); 
            }
        }

        function exportCSV() {
            if(clientData.length === 0) return alert("No data to export");
            const headers = Object.keys(clientData[0]).join(",");
            const rows = clientData.map(obj => Object.values(obj).map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
            const blob = new Blob([headers + "\n" + rows], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Client_Master.csv';
            a.click();
        }
    </script>
</body>
</html>
