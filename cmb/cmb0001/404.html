<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | CMB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-2xl border border-slate-200 shadow-sm p-8 text-center">
        
        <div class="w-20 h-20 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100">
            <i data-lucide="file-question" class="w-10 h-10"></i>
        </div>
        
        <h1 class="text-5xl font-extrabold text-slate-900 tracking-tight mb-2">404</h1>
        <h2 class="text-lg font-bold text-slate-700 mb-3">Page Not Found</h2>
        <p class="text-slate-500 text-[15px] mb-8 leading-relaxed">Oops! The page you are looking for doesn't exist, has been moved, or is currently unavailable.</p>
        
        <div class="flex flex-col gap-3">
            
            <a href="/" class="flex items-center justify-center gap-2 w-full px-4 py-3.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-bold rounded-xl transition-colors shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Dashboard
            </a>
            
            <a href="https://wa.me/919946151111" target="_blank" class="flex items-center justify-center gap-2 w-full px-4 py-3.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-semibold rounded-xl transition-colors shadow-sm mt-2">
                <i data-lucide="headphones" class="w-4 h-4 text-slate-400"></i>
                Report an Issue
            </a>
            
        </div>
    </div>

    <script>
        // Initialize the icons
        lucide.createIcons();
    </script>
</body>
</html>
