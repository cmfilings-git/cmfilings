<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Master | CMB Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } }
        }
    </script>
    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0.75rem); }
        .accordion-content { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; }
        .accordion-content.hidden { max-height: 0; opacity: 0; pointer-events: none; }
        .accordion-content.active { max-height: 1000px; opacity: 1; pointer-events: auto; }
        .rotate-180 { transform: rotate(180deg); }
        .sort-icon { display: inline-block; width: 14px; height: 14px; margin-left: 4px; color: #94a3b8; vertical-align: text-bottom; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

    <div class="hidden w-64 md:pl-64"></div>
    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main id="main-content" class="pt-24 pb-28 md:pb-12 transition-all duration-300 ease-in-out md:pl-20">
        <div class="w-full mx-auto px-6 lg:px-10 max-w-[1600px]">
            
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                <div>
                    <h1 class="text-[26px] font-bold text-slate-900 tracking-tight">Ledger Master</h1>
                    <p class="text-slate-500 text-[15px] mt-1">Manage chart of accounts, balances, and ledger categories.</p>
                </div>
                <button onclick="toggleForm(true)" class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-bold rounded-lg transition-colors flex items-center gap-2 shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Ledger
                </button>
            </div>

            <div class="flex flex-col gap-6">

                <div id="ledger-form-container" class="hidden bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex-col">
                    <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                            <i data-lucide="book-open" class="w-5 h-5 text-brand-600"></i> <span id="formTitle">Create New Ledger</span>
                        </h3>
                        <button type="button" onclick="toggleForm(false)" class="px-3 py-1.5 text-sm font-semibold text-slate-600 bg-slate-200 hover:bg-slate-300 rounded-md transition-colors">Cancel</button>
                    </div>

                    <div class="p-6">
                        <form id="ledgerForm" onsubmit="handleFormSubmit(event)" class="flex flex-col gap-4">
                            <input type="hidden" name="action" id="formAction" value="create">

                            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <button type="button" onclick="toggleAccordion('sec1', 'icon1')" class="w-full p-4 bg-slate-50/50 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                    <h3 class="font-bold text-slate-800 flex items-center gap-2 text-base">
                                        <i data-lucide="info" class="w-4 h-4 text-brand-600"></i> Ledger Details
                                    </h3>
                                    <i data-lucide="chevron-up" id="icon1" class="w-5 h-5 text-slate-400 transition-transform duration-300"></i>
                                </button>
                                
                                <div id="sec1" class="accordion-content active p-6 border-t border-slate-100">
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 items-end">
                                        
                                        <div>
                                            <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Ledger ID</label>
                                            <input type="text" id="LedgerId" name="LedgerId" readonly class="w-full px-3 py-2 mt-1.5 bg-slate-100 border border-slate-200 rounded-lg text-sm font-bold text-slate-600 outline-none cursor-not-allowed">
                                        </div>
                                        
                                        <div class="lg:col-span-2">
                                            <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Ledger Name <span class="text-red-500">*</span></label>
                                            <input type="text" name="LedgerName" id="LedgerName" required placeholder="e.g. Cash in Hand" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20">
                                        </div>
                                        
                                        <div class="lg:col-span-2">
                                            <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Category Group <span class="text-red-500">*</span></label>
                                            <select name="LedgerCategory" id="LedgerCategory" required class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20">
                                                <option value="">Select Group...</option>
                                                <optgroup label="Assets">
                                                    <option value="Assets">Assets (General)</option>
                                                    <option value="Bank Accounts">Bank Accounts</option>
                                                    <option value="Cash-in-Hand">Cash-in-Hand</option>
                                                    <option value="Sundry Debtors">Sundry Debtors</option>
                                                    <option value="Current Assets">Current Assets</option>
                                                    <option value="Fixed Assets">Fixed Assets</option>
                                                </optgroup>
                                                <optgroup label="Liabilities">
                                                    <option value="Liabilities">Liabilities (General)</option>
                                                    <option value="Capital Account">Capital Account</option>
                                                    <option value="Sundry Creditors">Sundry Creditors</option>
                                                    <option value="Loans (Liability)">Loans (Liability)</option>
                                                    <option value="Duties & Taxes">Duties & Taxes</option>
                                                    <option value="Provisions">Provisions</option>
                                                </optgroup>
                                                <optgroup label="Income & Expenses">
                                                    <option value="Direct Incomes">Direct Incomes</option>
                                                    <option value="Indirect Incomes">Indirect Incomes</option>
                                                    <option value="Direct Expenses">Direct Expenses</option>
                                                    <option value="Indirect Expenses">Indirect Expenses</option>
                                                </optgroup>
                                                <optgroup label="Other">
                                                    <option value="Suspense A/c">Suspense A/c</option>
                                                </optgroup>
                                            </select>
                                        </div>

                                        <div class="lg:col-span-2">
                                            <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Opening Balance</label>
                                            <input type="number" step="0.01" name="LedgerOpeningBalance" id="LedgerOpeningBalance" value="0" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20">
                                        </div>
                                        
                                        <div>
                                            <label class="text-xs font-bold text-slate-700 uppercase tracking-wide">Dr / Cr</label>
                                            <select name="Dr/Cr" id="DrCr" class="w-full px-3 py-2 mt-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20">
                                                <option value="Dr">Dr (Debit)</option>
                                                <option value="Cr">Cr (Credit)</option>
                                            </select>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 flex justify-end">
                                <button type="submit" id="submitBtn" class="px-8 py-3 rounded-xl text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 transition-colors flex justify-center items-center gap-2 shadow-sm">
                                    <i data-lucide="save" class="w-5 h-5"></i> <span id="submitText">Save Ledger</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col min-h-[400px]">
                    <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
                        <div class="flex items-center gap-2 w-full sm:w-auto">
                            <i data-lucide="table" class="w-5 h-5 text-slate-500 hidden sm:block"></i>
                            <h3 class="font-bold text-slate-800 text-lg">Chart of Accounts</h3>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <select id="filterColumn" onchange="filterTable()" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-brand-500 transition-all text-slate-600">
                                <option value="all">All Fields</option>
                                <option value="LedgerName">Ledger Name</option>
                                <option value="LedgerCategory">Category</option>
                            </select>
                            
                            <div class="relative w-full sm:w-72">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Master Search..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="overflow-auto flex-1 p-0 scrollbar-hide">
                        <table class="w-full text-left border-collapse whitespace-nowrap" id="ledgerTable">
                            <thead class="sticky top-0 bg-slate-100/90 backdrop-blur z-10 shadow-sm text-[11px] font-bold text-slate-500 uppercase tracking-wider select-none">
                                <tr>
                                    <th class="px-6 py-4 cursor-pointer hover:bg-slate-200/50 transition-colors" onclick="sortTable('LedgerId')">ID <i data-lucide="arrow-up-down" id="sort-LedgerId" class="sort-icon"></i></th>
                                    <th class="px-6 py-4 cursor-pointer hover:bg-slate-200/50 transition-colors" onclick="sortTable('LedgerName')">Ledger Name <i data-lucide="arrow-up-down" id="sort-LedgerName" class="sort-icon"></i></th>
                                    <th class="px-6 py-4 cursor-pointer hover:bg-slate-200/50 transition-colors" onclick="sortTable('LedgerCategory')">Group / Category <i data-lucide="arrow-up-down" id="sort-LedgerCategory" class="sort-icon"></i></th>
                                    <th class="px-6 py-4 cursor-pointer hover:bg-slate-200/50 transition-colors text-right" onclick="sortTable('LedgerOpeningBalance')">Opening Balance <i data-lucide="arrow-up-down" id="sort-LedgerOpeningBalance" class="sort-icon"></i></th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="text-sm divide-y divide-slate-100">
                                <tr><td colspan="5" class="text-center py-12 text-slate-400">Loading ledgers...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="mobnav-container"></div>

    <script>
        // ==========================================
        // 1. SYSTEM CONFIG & FORMATTERS
        // ==========================================
        
        // PASTE YOUR NEW APPS SCRIPT DEPLOYMENT URL HERE
        const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE"; 
        
        let ledgerData = [];
        let currentSortCol = 'LedgerId';
        let currentSortAsc = false; // Default to newest first

        async function loadComponent(elementId, file) {
            try {
                const response = await fetch(file);
                if (response.ok) {
                    document.getElementById(elementId).innerHTML = await response.text();
                    if(window.lucide) lucide.createIcons();
                }
            } catch (e) { }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('sidebar-container', 'sidebar.html');
            loadComponent('header-container', 'header.html');
            loadComponent('mobnav-container', 'mobnav.html');
            if(window.lucide) lucide.createIcons();
            fetchData();
        });

        // ==========================================
        // AUTO ID GENERATOR (Starts at L001)
        // ==========================================
        function generateNextLedgerId() {
            if (!ledgerData || ledgerData.length === 0) return "L001";
            let maxId = 0; 
            ledgerData.forEach(ledger => {
                if (ledger.LedgerId && String(ledger.LedgerId).startsWith('L')) {
                    const numPart = parseInt(String(ledger.LedgerId).substring(1));
                    if (!isNaN(numPart) && numPart > maxId) maxId = numPart;
                }
            });
            return "L" + String(maxId + 1).padStart(3, '0');
        }

        // ==========================================
        // UI TOGGLES
        // ==========================================
        function toggleForm(show) {
            const formContainer = document.getElementById('ledger-form-container');
            const actionInput = document.getElementById('formAction');
            
            if (show) {
                formContainer.classList.remove('hidden');
                formContainer.classList.add('flex');
                if (actionInput.value !== 'update') {
                    document.getElementById('ledgerForm').reset();
                    document.getElementById('LedgerOpeningBalance').value = "0";
                    document.getElementById('LedgerId').value = generateNextLedgerId();
                    document.getElementById('formTitle').innerText = "Create New Ledger";
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                formContainer.classList.add('hidden');
                formContainer.classList.remove('flex');
                document.getElementById('ledgerForm').reset();
                actionInput.value = 'create';
            }
        }

        function toggleAccordion(sectionId, iconId) {
            const content = document.getElementById(sectionId);
            const icon = document.getElementById(iconId);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                setTimeout(() => content.classList.add('active'), 10);
                icon.classList.remove('rotate-180');
                icon.setAttribute('data-lucide', 'chevron-up');
            } else {
                content.classList.remove('active');
                setTimeout(() => content.classList.add('hidden'), 300);
                icon.setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        }

        // ==========================================
        // DATA FETCH, RENDER, SEARCH, SORT
        // ==========================================
        async function fetchData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                if(result.success && result.ledgers) {
                    ledgerData = result.ledgers;
                    filterTable(); 
                } else {
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="text-center py-6 text-slate-400">No ledgers found.</td></tr>`;
                }
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="text-center py-6 text-red-500">Error connecting to server</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-slate-400">No records match your search</td></tr>`;
                return;
            }

            data.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors";
                
                // Format Balance and Dr/Cr Badge
                const bal = parseFloat(row.LedgerOpeningBalance) || 0;
                const drcr = row["Dr/Cr"] || "Dr";
                const badgeClass = drcr === 'Dr' ? 'text-emerald-700 bg-emerald-50 border-emerald-200' : 'text-amber-700 bg-amber-50 border-amber-200';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-600">${row.LedgerId || '-'}</td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-brand-600">${row.LedgerName || '-'}</div>
                        <div class="text-[10px] text-slate-400 mt-1">Updated: ${row.UpdatedAt || '-'}</div>
                    </td>
                    <td class="px-6 py-4 font-medium text-slate-600">${row.LedgerCategory || '-'}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <span class="font-bold text-slate-700 text-base">₹${bal.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                            <span class="px-1.5 py-0.5 rounded text-[10px] font-bold border ${badgeClass}">${drcr}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="editLedger('${row.LedgerId}')" class="p-1.5 bg-brand-50 hover:bg-brand-100 text-brand-600 border border-brand-200 rounded-md transition-colors" title="Edit">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteLedger('${row.LedgerId}')" class="p-1.5 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-md transition-colors" title="Delete">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function sortTable(key) {
            document.querySelectorAll('.sort-icon').forEach(i => i.setAttribute('data-lucide', 'arrow-up-down'));
            if (currentSortCol === key) currentSortAsc = !currentSortAsc;
            else { currentSortCol = key; currentSortAsc = true; }

            const icon = document.getElementById('sort-' + key);
            if(icon) icon.setAttribute('data-lucide', currentSortAsc ? 'arrow-up' : 'arrow-down');
            filterTable(); 
        }

        function filterTable() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const filterKey = document.getElementById("filterColumn").value;
            
            let filtered = ledgerData.filter(row => {
                if (filterKey === 'all') {
                    return Object.values(row).some(val => String(val).toLowerCase().includes(query));
                } else {
                    return String(row[filterKey] || '').toLowerCase().includes(query);
                }
            });

            // Apply Sort
            filtered.sort((a, b) => {
                let valA = a[currentSortCol] || '';
                let valB = b[currentSortCol] || '';
                
                // Numeric sort for balance
                if(currentSortCol === 'LedgerOpeningBalance') {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            renderTable(filtered);
        }

        // ==========================================
        // FORM SUBMISSION (CREATE/UPDATE/DELETE)
        // ==========================================
        function editLedger(ledgerId) {
            const record = ledgerData.find(t => String(t.LedgerId) === String(ledgerId));
            if(!record) return;

            document.getElementById('formAction').value = 'update';
            document.getElementById('formTitle').innerText = "Edit Ledger: " + ledgerId;
            
            // Map keys
            document.getElementById('LedgerId').value = record.LedgerId || "";
            document.getElementById('LedgerName').value = record.LedgerName || "";
            document.getElementById('LedgerCategory').value = record.LedgerCategory || "";
            document.getElementById('LedgerOpeningBalance').value = record.LedgerOpeningBalance || 0;
            
            const drCrSelect = document.getElementById('DrCr');
            if(drCrSelect && record['Dr/Cr']) drCrSelect.value = record['Dr/Cr'];
            
            document.getElementById('submitText').innerText = "Update Ledger";
            toggleForm(true);
        }

        async function deleteLedger(ledgerId) {
            if(!confirm(`Are you sure you want to permanently delete Ledger ${ledgerId}?`)) return;

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', LedgerId: ledgerId })
                });
                setTimeout(() => { fetchData(); }, 1000);
            } catch (error) { console.error(error); }
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Saving...`;
            lucide.createIcons();

            const dataObj = Object.fromEntries(new FormData(form).entries());

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(dataObj)
                });
            } catch (error) { console.warn(error); } 
            finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
                
                toggleForm(false);
                setTimeout(() => { fetchData(); alert('Ledger Saved Successfully!'); }, 1000);
            }
        }
    </script>
</body>
</html>
