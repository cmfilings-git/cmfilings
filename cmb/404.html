<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM | 404 Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="error-page-body">

    <header class="app-header">
        <div class="header-left">
            <a href="index.html" class="brand-logo">
                <strong>CM</strong><span class="brand-divider">|</span><span class="brand-subtitle">ERP & CRM</span>
            </a>
        </div>
    </header>

    <main class="error-container">
        <div class="error-content stat-card border-red">
            <div class="error-icon text-red">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h1 class="error-code text-red">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">
                The page you are looking for has been hidden, moved, or does not exist.
            </p>
            
            <div class="error-actions">
                <a href="index.html" class="btn-square btn-primary-menu error-btn">
                    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </main>

</body>
</html>
