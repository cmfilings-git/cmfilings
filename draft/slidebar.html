<!-- ASYNC EMBEDDABLE SIDEBAR COMPONENT FOR DESKTOP WORKSPACE LAYOUT -->
<aside id="sidebar" class="sidebar-transition h-full bg-white dark:bg-grayDark border-r border-gray-200 dark:border-gray-800 flex flex-col justify-between p-4 w-[260px]">  
    
    <div class="space-y-4">
        <!-- Sidebar Navigation Branding Top Row -->
        <div class="h-12 flex items-center justify-between border-b border-gray-50 dark:border-gray-800/80 pb-2">  
            <div class="flex items-center gap-2">
                <img src="assets/logo.png" alt="Logo" class="h-7 w-auto object-contain">
                <img src="assets/name.png" alt="CMBooks" class="h-5 w-auto object-contain sidebar-hide-target">
            </div>  
        </div>  

        <!-- Navigation Sub-List Selection Anchors -->
        <nav class="space-y-1">  
            <div class="mb-2">
                <a href="#" class="flex items-center gap-3 px-3 py-2 bg-brand-50 dark:bg-slate-800 text-brand-500 dark:text-white rounded-lg font-bold text-sm transition-colors font-poppins">  
                    <i data-lucide="layout-dashboard" class="w-5 h-5 text-center text-gray-400"></i>  
                    <span class="sidebar-hide-target">Dashboard</span>  
                </a>  
            </div>

            <!-- COMPANY SUBMENU TRACK -->
            <div class="mb-2">  
                <button onclick="toggleSubmenu('submenu-company', this)" class="w-full flex items-center justify-between px-3 py-2 text-brand-500 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg font-bold text-[13px] uppercase tracking-wider transition-colors font-montserrat">  
                    <div class="flex items-center gap-3">  
                        <i data-lucide="building-2" class="w-5 h-5 text-center text-gray-400"></i>  
                        <span class="sidebar-hide-target">COMPANY</span>  
                    </div>  
                    <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform duration-200 sidebar-hide-target"></i>  
                </button>  
                <div id="submenu-company" class="submenu pl-11 flex flex-col gap-1 mt-1 open font-dmsans">  
                    <a href="#" class="flex items-center gap-2 py-1.5 text-[13px] font-semibold text-gray-600 dark:text-gray-400 hover:text-brand-500"><div class="w-1 h-1 rounded-full bg-gray-400"></div> Company Details</a>  
                    <a href="#" class="flex items-center gap-2 py-1.5 text-[13px] font-semibold text-gray-600 dark:text-gray-400 hover:text-brand-500"><div class="w-1 h-1 rounded-full bg-gray-400"></div> Branches</a>  
                </div>  
            </div>  

            <!-- ACCOUNTS SUBMENU TRACK -->
            <div class="mb-2">  
                <button onclick="toggleSubmenu('submenu-accounts-desktop', this)" class="w-full flex items-center justify-between px-3 py-2 text-brand-500 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg font-bold text-[13px] uppercase tracking-wider transition-colors font-montserrat">  
                    <div class="flex items-center gap-3">  
                        <i data-lucide="wallet" class="w-5 h-5 text-center text-gray-400"></i>  
                        <span class="sidebar-hide-target">ACCOUNTS</span>  
                    </div>  
                    <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform duration-200 sidebar-hide-target"></i>  
                </button>  
                <div id="submenu-accounts-desktop" class="submenu pl-11 flex flex-col gap-1 mt-1 open font-dmsans">  
                    <a href="#" class="flex items-center gap-2 py-1.5 text-[13px] font-semibold text-gray-600 dark:text-gray-400 hover:text-brand-500"><div class="w-1 h-1 rounded-full bg-gray-400"></div> Ledgers</a>  
                    <a href="#" class="flex items-center gap-2 py-1.5 text-[13px] font-semibold text-gray-600 dark:text-gray-400 hover:text-brand-500"><div class="w-1 h-1 rounded-full bg-gray-400"></div> Vouchers</a>  
                </div>  
            </div>  
        </nav>
    </div>

    <!-- Collapsible Trigger Bottom Anchor Placement -->
    <div class="border-t border-gray-100 dark:border-gray-800 pt-2">
        <button id="desktopSidebarCollapseBtn" class="w-full py-2 flex items-center justify-center text-gray-400 hover:text-brand-500 bg-gray-50 dark:bg-gray-800/50 rounded-lg">
            <i data-lucide="chevron-left" id="collapseBtnIcon" class="w-5 h-5 transition-transform duration-300"></i>
        </button>
    </div>
</aside>
