<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | STRA CARE ERP</title>
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="apple-touch-startup-image" href="assets/logo.png">
    <meta property="og:image" content="assets/logo.png">

    <meta name="theme-color" content="#673EE6">
    <meta name="description" content="STRA CARE - Cloud ERP & CRM for Growing Business">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="STRA CARE">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        hostinger: {
                            bg: '#f4f5f9',
                            card: '#ffffff',
                            text: '#2F1C6A', 
                            purple: '#673EE6', 
                            purpleHover: '#522ebd',
                            border: '#e5e7eb'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hst-input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            color: #111827;
            transition: all 0.2s ease;
            outline: none;
        }
        .hst-input:focus {
            border-color: #2F1C6A;
            box-shadow: 0 0 0 1px #2F1C6A;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col sm:justify-center relative">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-hostinger-bg transition-opacity duration-500">
        <img src="assets/logo.png" alt="Loading" class="w-20 h-20 object-contain rounded-2xl shadow-sm animate-pulse mb-4">
        <div class="h-1 w-24 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-hostinger-purple rounded-full w-1/2 animate-[bounce_1s_infinite]"></div>
        </div>
    </div>

    <div class="absolute top-0 left-0 p-6 hidden sm:flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
        <img src="assets/logo.png" alt="STRA CARE Logo" class="h-8 w-8 object-cover">
        <span class="font-bold text-xl tracking-tight text-hostinger-text">STRA CARE</span>
    </div>

    <div class="sm:hidden p-5 flex items-center justify-center cursor-pointer" onclick="window.location.href='/'">
        <img src="assets/logo.png" alt="STRA CARE Logo" class="h-8 w-8 object-cover mr-2">
        <span class="font-bold text-xl tracking-tight text-hostinger-text">STRA CARE</span>
    </div>

    <div class="w-full max-w-[440px] mx-auto bg-white sm:rounded-2xl sm:shadow-[0_4px_20px_rgb(0,0,0,0.05)] sm:border border-gray-200 overflow-hidden relative z-10 px-8 py-10">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-hostinger-text tracking-tight mb-2">Welcome Back</h1>
            <p class="text-sm text-gray-500">Sign in to manage your ERP & CRM portal.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm flex items-start gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i>
                <span id="errorText">Invalid email or password. Please try again.</span>
            </div>

            <div>
                <label class="block text-[13px] text-gray-600 mb-1.5">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required class="hst-input">
            </div>

            <div>
                <label class="block text-[13px] text-gray-600 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" required class="hst-input pr-12">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-hostinger-text transition">
                        <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-hostinger-purple hover:bg-hostinger-purpleHover text-white font-semibold py-3.5 px-4 rounded-lg flex items-center justify-center gap-2 transition duration-200">
                Sign In
            </button>
            
            <div class="text-center mt-6">
                <a href="tel:9946151111" class="text-sm font-semibold text-hostinger-purple hover:text-hostinger-text transition flex items-center justify-center gap-1.5">
                    <i data-lucide="headphones" class="w-4 h-4"></i> Need help? Contact Support
                </a>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Replace these configuration parameters with the keys from your Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize App and Authentication services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Redirect active valid users directly to the dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // Submit form handler targeting Firebase auth
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            try {
                // Submit sign-in credentials to Firebase
                await signInWithEmailAndPassword(auth, email, password);
                errorMsg.classList.add('hidden');
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error("Authentication failed: ", error.code);
                errorMsg.classList.remove('hidden');
                
                // Friendly client-side error categorization
                if (error.code === 'auth/invalid-credential') {
                    errorText.innerText = "Incorrect email address or password.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorText.innerText = "Access temporarily blocked due to multiple failed login attempts.";
                } else {
                    errorText.innerText = "An error occurred during authentication. Please check your connection.";
                }
            }
        });
    </script>

    <script>
        // Synchronous non-module interactions UI layout scripts
        lucide.createIcons();

        // Standard handling of splash display wrapper elements
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
            }, 600);
        });

        // Visual password toggle framework implementation logic
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwd.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
