<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CMFilings Payment Request</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
    --bg:#0b1020;
    --surface:#121a2f;
    --surface2:#1b2644;
    --primary:#ef4444;
    --primary2:#dc2626;
    --text:#ffffff;
    --muted:#94a3b8;
    --border:rgba(255,255,255,.08);
    --success:#22c55e;
}

*{
    font-family:'DM Sans',sans-serif;
    box-sizing:border-box;
}

body{
    margin:0;
    background:
    radial-gradient(circle at top left,#1f2937 0%,transparent 35%),
    radial-gradient(circle at bottom right,#450a0a 0%,transparent 35%),
    linear-gradient(135deg,#020617 0%,#0f172a 100%);
    color:var(--text);
}

.glass{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.input{
    width:100%;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    color:white;
    padding:14px 16px;
    border-radius:16px;
    transition:.25s ease;
}

.input::placeholder{
    color:#64748b;
}

.input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(239,68,68,.15);
}

.label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:.9rem;
    font-weight:600;
}

.btn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s ease;
}

.btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    color:white;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(239,68,68,.35);
}

.btn-whatsapp{
    background:linear-gradient(135deg,#25d366,#128c7e);
    color:white;
}

.btn-whatsapp:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(37,211,102,.3);
}

.fade{
    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.qr-box{
    background:white;
    padding:18px;
    border-radius:24px;
    display:inline-block;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(34,197,94,.1);
    color:#4ade80;
    border:1px solid rgba(34,197,94,.15);
    padding:6px 12px;
    border-radius:999px;
    font-size:.8rem;
    font-weight:600;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.summary-row:last-child{
    border-bottom:none;
}

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#ef4444;
    color:white;
    padding:12px 18px;
    border-radius:14px;
    z-index:999;
    font-size:.9rem;
    animation:fade .3s ease;
}

@media(max-width:640px){
    .mobile-grid{
        grid-template-columns:1fr !important;
    }
}
</style>
</head>

<body class="min-h-screen">

<div class="max-w-xl mx-auto px-4 py-8">

    <!-- Header -->
    <div class="text-center mb-8 fade">

        <div class="inline-flex items-center gap-3 mb-4">

            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center shadow-lg shadow-red-500/30">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>

            <div class="text-left">
                <h1 class="text-3xl font-extrabold tracking-tight">
                    CMFilings
                </h1>

                <p class="text-slate-400 text-sm">
                    Secure Payment Request System
                </p>
            </div>

        </div>

        <div class="badge mx-auto">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
            End-to-End Secure
        </div>

    </div>

    <!-- Form -->
    <div id="formSection" class="glass rounded-3xl p-6 fade">

        <div class="space-y-5">

            <div>
                <label class="label">Admin UPI ID</label>
                <input id="upi" class="input" placeholder="cmfilings@ybl">
            </div>

            <div class="grid grid-cols-2 gap-4 mobile-grid">

                <div>
                    <label class="label">Client Name</label>
                    <input id="client" class="input" placeholder="Full Name">
                </div>

                <div>
                    <label class="label">Client ID</label>
                    <input id="clientId" class="input" placeholder="CM-1001">
                </div>

            </div>

            <div>
                <label class="label">Mobile Number</label>

                <div class="flex gap-3">

                    <div class="input w-[90px] flex items-center justify-center text-slate-400">
                        +91
                    </div>

                    <input
                    id="mobile"
                    type="tel"
                    maxlength="10"
                    class="input"
                    placeholder="9876543210">

                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mobile-grid">

                <div>
                    <label class="label">Amount</label>
                    <input
                    id="amount"
                    type="number"
                    class="input"
                    placeholder="0.00">
                </div>

                <div>
                    <label class="label">Purpose</label>
                    <input
                    id="purpose"
                    class="input"
                    placeholder="GST Filing">
                </div>

            </div>

            <button onclick="generatePayment()" class="btn btn-primary flex items-center justify-center gap-2">

                <i data-lucide="qr-code"></i>

                Generate Payment Request

            </button>

        </div>

    </div>

    <!-- Result -->
    <div id="resultSection" class="hidden mt-6 fade">

        <div class="glass rounded-3xl p-6 text-center">

            <h2 class="text-2xl font-bold mb-1">
                Payment Request Ready
            </h2>

            <p class="text-slate-400 mb-5">
                Scan QR or share instantly
            </p>

            <div class="qr-box mb-5">
                <div id="qrcode"></div>
            </div>

            <div class="glass rounded-2xl p-5 text-left mb-5">

                <div class="summary-row">
                    <span class="text-slate-400">Client</span>
                    <span id="rClient" class="font-semibold"></span>
                </div>

                <div class="summary-row">
                    <span class="text-slate-400">Client ID</span>
                    <span id="rClientId"></span>
                </div>

                <div class="summary-row">
                    <span class="text-slate-400">Amount</span>
                    <span id="rAmount" class="font-bold text-red-400"></span>
                </div>

                <div class="summary-row">
                    <span class="text-slate-400">Purpose</span>
                    <span id="rPurpose"></span>
                </div>

            </div>

            <button onclick="sendWhatsApp()" class="btn btn-whatsapp flex items-center justify-center gap-2">

                <i data-lucide="message-circle"></i>

                Send via WhatsApp

            </button>

            <button
            onclick="resetForm()"
            class="mt-3 text-slate-400 hover:text-white transition text-sm font-semibold">

                Create New Request

            </button>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

let paymentData = {};

function showToast(message){

    const toast=document.createElement('div');

    toast.className='toast';

    toast.innerText=message;

    document.body.appendChild(toast);

    setTimeout(()=>toast.remove(),3000);

}

function generatePayment(){

    const upi=document.getElementById('upi').value.trim();
    const client=document.getElementById('client').value.trim();
    const clientId=document.getElementById('clientId').value.trim();
    const mobile=document.getElementById('mobile').value.trim();
    const amount=document.getElementById('amount').value.trim();
    const purpose=document.getElementById('purpose').value.trim();

    if(!upi || !client || !clientId || !mobile || !amount || !purpose){

        showToast('Please fill all fields');
        return;

    }

    if(mobile.length!==10){

        showToast('Invalid mobile number');
        return;

    }

    paymentData={
        upi,
        client,
        clientId,
        mobile,
        amount,
        purpose
    };

    const upiLink=
    `upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&tn=${purpose}-${clientId}&cu=INR`;

    document.getElementById('formSection').classList.add('hidden');

    document.getElementById('resultSection').classList.remove('hidden');

    document.getElementById('rClient').innerText=client;
    document.getElementById('rClientId').innerText=clientId;
    document.getElementById('rAmount').innerText=`₹${parseFloat(amount).toLocaleString('en-IN')}`;
    document.getElementById('rPurpose').innerText=purpose;

    document.getElementById('qrcode').innerHTML='';

    new QRCode(document.getElementById('qrcode'),{
        text:upiLink,
        width:220,
        height:220,
        colorDark:"#111827",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });

}

function sendWhatsApp(){

    const d=paymentData;

    const message=
`Dear *${d.client}*,

Greetings from *CMFilings* 🙏

A payment request has been generated for you.

📋 *Details*
• Client ID: ${d.clientId}
• Amount: ₹${parseFloat(d.amount).toLocaleString('en-IN')}
• Purpose: ${d.purpose}

Please complete the payment using the QR code shared.

Thank you for choosing CMFilings.

📞 Support: +91 9946151111`;

    const url=
`https://wa.me/91${d.mobile}?text=${encodeURIComponent(message)}`;

    window.open(url,'_blank');

}

function resetForm(){

    document.getElementById('formSection').classList.remove('hidden');

    document.getElementById('resultSection').classList.add('hidden');

    document.querySelectorAll('input').forEach(i=>i.value='');

    paymentData={};

}

</script>

</body>
</html>
