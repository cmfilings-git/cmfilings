<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Payment Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    background:
    linear-gradient(180deg,#f8fafc,#eef2ff);
}

.card{
    background:white;
    border-radius:34px;
    border:1px solid #edf2f7;
    box-shadow:
    0 10px 30px rgba(15,23,42,.06),
    0 2px 6px rgba(15,23,42,.03);
}

.pay-btn{
    width:100%;
    height:64px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#6c63ff,#7278ff);
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.pay-btn:hover{
    transform:translateY(-2px);
}

.info-row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #edf2f7;
}

</style>

</head>

<body>

<div class="max-w-xl mx-auto px-4 py-8">

    <!-- HEADER -->

    <div class="text-center mb-8">

        <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-indigo-700 mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/20 mb-5">

            <span class="text-4xl text-white">₹</span>

        </div>

        <h1 class="text-4xl font-extrabold text-slate-800">
            CMFilings
        </h1>

        <p class="text-slate-500 text-lg mt-2">
            Secure Payment Portal
        </p>

    </div>

    <!-- CARD -->

    <div class="card p-7 text-center">

        <h2 class="text-2xl font-bold text-slate-800 mb-2">

            Welcome
            <span id="clientName"></span>

        </h2>

        <p class="text-slate-500 mb-6">
            Your payment request is ready
        </p>

        <div class="bg-slate-50 rounded-3xl p-5 inline-block mb-6">

            <div id="qrcode"></div>

        </div>

        <div class="text-left mb-6">

            <div class="info-row">
                <span class="text-slate-500">Client ID</span>
                <span id="clientId" class="font-semibold"></span>
            </div>

            <div class="info-row">
                <span class="text-slate-500">Service</span>
                <span id="service"></span>
            </div>

            <div class="info-row">
                <span class="text-slate-500">Amount</span>
                <span id="amount" class="font-bold text-indigo-600"></span>
            </div>

            <div class="info-row">
                <span class="text-slate-500">Invoice</span>
                <span id="invoice"></span>
            </div>

        </div>

        <button onclick="payNow()" class="pay-btn">

            Pay Now

        </button>

        <p class="text-slate-400 text-sm mt-5">

            Secure payment powered by CMFilings

        </p>

    </div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const client=params.get('client') || 'Client';

const clientId=params.get('clientid') || '-';

const amount=params.get('amount') || '0';

const service=params.get('service') || '-';

const invoice=params.get('invoice') || '-';

const notes=params.get('notes') || '';

const upi='cmfilings@ybl';

document.getElementById('clientName').innerText=client;

document.getElementById('clientId').innerText=clientId;

document.getElementById('service').innerText=service;

document.getElementById('amount').innerText=
`₹${parseFloat(amount).toLocaleString('en-IN')}`;

document.getElementById('invoice').innerText=invoice;

const upiLink=
`upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&tn=${service}-${clientId}&cu=INR`;

new QRCode(document.getElementById('qrcode'),{

    text:upiLink,

    width:220,

    height:220,

    colorDark:"#111827",

    colorLight:"#ffffff"

});

function payNow(){

    window.location.href=upiLink;

}

</script>

</body>
</html>
