<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment - CMFilings</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <!-- Open Graph / Social Sharing (Site Logo) -->
    <meta property="og:title" content="Payment - CMFilings">
    <meta property="og:description" content="Make secure payments for CMFilings services.">
    <meta property="og:image" content="logo.png">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CMFilings">
    
    <!-- App Logo for iOS -->
    <link rel="apple-touch-icon" href="logo.png">
    
    <!-- Apple Splash Screen -->
    <link rel="apple-touch-startup-image" href="logo.png">
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cmred: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <!-- Main Payment Card -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        
        <!-- Header -->
        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
            <a href="https://cmfilings.com" class="p-2 -ml-2 text-gray-400 hover:text-gray-700 hover:bg-gray-50 rounded-full transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <div class="flex items-center gap-2 flex-1 justify-center mr-6">
                <!-- UI Logos -->
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain fallback-bg bg-gray-200 rounded-full" onerror="this.style.display='none'">
                <img src="assets/name.png" alt="CMFilings" class="h-6 w-auto object-contain" onerror="this.style.display='none'; document.getElementById('fallback-name').style.display='block';">
                <span id="fallback-name" class="font-bold text-xl text-gray-900 hidden">CMFilings</span>
            </div>
        </div>

        <!-- Form Content -->
        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="h-4 w-4 text-gray-400"></i>
                    </div>
                    <input type="text" id="payerName" placeholder="Enter your name" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cmred-500 focus:border-cmred-500 outline-none transition text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₹)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="indian-rupee" class="h-4 w-4 text-gray-400"></i>
                    </div>
                    <input type="number" id="payAmount" placeholder="0.00" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cmred-500 focus:border-cmred-500 outline-none transition text-sm font-medium">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description / Reference</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 pt-3 pointer-events-none">
                        <i data-lucide="file-text" class="h-4 w-4 text-gray-400"></i>
                    </div>
                    <textarea id="payDesc" rows="2" placeholder="Purpose of payment" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cmred-500 focus:border-cmred-500 outline-none transition text-sm resize-none"></textarea>
                </div>
            </div>

            <button onclick="generatePayment()" class="w-full mt-2 bg-cmred-600 hover:bg-cmred-700 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition duration-200 shadow-sm">
                <i data-lucide="qr-code" class="w-5 h-5"></i>
                Generate Payment Details
            </button>
        </div>
    </div>

    <!-- Payment Details Modal (Popup) -->
    <div id="paymentModal" class="fixed inset-0 z-50 hidden">
        <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="fixed inset-0 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
                
                <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h3 class="font-semibold text-gray-800">Payment Information</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 bg-white shadow-sm border border-gray-100 rounded-full p-1.5 transition">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="overflow-y-auto no-scrollbar p-5 space-y-6">
                    <div class="flex flex-col items-center bg-gray-50 p-6 rounded-xl border border-gray-100">
                        <h4 class="text-sm font-medium text-gray-500 mb-4 uppercase tracking-wide">Scan to Pay</h4>
                        <div id="qrcode" class="bg-white p-3 rounded-xl shadow-sm border border-gray-100"></div>
                        <p id="qrAmountDisplay" class="mt-3 font-bold text-xl text-gray-900"></p>
                        <button onclick="downloadQR()" class="mt-4 text-cmred-600 hover:text-cmred-700 text-sm font-medium flex items-center gap-1.5 bg-red-50 px-4 py-2 rounded-lg transition">
                            <i data-lucide="download" class="w-4 h-4"></i> Save QR as JPEG
                        </button>
                    </div>

                    <div>
                        <h4 class="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">UPI Details</h4>
                        <div class="bg-white border border-gray-100 rounded-lg divide-y divide-gray-50">
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">UPI ID</span>
                                <span class="text-sm font-medium text-gray-900 select-all">accountree@ybl</span>
                            </div>
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">UPI Number</span>
                                <span class="text-sm font-medium text-gray-900 select-all">9946151111</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Bank Transfer</h4>
                        <div class="bg-white border border-gray-100 rounded-lg divide-y divide-gray-50">
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">Name</span>
                                <span class="text-sm font-medium text-gray-900">Accountree</span>
                            </div>
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">A/C No</span>
                                <span class="text-sm font-medium text-gray-900 select-all">2538020000013</span>
                            </div>
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">IFSC Code</span>
                                <span class="text-sm font-medium text-gray-900 select-all">Fdrl0002538</span>
                            </div>
                            <div class="p-3 flex justify-between items-center">
                                <span class="text-sm text-gray-500">Branch</span>
                                <span class="text-sm font-medium text-gray-900">Chokli</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-5 border-t border-gray-100 bg-white grid grid-cols-2 gap-3">
                    <button onclick="sendWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20bd5a] text-white text-sm font-medium py-2.5 px-3 rounded-lg flex items-center justify-center gap-1.5 transition">
                        <i data-lucide="message-circle" class="w-4 h-4"></i> Send Ack
                    </button>
                    <a href="tel:9946151111" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium py-2.5 px-3 rounded-lg flex items-center justify-center gap-1.5 transition">
                        <i data-lucide="phone-call" class="w-4 h-4"></i> Support
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('ServiceWorker registered:', registration))
                    .catch(error => console.log('ServiceWorker registration failed:', error));
            });
        }

        const UPI_ID = "accountree@ybl";
        const PAYEE_NAME = "Accountree";
        const CONTACT_NUMBER = "919946151111";

        let currentAmount = "";
        let currentDesc = "";
        let qrCodeObj = null;

        function generatePayment() {
            const name = document.getElementById('payerName').value.trim();
            const amount = document.getElementById('payAmount').value.trim();
            const desc = document.getElementById('payDesc').value.trim();

            if(!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            currentAmount = amount;
            currentDesc = desc || "Payment to CMFilings";

            document.getElementById('qrAmountDisplay').innerText = `₹ ${amount}`;

            const upiString = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(PAYEE_NAME)}&am=${amount}&cu=INR&tn=${encodeURIComponent(currentDesc)}`;

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            
            qrCodeObj = new QRCode(qrContainer, {
                text: upiString,
                width: 180,
                height: 180,
                colorDark : "#111827",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('paymentModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.add('hidden');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const url = canvas.toDataURL("image/jpeg", 1.0);
                const a = document.createElement('a');
                a.href = url;
                a.download = `CMFilings_QR_${currentAmount}.jpeg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function sendWhatsApp() {
            const name = document.getElementById('payerName').value.trim() || "Customer";
            const text = `Hi, I am ${name}. I have made/initiated a payment of ₹${currentAmount} for ${currentDesc}. Here is my acknowledgment.`;
            const encodedText = encodeURIComponent(text);
            const waUrl = `https://wa.me/${CONTACT_NUMBER}?text=${encodedText}`;
            window.open(waUrl, '_blank');
        }
    </script>
</body>
</html>
