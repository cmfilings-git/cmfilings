<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CMFilings Admin - Payment Request</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#ff4d4f;
    --primary-dark:#e63946;
    --bg:#0f172a;
    --card:#111827;
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#94a3b8;
}

*{
    font-family:'Inter',sans-serif;
    box-sizing:border-box;
}

body{
    margin:0;
    background:
    radial-gradient(circle at top left,#1e293b 0%,transparent 30%),
    radial-gradient(circle at bottom right,#450a0a 0%,transparent 35%),
    linear-gradient(135deg,#020617 0%,#0f172a 100%);
    color:var(--text);
}

.glass{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.input{
    width:100%;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    color:white;
    padding:14px 16px;
    border-radius:16px;
    transition:.25s;
}

.input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(255,77,79,.15);
}

.input::placeholder{
    color:#64748b;
}

.label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:.9rem;
    font-weight:600;
}

.btn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:15px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:white;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(255,77,79,.35);
}

.btn-whatsapp{
    background:linear-gradient(135deg,#25d366,#128c7e);
    color:white;
}

.btn-whatsapp:hover{
    transform:translateY(-2px);
}

.card-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.card-row:last-child{
    border-bottom:none;
}

.fade{
    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#ef4444;
    color:white;
    padding:12px 18px;
    border-radius:14px;
    z-index:999;
}

@media(max-width:640px){
    .mobile-grid{
        grid-template-columns:1fr !important;
    }
}

</style>

</head>

<body>

<div class="max-w-2xl mx-auto px-4 py-8">

    <!-- HEADER -->

    <div class="text-center mb-8">

        <div class="inline-flex items-center gap-3 mb-4">

            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center shadow-lg shadow-red-500/30">
                <i data-lucide="wallet" class="w-7 h-7"></i>
            </div>

            <div class="text-left">
                <h1 class="text-3xl font-extrabold">
                    CMFilings Admin
                </h1>

                <p class="text-slate-400 text-sm">
                    Secure Payment Request Generator
                </p>
            </div>

        </div>

        <div class="inline-flex items-center gap-2 bg-green-500/10 border border-green-500/20 text-green-400 px-4 py-2 rounded-full text-sm font-semibold">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
            PCI DSS Secure
        </div>

    </div>

    <!-- FORM -->

    <div id="formSection" class="glass rounded-3xl p-6 fade">

        <div class="space-y-5">

            <div>
                <label class="label">Admin UPI ID</label>
                <input id="upi" class="input" placeholder="cmfilings@ybl">
            </div>

            <div class="grid grid-cols-2 gap-4 mobile-grid">

                <div>
                    <label class="label">Client Name</label>
                    <input id="clientName" class="input" placeholder="Enter client name">
                </div>

                <div>
                    <label class="label">Client ID</label>
                    <input id="clientId" class="input" placeholder="CM-1001">
                </div>

            </div>

            <div>
                <label class="label">Mobile Number</label>

                <div class="flex gap-3">

                    <div class="input w-[90px] flex items-center justify-center text-slate-400">
                        +91
                    </div>

                    <input
                    id="mobile"
                    maxlength="10"
                    type="tel"
                    class="input"
                    placeholder="9876543210">

                </div>

            </div>

            <div class="grid grid-cols-2 gap-4 mobile-grid">

                <div>
                    <label class="label">Amount</label>
                    <input
                    id="amount"
                    type="number"
                    class="input"
                    placeholder="0.00">
                </div>

                <div>
                    <label class="label">Payment For</label>

                    <select id="paymentType" class="input">
                        <option value="">Select Type</option>
                        <option>GST Return</option>
                        <option>TDS Return</option>
                        <option>Income Tax Filing</option>
                        <option>Audit Fee</option>
                        <option>Accounting Service</option>
                        <option>IEC Registration</option>
                        <option>Trade License</option>
                        <option>Other</option>
                    </select>

                </div>

            </div>

            <div>
                <label class="label">Narration / Description</label>

                <textarea
                id="notes"
                rows="4"
                class="input resize-none"
                placeholder="Add payment narration or notes"></textarea>
            </div>

            <div class="flex items-center gap-3">

                <input type="checkbox" id="includeLink" checked class="w-5 h-5 accent-red-500">

                <label for="includeLink" class="text-sm text-slate-300">
                    Include CMFilings Payment Link
                </label>

            </div>

            <button onclick="generateRequest()" class="btn btn-primary flex items-center justify-center gap-2">

                <i data-lucide="qr-code"></i>

                Generate Payment Request

            </button>

        </div>

    </div>

    <!-- RESULT -->

    <div id="resultSection" class="hidden mt-6 fade">

        <div class="glass rounded-3xl p-6 text-center">

            <h2 class="text-2xl font-bold mb-1">
                Payment Request Generated
            </h2>

            <p class="text-slate-400 mb-5">
                Scan QR or send directly to client
            </p>

            <div class="bg-white inline-block p-5 rounded-3xl mb-5">

                <div id="qrcode"></div>

            </div>

            <div class="glass rounded-2xl p-5 text-left mb-5">

                <div class="card-row">
                    <span class="text-slate-400">Client</span>
                    <span id="rName"></span>
                </div>

                <div class="card-row">
                    <span class="text-slate-400">Client ID</span>
                    <span id="rId"></span>
                </div>

                <div class="card-row">
                    <span class="text-slate-400">Amount</span>
                    <span id="rAmount" class="text-red-400 font-bold"></span>
                </div>

                <div class="card-row">
                    <span class="text-slate-400">Service</span>
                    <span id="rService"></span>
                </div>

            </div>

            <button onclick="sendWhatsapp()" class="btn btn-whatsapp flex items-center justify-center gap-2">

                <i data-lucide="message-circle"></i>

                Send Client via WhatsApp

            </button>

            <button
            onclick="resetForm()"
            class="mt-4 text-slate-400 hover:text-white transition font-semibold text-sm">

                Create New Request

            </button>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

let paymentData = {};

function toast(message){

    const t=document.createElement('div');

    t.className='toast';

    t.innerText=message;

    document.body.appendChild(t);

    setTimeout(()=>{
        t.remove();
    },3000);

}

function generateRequest(){

    const upi=document.getElementById('upi').value.trim();
    const clientName=document.getElementById('clientName').value.trim();
    const clientId=document.getElementById('clientId').value.trim();
    const mobile=document.getElementById('mobile').value.trim();
    const amount=document.getElementById('amount').value.trim();
    const paymentType=document.getElementById('paymentType').value;
    const notes=document.getElementById('notes').value.trim();

    if(!upi || !clientName || !clientId || !mobile || !amount || !paymentType){

        toast('Please fill all required fields');
        return;

    }

    if(mobile.length !== 10){

        toast('Invalid mobile number');
        return;

    }

    paymentData={
        upi,
        clientName,
        clientId,
        mobile,
        amount,
        paymentType,
        notes
    };

    const upiLink=
`upi://pay?pa=${upi}&pn=CMFilings&am=${amount}&tn=${paymentType}-${clientId}&cu=INR`;

    document.getElementById('formSection').classList.add('hidden');

    document.getElementById('resultSection').classList.remove('hidden');

    document.getElementById('rName').innerText=clientName;
    document.getElementById('rId').innerText=clientId;
    document.getElementById('rAmount').innerText=`₹${parseFloat(amount).toLocaleString('en-IN')}`;
    document.getElementById('rService').innerText=paymentType;

    document.getElementById('qrcode').innerHTML='';

    new QRCode(document.getElementById('qrcode'),{
        text:upiLink,
        width:220,
        height:220,
        colorDark:"#111827",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });

}

function sendWhatsapp(){

    const d=paymentData;

    const includeLink=document.getElementById('includeLink').checked;

    const paymentPage=
`https://www.cmfilings.com/payment?client=${encodeURIComponent(d.clientId)}&amount=${d.amount}&service=${encodeURIComponent(d.paymentType)}`;

    let message=
`Dear *${d.clientName}*,

Greetings from *CMFilings* 🙏

A payment request has been generated for you.

📋 *Payment Details*
• Client ID: ${d.clientId}
• Service: ${d.paymentType}
• Amount: ₹${parseFloat(d.amount).toLocaleString('en-IN')}

📝 *Narration*
${d.notes || 'N/A'}

💳 Please complete your payment securely using the QR code or payment link below.

`;

    if(includeLink){

        message += `🔗 Payment Link:
${paymentPage}

`;

    }

    message +=
`Thank you for choosing *CMFilings*.

📞 Support: +91 9946151111

_This is an official payment request from CMFilings._`;

    const whatsappUrl=
`https://wa.me/91${d.mobile}?text=${encodeURIComponent(message)}`;

    window.open(whatsappUrl,'_blank');

}

function resetForm(){

    document.getElementById('resultSection').classList.add('hidden');

    document.getElementById('formSection').classList.remove('hidden');

    document.querySelectorAll('input, textarea').forEach(el=>{

        if(el.type !== 'checkbox'){
            el.value='';
        }

    });

    document.getElementById('paymentType').selectedIndex=0;

}

</script>

</body>
</html>
