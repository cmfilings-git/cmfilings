<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings Name Logo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  width:2500px;
  height:1200px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:transparent;

  font-family:'Inter',sans-serif;

  overflow:hidden;
}

/* NAME */

.name{

  display:flex;
  align-items:flex-end;

  line-height:.88;
}

/* CM */

.cm{

  font-size:320px;
  font-weight:900;

  color:#0f172a;

  letter-spacing:-12px;
}

/* FILINGS */
/* SOLID EMERALD */

.filings{

  margin-left:4px;

  font-size:320px;
  font-weight:900;

  letter-spacing:-8px;

  color:#059669;
}

</style>
</head>

<body>

<div class="name">

  <span class="cm">CM</span>
  <span class="filings">Filings</span>

</div>

</body>
</html>
