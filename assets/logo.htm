<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMFilings 500x500 Logo</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#f3f4f6;

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* 500 x 500 LOGO */

.logo-icon{

  width:500px;
  height:500px;

  border-radius:50%;

  position:relative;

  overflow:hidden;

  background:linear-gradient(
    135deg,
    #10d49a 0%,
    #047857 100%
  );

  box-shadow:
  0 50px 100px rgba(16,185,129,.18);
}

/* SYMBOL */

.symbol{

  position:absolute;
  inset:0;
}

/* COMMON LINE */

.i{

  position:absolute;

  width:92px;
  height:340px;

  background:#ffffff;

  border-radius:999px;

  transform:rotate(45deg);
}

/* FIRST LINE */

.i1{

  left:128px;
  top:70px;
}

/* SECOND LINE */

.i2{

  left:275px;
  top:80px;
}

/* DOTS */

.dot{

  position:absolute;

  width:92px;
  height:92px;

  background:#ffffff;

  border-radius:50%;
}

/* TOP DOT */

.dot-top{

  left:50px;
  top:120px;
}

/* BOTTOM DOT */

.dot-bottom{

  right:50px;
  bottom:120px;
}

</style>
</head>

<body>

<div class="logo-icon">

  <div class="symbol">

    <!-- TOP DOT -->
    <div class="dot dot-top"></div>

    <!-- FIRST LINE -->
    <div class="i i1"></div>

    <!-- SECOND LINE -->
    <div class="i i2"></div>

    <!-- BOTTOM DOT -->
    <div class="dot dot-bottom"></div>

  </div>

</div>

</body>
</html>
